<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Selfie Wall – Plaza Colón</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Arial, sans-serif;
      color: #f9fafb;
      background: #000000;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wall {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      max-width: 1920px;
      aspect-ratio: 16 / 9;
      max-height: 1080px;
      background: #000000;
      overflow: hidden;
    }

    .photo-window {
      position: absolute;
      top: 3.7037%;
      left: 10.9375%;
      width: 78.125%;
      height: 92.5926%;
      overflow: hidden;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .photo.visible {
      opacity: 1;
    }

    .overlay-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    .overlay-image.visible {
      display: block;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: 20px;
      color: #9ca3af;
      z-index: 3;
      pointer-events: none;
    }

    .empty.hidden {
      display: none;
    }

    .ticket-badge {
      position: absolute;
      top: 20px;
      left: 27px;
      z-index: 20;
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      background: rgba(0, 0, 0, 0.85);
      color: #f9fafb;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: none;
    }

    @media (max-width: 768px) {
      .empty {
        font-size: 18px;
        padding: 16px;
      }

      .ticket-badge {
        top: 12px;
        left: 16px;
        font-size: 18px;
        padding: 8px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wall">
    <div class="stage">
      <div class="photo-window">
        <img id="photoA" class="photo" alt="Selfie aprobado A" />
        <img id="photoB" class="photo" alt="Selfie aprobado B" />
        <div id="ticketBadge" class="ticket-badge">#000</div>
      </div>

      <div id="galleryEmpty" class="empty">
        ESCANEA EL CODIGO QR
      </div>

      <img id="galleryOverlay" class="overlay-image" alt="Gallery Overlay" />
    </div>
  </div>

  <script>
    const BASE_URL = "https://mayaguez-photoapp.vercel.app";
    const DISPLAY_MS = 8000;
    const REFRESH_MS = 30000;
    const IMAGE_LOAD_TIMEOUT_MS = 15000;
    const TRANSITION_FALLBACK_MS = 1800;
    const ACTIVE_OVERLAY_URL = `${BASE_URL}/gallery/active-overlay-image`;
    const GALLERY_LAST_HANDLED_RUNTIME_COMMAND_KEY = "galleryLastHandledRuntimeCommandId";

    const imgA = document.getElementById("photoA");
    const imgB = document.getElementById("photoB");
    const overlayEl = document.getElementById("galleryOverlay");
    const emptyEl = document.getElementById("galleryEmpty");
    const ticketBadgeEl = document.getElementById("ticketBadge");

    const imgSlots = [imgA, imgB];
    let activeIndex = 0;
    let hasImage = false;
    let photos = [];
    let currentIndex = 0;
    let currentPhotoId = "";
    let rotateTimer = null;
    let refreshTimer = null;
    let approvedManifestVersion = "";
    let activeOverlayVersion = "";
    let lastHandledRuntimeCommandId = "";

    try {
      lastHandledRuntimeCommandId = String(window.localStorage.getItem(GALLERY_LAST_HANDLED_RUNTIME_COMMAND_KEY) || "");
    } catch (_) {}

    function buildPhotoUrl(photo) {
      const fileId = photo && photo.id ? String(photo.id) : "";
      if (!fileId) return "";

      const versionValue =
        String(
          approvedManifestVersion ||
          photo.approvedTime ||
          photo.modifiedTime ||
          photo.createdTime ||
          fileId
        ).trim();

      const url = new URL(`${BASE_URL}/gallery/photo/${encodeURIComponent(fileId)}`);
      if (versionValue) {
        url.searchParams.set("v", versionValue);
      }
      return url.toString();
    }

    function buildOverlayUrl(version = "") {
      const url = new URL(ACTIVE_OVERLAY_URL);
      const normalizedVersion = String(version || "").trim();
      if (normalizedVersion) {
        url.searchParams.set("v", normalizedVersion);
      }
      return url.toString();
    }

    function getPhotoPlaybackTime(photo) {
      if (!photo || typeof photo !== "object") return 0;
      const rawTime = String(photo.approvedTime || photo.modifiedTime || photo.createdTime || "").trim();
      if (!rawTime) return 0;
      const ms = Date.parse(rawTime);
      return Number.isFinite(ms) ? ms : 0;
    }

    function sortPhotos(list) {
      return [...list].sort((a, b) => {
        const timeA = getPhotoPlaybackTime(a);
        const timeB = getPhotoPlaybackTime(b);
        if (timeA !== timeB) return timeA - timeB;
        return String(a.id || "").localeCompare(String(b.id || ""));
      });
    }

    function getTicketFromName(name) {
      if (!name || typeof name !== "string") return null;

      let match = name.match(/^T(\d{1,})-/i);
      if (match) return parseInt(match[1], 10);

      match = name.match(/^(\d{1,})_/);
      if (match) return parseInt(match[1], 10);

      return null;
    }

    function formatTicketLabel(num) {
      if (num == null || !Number.isFinite(Number(num))) return null;
      return "#" + String(Number(num)).padStart(3, "0");
    }

    function updateTicketBadge(fileName) {
      if (!ticketBadgeEl) return;
      const label = formatTicketLabel(getTicketFromName(fileName));
      if (!label) {
        hideTicketBadge();
        return;
      }
      ticketBadgeEl.textContent = label;
      ticketBadgeEl.style.display = "block";
    }

    function hideTicketBadge() {
      if (!ticketBadgeEl) return;
      ticketBadgeEl.textContent = "";
      ticketBadgeEl.style.display = "none";
    }

    function hideEmptyState() {
      if (emptyEl) {
        emptyEl.classList.add("hidden");
      }
    }

    function showEmptyState() {
      if (emptyEl) {
        emptyEl.classList.remove("hidden");
      }
    }

    function clearSlot(slotIndex) {
      const img = imgSlots[slotIndex];
      if (!img) return;
      img.classList.remove("visible");
      img.onload = null;
      img.onerror = null;
      try {
        img.removeAttribute("src");
      } catch (_) {}
      try {
        img.src = "";
      } catch (_) {}
    }

    function setEmptyState() {
      if (rotateTimer) {
        clearTimeout(rotateTimer);
        rotateTimer = null;
      }

      clearSlot(0);
      clearSlot(1);
      hasImage = false;
      currentPhotoId = "";
      currentIndex = 0;
      showEmptyState();
      hideTicketBadge();
    }

    function normalizeCurrentIndex() {
      if (!photos.length) {
        currentIndex = 0;
        return;
      }
      if (!Number.isFinite(currentIndex) || currentIndex < 0) {
        currentIndex = 0;
        return;
      }
      if (currentIndex >= photos.length) {
        currentIndex = currentIndex % photos.length;
      }
    }

    function applyOverlayVersion(version = "") {
      if (!overlayEl) return;
      const nextVersion = String(version || "").trim();
      if (nextVersion && nextVersion === activeOverlayVersion && overlayEl.getAttribute("src")) {
        return;
      }

      overlayEl.onload = () => {
        overlayEl.classList.add("visible");
      };
      overlayEl.onerror = () => {
        overlayEl.classList.remove("visible");
        try {
          overlayEl.removeAttribute("src");
        } catch (_) {}
      };
      overlayEl.src = buildOverlayUrl(nextVersion);
      activeOverlayVersion = nextVersion;
    }

    function clearGalleryRuntimeStorage() {
      try {
        window.localStorage.removeItem(GALLERY_LAST_HANDLED_RUNTIME_COMMAND_KEY);
      } catch (_) {}
    }

    function persistHandledRuntimeCommandId(commandId = "") {
      lastHandledRuntimeCommandId = String(commandId || "").trim();
      if (!lastHandledRuntimeCommandId) return;
      try {
        window.localStorage.setItem(GALLERY_LAST_HANDLED_RUNTIME_COMMAND_KEY, lastHandledRuntimeCommandId);
      } catch (_) {}
    }

    function buildReloadUrl(commandId = "", clearCache = false) {
      try {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("reload", commandId || String(Date.now()));
        if (clearCache) {
          nextUrl.searchParams.set("cacheReset", commandId || String(Date.now()));
        } else {
          nextUrl.searchParams.delete("cacheReset");
        }
        return nextUrl.toString();
      } catch (_) {
        const separator = window.location.href.includes("?") ? "&" : "?";
        return `${window.location.href}${separator}reload=${encodeURIComponent(commandId || String(Date.now()))}`;
      }
    }

    function prepareReload(clearCache = false) {
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
      if (rotateTimer) {
        clearTimeout(rotateTimer);
        rotateTimer = null;
      }
      clearSlot(0);
      clearSlot(1);
      hasImage = false;
      if (clearCache) {
        clearGalleryRuntimeStorage();
      }
    }

    function executeGalleryRuntimeCommand(rawCommand = null) {
      const command = rawCommand && typeof rawCommand === "object" ? rawCommand : null;
      const commandId = command && command.commandId ? String(command.commandId).trim() : "";
      const commandName = command && command.command ? String(command.command).trim() : "";
      const clearCache = Boolean(command && command.clearCache);

      if (!commandId || !commandName) return false;
      if (commandId === lastHandledRuntimeCommandId) return false;
      if (commandName !== "reload_gallery" && commandName !== "clear_cache_reload_gallery") return false;

      persistHandledRuntimeCommandId(commandId);
      prepareReload(clearCache);
      window.location.replace(buildReloadUrl(commandId, clearCache));
      return true;
    }

    function loadImageIntoSlot(slotIndex, photo, timeoutMs = IMAGE_LOAD_TIMEOUT_MS) {
      const img = imgSlots[slotIndex];
      const url = buildPhotoUrl(photo);
      if (!img || !url) {
        return Promise.reject(new Error("missing_photo_url"));
      }

      return new Promise((resolve, reject) => {
        let settled = false;
        const timer = setTimeout(() => {
          if (settled) return;
          settled = true;
          cleanup(true);
          reject(new Error("image_load_timeout"));
        }, timeoutMs);

        function cleanup(clearSrc = false) {
          clearTimeout(timer);
          img.onload = null;
          img.onerror = null;
          if (clearSrc) {
            try {
              img.removeAttribute("src");
            } catch (_) {}
            try {
              img.src = "";
            } catch (_) {}
          }
        }

        function finalizeSuccess() {
          if (settled) return;
          if (!img.naturalWidth || !img.naturalHeight) {
            settled = true;
            cleanup(true);
            reject(new Error("image_invalid_dimensions"));
            return;
          }
          settled = true;
          cleanup(false);
          resolve(url);
        }

        img.onload = finalizeSuccess;
        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup(true);
          reject(new Error("image_load_failed"));
        };
        img.src = url;

        if (img.complete && img.naturalWidth > 0) {
          finalizeSuccess();
        }
      });
    }

    function commitVisiblePhoto(photo, nextIndex, previousIndex) {
      const nextImg = imgSlots[nextIndex];
      const previousImg = previousIndex >= 0 ? imgSlots[previousIndex] : null;
      let settled = false;

      function cleanupPrevious() {
        if (previousIndex >= 0 && previousIndex !== nextIndex) {
          clearSlot(previousIndex);
        }
      }

      function finalize() {
        if (settled) return;
        settled = true;
        try {
          nextImg.removeEventListener("transitionend", handleTransitionEnd);
        } catch (_) {}
        cleanupPrevious();
      }

      function handleTransitionEnd(event) {
        if (event && event.target !== nextImg) return;
        finalize();
      }

      try {
        nextImg.addEventListener("transitionend", handleTransitionEnd);
      } catch (_) {}

      nextImg.classList.add("visible");
      if (previousImg && previousImg !== nextImg) {
        previousImg.classList.remove("visible");
      }

      activeIndex = nextIndex;
      hasImage = true;
      currentPhotoId = photo && photo.id ? String(photo.id) : "";
      hideEmptyState();
      updateTicketBadge(photo && photo.name ? photo.name : "");

      if (previousIndex < 0) {
        finalize();
      } else {
        setTimeout(finalize, TRANSITION_FALLBACK_MS);
      }
    }

    async function showPhotoAtIndex(targetIndex = currentIndex) {
      if (!photos.length) {
        setEmptyState();
        return false;
      }

      let nextIndex = Number.isFinite(targetIndex) ? targetIndex : currentIndex;
      if (nextIndex < 0) nextIndex = 0;
      if (nextIndex >= photos.length) nextIndex = nextIndex % photos.length;

      const photo = photos[nextIndex];
      if (!photo || !photo.id) return false;

      const previousIndex = hasImage ? activeIndex : -1;
      const incomingSlotIndex = hasImage ? 1 - activeIndex : activeIndex;
      const incomingImg = imgSlots[incomingSlotIndex];
      if (!incomingImg) return false;

      incomingImg.classList.remove("visible");

      try {
        await loadImageIntoSlot(incomingSlotIndex, photo);
        commitVisiblePhoto(photo, incomingSlotIndex, previousIndex);
        currentIndex = nextIndex;
        return true;
      } catch (err) {
        console.error("Error loading photo", err);
        clearSlot(incomingSlotIndex);
        return false;
      }
    }

    function scheduleNextRotation(delayMs = DISPLAY_MS) {
      if (rotateTimer) {
        clearTimeout(rotateTimer);
      }

      rotateTimer = setTimeout(async () => {
        rotateTimer = null;
        if (!photos.length) {
          setEmptyState();
          return;
        }

        if (photos.length === 1) {
          scheduleNextRotation(DISPLAY_MS);
          return;
        }

        const nextIndex = (currentIndex + 1) % photos.length;
        const didShow = await showPhotoAtIndex(nextIndex);
        scheduleNextRotation(didShow ? DISPLAY_MS : 1500);
      }, delayMs);
    }

    async function startRotation(options = {}) {
      const { preserveCurrentVisible = false } = options;
      if (rotateTimer) {
        clearTimeout(rotateTimer);
        rotateTimer = null;
      }

      if (!photos.length) {
        setEmptyState();
        return;
      }

      normalizeCurrentIndex();

      if (!preserveCurrentVisible || !hasImage) {
        const didShow = await showPhotoAtIndex(currentIndex);
        if (!didShow) {
          scheduleNextRotation(1500);
          return;
        }
      }

      if (photos.length > 1) {
        scheduleNextRotation(DISPLAY_MS);
      }
    }

    async function fetchApproved() {
      try {
        const res = await fetch(`${BASE_URL}/gallery/approved`, { cache: "no-store" });
        if (!res.ok) {
          console.error("Error fetching approved list", res.status);
          if (!hasImage && !photos.length) {
            showEmptyState();
          }
          return false;
        }

        const data = await res.json();
        if (!data || !data.ok) {
          console.error("API returned not ok", data);
          if (!hasImage && !photos.length) {
            showEmptyState();
          }
          return false;
        }

        if (executeGalleryRuntimeCommand(data.galleryRuntimeCommand || null)) {
          return true;
        }

        approvedManifestVersion = String(data.manifestVersion || "").trim();

        if (data.legacyOverlay && data.legacyOverlay.enabled && data.legacyOverlay.overlayVersion) {
          applyOverlayVersion(String(data.legacyOverlay.overlayVersion || "").trim());
        } else if (!overlayEl.getAttribute("src")) {
          applyOverlayVersion("");
        }

        const previousIds = photos.map((photo) => String(photo.id || "")).join(",");
        const nextPhotos = sortPhotos(Array.isArray(data.files) ? data.files : []);
        const nextIds = nextPhotos.map((photo) => String(photo.id || "")).join(",");

        photos = nextPhotos;

        if (!photos.length) {
          setEmptyState();
          return true;
        }

        if (!hasImage) {
          currentIndex = 0;
          await startRotation({ preserveCurrentVisible: false });
          return true;
        }

        const visibleIndex = currentPhotoId
          ? photos.findIndex((photo) => String(photo.id) === currentPhotoId)
          : -1;

        if (visibleIndex >= 0) {
          currentIndex = visibleIndex;
        } else {
          currentIndex = 0;
        }

        if (previousIds !== nextIds) {
          if (visibleIndex < 0) {
            await startRotation({ preserveCurrentVisible: false });
          } else if (!rotateTimer && photos.length > 1) {
            await startRotation({ preserveCurrentVisible: true });
          }
        } else if (!rotateTimer && photos.length > 1) {
          scheduleNextRotation(DISPLAY_MS);
        }

        return true;
      } catch (err) {
        console.error("Failed to fetch approved photos", err);
        if (!hasImage && !photos.length) {
          showEmptyState();
        }
        return false;
      }
    }

    function startRefreshLoop() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
      refreshTimer = setInterval(fetchApproved, REFRESH_MS);
    }

    applyOverlayVersion("");
    fetchApproved().finally(startRefreshLoop);
  </script>
</body>
</html>
