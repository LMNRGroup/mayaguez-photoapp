    function normalizeAssetUrl(url) {
      if (!url) return "";
      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      if (url.startsWith("/")) return `${BASE_URL}${url}`;
      return url;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = REQUEST_TIMEOUT_MS, pendingMeta = null) {
      const route = sanitizeMonitorRoute(url);
      const pendingName = pendingMeta && pendingMeta.name ? String(pendingMeta.name) : "";
      let registeredPendingName = "";

      if (typeof AbortController === "function") {
        const controller = new AbortController();
        let didTimeout = false;
        const externalSignal = options && options.signal ? options.signal : null;
        if (pendingName) {
          registerPendingFetch({
            ...pendingMeta,
            name: pendingName,
            route: pendingMeta.route || route,
            startAt: Date.now(),
            timeoutMs,
            controller,
          });
          registeredPendingName = pendingName;
        }
        const timer = setTimeout(() => {
          didTimeout = true;
          controller.abort();
        }, timeoutMs);
        let removeAbortListener = null;
        if (externalSignal && typeof externalSignal.addEventListener === "function") {
          const handleExternalAbort = () => controller.abort();
          if (externalSignal.aborted) {
            controller.abort();
          } else {
            externalSignal.addEventListener("abort", handleExternalAbort, { once: true });
            removeAbortListener = () => {
              try {
                externalSignal.removeEventListener("abort", handleExternalAbort);
              } catch (_) {}
            };
          }
        }
        try {
          const { signal, ...restOptions } = options || {};
          return await fetch(url, { ...restOptions, signal: controller.signal });
        } catch (err) {
          captureGallerySentryFetchFailure(route, err, pendingMeta || { category: "fetch" });
          if (didTimeout) {
            throw createMonitorError("request_timeout", { route, code: "request_timeout", cause: err });
          }
          if (err && err.name === "AbortError") {
            throw createMonitorError("request_aborted", { route, code: "request_aborted", cause: err });
          }
          throw err;
        } finally {
          clearTimeout(timer);
          if (removeAbortListener) removeAbortListener();
          if (registeredPendingName) unregisterPendingFetch(registeredPendingName);
        }
      }

      if (pendingName) {
        registerPendingFetch({
          ...pendingMeta,
          name: pendingName,
          route: pendingMeta.route || route,
          startAt: Date.now(),
          timeoutMs,
          controller: null,
        });
        registeredPendingName = pendingName;
      }
      try {
        return await Promise.race([
          fetch(url, options),
          new Promise((_, reject) => setTimeout(() => reject(createMonitorError("request_timeout", { route, code: "request_timeout" })), timeoutMs)),
        ]);
      } catch (err) {
        captureGallerySentryFetchFailure(route, err, pendingMeta || { category: "fetch" });
        throw err;
      } finally {
        if (registeredPendingName) unregisterPendingFetch(registeredPendingName);
      }
    }

    function applyGalleryRuntimeSettings(nextSettingsInput = {}, meta = {}) {
      try {
        const previousSettings = normalizeGalleryRuntimeSettings(galleryRuntimeSettings);
        const nextSettings = normalizeGalleryRuntimeSettings(nextSettingsInput);
        const previousVersion = runtimeSettingsVersion || "default";
        const nextVersion = clampMonitorString(meta.runtimeSettingsVersion || previousVersion || "default", 60) || "default";
        const settingsValueChanged = JSON.stringify(previousSettings) !== JSON.stringify(nextSettings);
        const settingsVersionChanged = previousVersion !== nextVersion;
        const settingsChanged = settingsValueChanged || settingsVersionChanged;

        galleryRuntimeSettings = nextSettings;
        disabledSystems = buildDisabledSystemsList(nextSettings);
        runtimeSettingsVersion = nextVersion;
        lastRuntimeSettingsAppliedAt = new Date().toISOString();
        settingsApplyCount += 1;
        applyGalleryTransitionMode();

        if (!isGalleryDebugOverlayEnabled()) {
          stopGalleryDebugOverlayLoop();
          if (debugOverlayEl) {
            debugOverlayEl.classList.remove("visible");
            debugOverlayEl.setAttribute("aria-hidden", "true");
          }
        } else if (!debugOverlayInterval) {
          startGalleryDebugOverlayLoop();
        }
        if (settingsValueChanged) {
          debugOverlayLatchedVisible = false;
        }

        if (!isFlattenedOverlayRuntimeEnabled()) {
          stopOverlayRefreshLoop();
          abortPendingFetchesByCategory("overlay_fetch", "overlay_runtime_disabled");
          if (
            previousSettings.enableFlattenedOverlay ||
            previousSettings.enableOverlayPolling ||
            currentOverlayFileId ||
            activeOverlayKey ||
            lastGoodOverlayMeta ||
            (templateOverlayEl && templateOverlayEl.getAttribute("src"))
          ) {
            clearOverlayLayer("runtime_overlay_disabled");
          }
          if (settingsValueChanged && (previousSettings.enableFlattenedOverlay || previousSettings.enableOverlayPolling)) {
            recordOverlayBypassedIfNeeded("Flattened overlay runtime disabled by config");
          }
        } else if (settingsValueChanged || !overlayRefreshTimer) {
          overlayBypassedLogged = false;
          scheduleOverlayPoll(0);
        }

        if (!isDynamicTemplateRuntimeEnabled()) {
          stopTemplateRefreshLoop();
          disableDynamicTemplateLayer();
          clearTemplateLayers({ force: true, reason: "runtime_template_disabled" });
          if (settingsValueChanged && previousSettings.enableDynamicTemplateRuntime) {
            recordGalleryDebugEvent({
              severity: "warn",
              category: "template",
              code: "TEMPLATE_BYPASSED",
              subsystem: "template",
              route: "/gallery/active-template",
              diagnosis: "TEMPLATE RUNTIME OFF — safe mode active",
              message: "Dynamic template runtime disabled by config",
              action: "Keep template runtime off until photo playback is stable.",
            });
          }
        } else if (settingsValueChanged || !templateRefreshTimer) {
          startTemplateRefreshLoop();
        }

        if (isRuntimeWatchdogEnabled()) {
          if (!runtimeWatchdogTimer) {
            startRuntimeWatchdog();
          }
        } else {
          stopRuntimeWatchdogLoop();
        }

        if (settingsChanged) {
          appendSettingsRuntimeLog("SETTINGS_APPLIED", {
            runtimeSettingsVersion: nextVersion,
            disabledSystems,
            settingsApplyCount,
          }, 5000);
          galleryDebug("gallery runtime settings applied", {
            previousSettings,
            nextSettings,
            runtimeSettingsVersion: nextVersion,
            disabledSystems,
          });
        } else {
          appendSettingsRuntimeLog("SETTINGS_UNCHANGED", {
            runtimeSettingsVersion: nextVersion,
            settingsApplyCount,
          });
        }
        refreshGallerySentryScope({ source: "runtime_settings_applied" });
      } catch (_) {}
    }

    async function fetchGalleryRuntimeSettings() {
      clearStaleInFlightLocks(Date.now());
      if (runtimeSettingsFetchInFlight) return false;
      runtimeSettingsFetchInFlight = true;
      runtimeSettingsFetchStartedAtMs = Date.now();
      try {
        const res = await fetchWithTimeout(
          `${BASE_URL}/gallery/runtime-settings?ts=${Date.now()}`,
          { cache: "no-store" },
          REQUEST_TIMEOUT_MS,
          {
            name: "runtime_settings",
            category: "runtime_settings",
            route: "/gallery/runtime-settings",
            timeoutMs: REQUEST_TIMEOUT_MS,
          }
        );
        if (!res.ok) {
          throw createMonitorError(`settings_http_${res.status}`, { route: "/gallery/runtime-settings", code: "settings_http" });
        }

        const data = await res.json();
        if (!data || !data.ok) {
          throw createMonitorError("settings_payload_not_ok", { route: "/gallery/runtime-settings", code: "settings_payload_not_ok" });
        }

        lastRuntimeSettingsFetchAt = new Date().toISOString();
        lastRuntimeSettingsError = "";
        galleryRuntimeCommand = normalizeGalleryRuntimeCommand(data.galleryRuntimeCommand);
        appendSettingsRuntimeLog("SETTINGS_FETCH_OK", {
          runtimeSettingsVersion: data.runtimeSettingsVersion || "default",
        }, 10000);
        applyGalleryRuntimeSettings(data.runtimeSettings || DEFAULT_GALLERY_RUNTIME_SETTINGS, {
          runtimeSettingsVersion: data.runtimeSettingsVersion || "default",
          disabledSystems: Array.isArray(data.disabledSystems) ? data.disabledSystems : [],
        });
        if (galleryRuntimeCommand) {
          await executeGalleryRuntimeCommand(galleryRuntimeCommand);
        }
        return true;
      } catch (err) {
        settingsFetchFailures += 1;
        lastRuntimeSettingsError = err && err.message ? err.message : String(err);
        appendSettingsRuntimeLog("SETTINGS_FETCH_FAIL", {
          error: lastRuntimeSettingsError,
          settingsFetchFailures,
        }, 5000);
        recordGalleryDebugEvent({
          severity: "warn",
          category: "settings",
          code: "SETTINGS_FAIL",
          subsystem: "settings",
          route: "/gallery/runtime-settings",
          diagnosis: "SETTINGS FAIL — using current runtime mode",
          message: lastRuntimeSettingsError,
          action: "Keep current safe mode; check runtime settings route.",
        });
        return false;
      } finally {
        runtimeSettingsFetchInFlight = false;
        runtimeSettingsFetchStartedAtMs = 0;
      }
    }

    function normalizePhotoBox(photoBox) {
      const fallback = { ...DEFAULT_PHOTO_BOX };
      if (!photoBox || typeof photoBox !== "object") {
        return fallback;
      }

      const x = Number(photoBox.x);
      const y = Number(photoBox.y);
      const width = Number(photoBox.width);
      const height = Number(photoBox.height);
      if (![x, y, width, height].every(Number.isFinite) || width <= 0 || height <= 0) {
        return fallback;
      }

      return {
        x: Math.max(0, Math.min(1920, Math.round(x))),
        y: Math.max(0, Math.min(1080, Math.round(y))),
        width: Math.max(1, Math.min(1920, Math.round(width))),
        height: Math.max(1, Math.min(1080, Math.round(height))),
      };
    }

    function applyPhotoBox(photoBox) {
      if (!photoWindowEl) return;
      const nextPhotoBox = normalizePhotoBox(photoBox);
      photoWindowEl.style.left = `${(nextPhotoBox.x / 1920) * 100}%`;
      photoWindowEl.style.top = `${(nextPhotoBox.y / 1080) * 100}%`;
      photoWindowEl.style.width = `${(nextPhotoBox.width / 1920) * 100}%`;
      photoWindowEl.style.height = `${(nextPhotoBox.height / 1080) * 100}%`;
      galleryDebug("photo box applied", nextPhotoBox);
    }

    function clearOverlayLayer(reason = "unspecified") {
      if (templateOverlayEl) {
        templateOverlayEl.removeAttribute("src");
        templateOverlayEl.style.display = "none";
      }
      activeOverlayKey = "";
      currentOverlayFileId = "";
      currentOverlayVersion = "";
      lastGoodOverlayMeta = null;
      applyPhotoBox(DEFAULT_PHOTO_BOX);
      setRecoveryAction(`overlay_cleared:${reason}`);
      galleryDebug("overlay cleared", { reason });
    }

    function disableDynamicTemplateLayer() {
      if (templateBackgroundEl) {
        templateBackgroundEl.removeAttribute("src");
        templateBackgroundEl.style.display = "none";
        templateBackgroundEl.style.pointerEvents = "none";
      }
      if (templateLogosEl) {
        templateLogosEl.innerHTML = "";
        templateLogosEl.style.pointerEvents = "none";
      }
      galleryDebug("dynamic template layer disabled");
    }

    function buildOverlayKey(data) {
      if (!data || !data.enabled || !data.overlayFileId) return "";
      const photoBox = normalizePhotoBox(data.photoBox);
      return JSON.stringify({
        templateId: String(data.templateId || ""),
        overlayFileId: String(data.overlayFileId || ""),
        templateVersion: String(data.templateVersion || ""),
        photoBox,
      });
    }

    function describeOverlay(data, overlayKey = "") {
      return {
        templateId: data && data.templateId ? String(data.templateId) : "",
        templateName: data && data.templateName ? String(data.templateName) : "",
        overlayFileId: data && data.overlayFileId ? String(data.overlayFileId) : "",
        templateVersion: data && data.templateVersion ? String(data.templateVersion) : "",
        overlayUrl: data && data.overlayUrl ? normalizeAssetUrl(data.overlayUrl) : "",
        overlayKey: overlayKey || buildOverlayKey(data),
        photoBox: normalizePhotoBox(data && data.photoBox),
      };
    }

    async function preloadOverlayImage(src, timeoutMs = IMAGE_LOAD_TIMEOUT_MS) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        let settled = false;
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("overlay_load_timeout"));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          img.onload = null;
          img.onerror = null;
        }

        async function settleSuccess() {
          if (settled) return;
          settled = true;
          cleanup();
          try {
            if (typeof img.decode === "function") {
              await img.decode();
            }
          } catch (decodeErr) {
            galleryDebug("overlay decode warning", {
              src,
              error: decodeErr && decodeErr.message ? decodeErr.message : String(decodeErr),
            });
          }
          resolve({
            src,
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
        }

        img.onload = settleSuccess;
        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error("overlay_load_failed"));
        };
        img.src = src;

        if (img.complete && img.naturalWidth > 0) {
          void settleSuccess();
        }
      });
    }

    async function commitOverlay(data, overlayKey, requestId) {
      const overlaySummary = describeOverlay(data, overlayKey);
      overlayLoadAttempt += 1;
      galleryDebug("overlay load start", {
        requestId,
        attempt: overlayLoadAttempt,
        ...overlaySummary,
        currentOverlayFileId,
        lastGoodOverlay: lastGoodOverlayMeta,
      });

      const overlayAsset = await preloadOverlayImage(overlaySummary.overlayUrl);
      if (requestId !== activeOverlayRequestId) {
        galleryDebug("overlay commit skipped because a newer request is active", {
          requestId,
          activeOverlayRequestId,
          overlayKey,
        });
        return false;
      }

      if (templateOverlayEl) {
        templateOverlayEl.src = overlayAsset.src;
        templateOverlayEl.style.display = "block";
      }

      applyPhotoBox(overlaySummary.photoBox);
      activeOverlayKey = overlayKey;
      currentOverlayFileId = overlaySummary.overlayFileId;
      currentOverlayVersion = overlaySummary.templateVersion;
      lastGoodOverlayMeta = overlaySummary;
      galleryDebug("overlay load success", {
        requestId,
        ...overlaySummary,
        naturalWidth: overlayAsset.naturalWidth,
        naturalHeight: overlayAsset.naturalHeight,
      });
      return true;
    }

    function setGalleryStatus(message = "") {
      if (!emptyEl) return;
      emptyEl.textContent = message;
      emptyEl.classList.toggle("hidden", !message);
    }

    function hasCommittedTemplate() {
      return Boolean(
        activeTemplateKey ||
        (templateBackgroundEl && templateBackgroundEl.getAttribute("src")) ||
        (templateLogosEl && templateLogosEl.childElementCount > 0)
      );
    }

    function disableTemplateLayerForLiveMode() {
      disableDynamicTemplateLayer();
      activeTemplateKey = "";
      lastTemplateMetadata = null;
      galleryDebug("template rendering disabled for live mode; dynamic template layer cleared once");
    }

    function clearTemplateLayers(options = {}) {
      if (!TEMPLATE_RENDERING_ENABLED) {
        galleryDebug("clearTemplateLayers skipped because template rendering is disabled");
        return false;
      }

      const { force = false, reason = "unspecified" } = options;
      const committedTemplate = hasCommittedTemplate();

      galleryDebug("clearTemplateLayers requested", {
        force,
        reason,
        activeTemplateKey,
        committedTemplate,
      });

      if (!force && committedTemplate) {
        galleryDebug("clearTemplateLayers skipped to preserve last-known-good template", {
          reason,
          activeTemplateKey,
        });
        return false;
      }

      if (templateBackgroundEl) {
        templateBackgroundEl.removeAttribute("src");
        templateBackgroundEl.style.display = "none";
      }
      if (templateLogosEl) {
        templateLogosEl.innerHTML = "";
      }
      activeTemplateKey = "";
      lastTemplateMetadata = null;
      galleryDebug("clearTemplateLayers applied", { reason });
      return true;
    }

    function buildTemplateKey(template) {
      if (!template) return "";
      return JSON.stringify({
        id: template.id || "",
        background: template.background ? template.background.url || template.background.value || "" : "",
        logos: Array.isArray(template.logos)
          ? template.logos.map((logo) => [
              logo.url || logo.value || "",
              logo.x || 0,
              logo.y || 0,
              logo.width || 0,
              logo.height || 0,
            ])
          : [],
      });
    }

    function describeTemplate(template, templateKey = "") {
      return {
        id: template && template.id ? String(template.id) : "",
        key: templateKey || buildTemplateKey(template),
        background: template && template.background ? template.background.url || template.background.value || "" : "",
        logos: Array.isArray(template && template.logos)
          ? template.logos.map((logo) => logo.url || logo.value || "")
          : [],
      };
    }

    async function preloadImageAsset(src, label, timeoutMs = IMAGE_LOAD_TIMEOUT_MS) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        let settled = false;
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error(`${label}_timeout`));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          img.onload = null;
          img.onerror = null;
        }

        function settleSuccess() {
          if (settled) return;
          settled = true;
          cleanup();
          galleryDebug("template asset loaded", {
            label,
            src,
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
          resolve({
            src,
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
        }

        img.onload = async () => {
          try {
            if (typeof img.decode === "function") {
              await img.decode();
            }
          } catch (decodeErr) {
            galleryDebug("template asset decode warning", {
              label,
              src,
              error: decodeErr && decodeErr.message ? decodeErr.message : String(decodeErr),
            });
          }
          settleSuccess();
        };

        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error(`${label}_load_failed`));
        };

        img.src = src;

        if (img.complete && img.naturalWidth > 0) {
          settleSuccess();
        }
      });
    }

    async function preloadTemplateAssets(template, templateKey) {
      const normalizedBackgroundUrl = template && template.background && template.background.url
        ? normalizeAssetUrl(template.background.url)
        : "";
      const baseWidth = Number(template && template.canvasWidth) || 1920;
      const baseHeight = Number(template && template.canvasHeight) || 1080;
      const logoEntries = Array.isArray(template && template.logos) ? template.logos : [];

      galleryDebug("template preload start", {
        attempt: templateLoadAttempt,
        templateId: template && template.id ? String(template.id) : "",
        templateKey,
        backgroundUrl: normalizedBackgroundUrl,
        logoCount: logoEntries.length,
      });

      const backgroundAsset = normalizedBackgroundUrl
        ? await preloadImageAsset(normalizedBackgroundUrl, "background")
        : null;

      const logos = await Promise.all(logoEntries.map(async (logo, index) => {
        const normalizedLogoUrl = normalizeAssetUrl(logo.url || logo.value || "");
        if (!normalizedLogoUrl) {
          throw new Error(`logo_${index}_missing_url`);
        }
        const asset = await preloadImageAsset(normalizedLogoUrl, `logo_${index}`);
        return {
          src: normalizedLogoUrl,
          x: Number(logo.x) || 0,
          y: Number(logo.y) || 0,
          width: Number(logo.width) || 0,
          height: Number(logo.height) || 0,
          baseWidth,
          baseHeight,
          naturalWidth: asset.naturalWidth,
          naturalHeight: asset.naturalHeight,
        };
      }));

      return {
        baseWidth,
        baseHeight,
        backgroundAsset,
        logos,
      };
    }

    function commitTemplateRender(template, templateKey, assets) {
      galleryDebug("template commit", {
        templateId: template && template.id ? String(template.id) : "",
        templateKey,
        backgroundUrl: assets.backgroundAsset ? assets.backgroundAsset.src : "",
        logoCount: assets.logos.length,
      });

      if (templateBackgroundEl) {
        if (assets.backgroundAsset && assets.backgroundAsset.src) {
          templateBackgroundEl.src = assets.backgroundAsset.src;
          templateBackgroundEl.style.display = "block";
        } else {
          templateBackgroundEl.removeAttribute("src");
          templateBackgroundEl.style.display = "none";
        }
      }

      if (templateLogosEl) {
        const nextFragment = document.createDocumentFragment();
        assets.logos.forEach((logo, index) => {
          const logoEl = document.createElement("div");
          logoEl.className = "template-logo-layer";
          logoEl.style.left = `${(logo.x / assets.baseWidth) * 100}%`;
          logoEl.style.top = `${(logo.y / assets.baseHeight) * 100}%`;
          logoEl.style.width = `${(logo.width / assets.baseWidth) * 100}%`;
          logoEl.style.height = `${(logo.height / assets.baseHeight) * 100}%`;

          const img = document.createElement("img");
          img.src = logo.src;
          img.alt = "";
          img.dataset.logoIndex = String(index);
          logoEl.appendChild(img);
          nextFragment.appendChild(logoEl);
        });

        templateLogosEl.innerHTML = "";
        templateLogosEl.appendChild(nextFragment);
      }

      activeTemplateKey = templateKey;
      lastTemplateMetadata = describeTemplate(template, templateKey);
      galleryDebug("template commit complete", {
        activeTemplateKey,
        templateId: lastTemplateMetadata.id,
      });
    }

    async function renderTemplate(template, options = {}) {
      if (!isDynamicTemplateRuntimeEnabled()) {
        galleryDebug("renderTemplate skipped because template runtime is disabled");
        return false;
      }

      const responseMeta = options && options.responseMeta ? options.responseMeta : {};
      const expectedRequestId = options && Number.isFinite(Number(options.requestId))
        ? Number(options.requestId)
        : 0;

      if (!template) {
        galleryDebug("template render skipped because payload is null", {
          responseMeta,
          lastTemplateMetadata,
        });
        if (responseMeta && responseMeta.disabled) {
          clearTemplateLayers({ force: true, reason: "server_disabled_template" });
        }
        return false;
      }

      const templateKey = buildTemplateKey(template);
      if (templateKey === activeTemplateKey) {
        galleryDebug("template render skipped because template already active", {
          templateId: template.id || "",
          templateKey,
        });
        return true;
      }

      const templateSummary = describeTemplate(template, templateKey);
      templateLoadAttempt += 1;
      galleryDebug("template render requested", {
        attempt: templateLoadAttempt,
        ...templateSummary,
        responseMeta,
        expectedRequestId,
      });

      try {
        const assets = await preloadTemplateAssets(template, templateKey);
        if (expectedRequestId && expectedRequestId !== activeTemplateRequestId) {
          galleryDebug("template render commit skipped because a newer request became active", {
            expectedRequestId,
            activeTemplateRequestId,
            templateKey,
          });
          return false;
        }
        commitTemplateRender(template, templateKey, assets);
        return true;
      } catch (err) {
        recordTemplateFailure(err && err.message ? err.message : String(err), {
          type: "template_render_failure",
          route: templateSummary.backgroundUrl || "/gallery/active-template",
        });
        setRecoveryAction("kept_last_template_after_render_failure");
        galleryDebug("template render failed; keeping last-known-good template", {
          attempt: templateLoadAttempt,
          ...templateSummary,
          error: err && err.message ? err.message : String(err),
          currentVisibleTemplateKey: activeTemplateKey,
        });
        return false;
      }
    }

    async function fetchActiveTemplate() {
      if (!isDynamicTemplateRuntimeEnabled()) {
        galleryDebug("fetchActiveTemplate skipped because template runtime is disabled");
        return;
      }

      const requestId = ++activeTemplateRequestId;
      galleryDebug("template fetch start", {
        requestId,
        currentVisibleTemplateKey: activeTemplateKey,
      });
      try {
        const res = await fetchWithTimeout(`${BASE_URL}/gallery/active-template?ts=${Date.now()}`, {
          cache: "no-store",
        });
        if (!res.ok) {
          recordTemplateFailure(`template_http_${res.status}`, {
            type: "template_fetch_failure",
            route: "/gallery/active-template",
          });
          console.error("Error fetching active template", res.status);
          galleryDebug("template fetch failed", { requestId, status: res.status });
          return;
        }

        const data = await res.json();
        if (requestId !== activeTemplateRequestId) {
          galleryDebug("template fetch ignored because a newer request exists", { requestId });
          return;
        }
        if (!data.ok) {
          recordTemplateFailure("template_payload_not_ok", {
            type: "template_fetch_failure",
            route: "/gallery/active-template",
          });
          console.error("Active template API returned not ok", data);
          galleryDebug("template fetch returned non-ok payload", { requestId, data });
          return;
        }

        galleryDebug("template fetch success", {
          requestId,
          meta: data.meta || null,
          template: data.template ? describeTemplate(data.template) : null,
        });

        await renderTemplate(data.template || null, {
          responseMeta: data.meta || null,
          requestId,
        });
      } catch (err) {
        recordTemplateFailure(err && err.message ? err.message : String(err), {
          type: "template_fetch_failure",
          route: "/gallery/active-template",
        });
        console.error("Failed to fetch active template", err);
        galleryDebug("template fetch exception", {
          requestId,
          error: err && err.message ? err.message : String(err),
        });
      }
    }

    // --- Ticket helpers (from filename) ---

    function getTicketFromName(name) {
      if (!name || typeof name !== "string") return null;

      // New pattern: T001-...
      let match = name.match(/^T(\d{1,})-/i);
      if (match) return parseInt(match[1], 10);

      // Legacy pattern: 01_...
      match = name.match(/^(\d{1,})_/);
      if (match) return parseInt(match[1], 10);

      return null;
    }

    function formatTicketLabel(num) {
      if (num == null || !Number.isFinite(Number(num))) return null;
      const n = Number(num);
      return "#" + String(n).padStart(3, "0");
    }

    function updateTicketBadge(fileName) {
      if (!ticketBadgeEl) return;

      const ticketNum = getTicketFromName(fileName);
      const label = formatTicketLabel(ticketNum);

      if (!label) {
        ticketBadgeEl.style.display = "none";
        ticketBadgeEl.textContent = "";
        return;
      }

      ticketBadgeEl.textContent = label;
      ticketBadgeEl.style.display = "block";
    }

    function hideTicketBadge() {
      if (!ticketBadgeEl) return;
      ticketBadgeEl.style.display = "none";
      ticketBadgeEl.textContent = "";
    }

    function setEmptyState(options = {}) {
      const { force = false, reason = "unspecified" } = options;
      galleryDebug("setEmptyState requested", {
        force,
        reason,
        consecutiveEmptyApprovedResponses,
        hasImage,
        currentPhotoId,
      });

      if (!force) {
        galleryDebug("setEmptyState blocked to preserve last-known-good photo", {
          reason,
          currentPhotoId,
        });
        return false;
      }

      rotationLoopToken += 1;
      photoTransitionToken += 1;
      clearNamedTimer("rotation");
      rotateTimer = null;

      imgSlots.forEach((img, index) => {
        img.classList.remove("visible");
        clearSlotObjectUrl(index, { clearSrc: true, clearPhotoId: true });
      });
      showQrWaitingScreen("approved_empty");
      hideTicketBadge();
      hasImage = false;
      currentPhotoId = "";
      currentPhotoName = "";
      currentDisplayedPhotoIndex = -1;
      setRecoveryAction(`set_empty_state:${reason}`);
      setSlideshowState(SLIDESHOW_STATES.empty, reason);
      stuckAtIndexCount = 0;
      loadingSlotIndex = -1;
      galleryDebug("setEmptyState applied", { reason });
      return true;
    }

    async function loadImageIntoSlot(slotIndex, url, timeoutMs = IMAGE_LOAD_TIMEOUT_MS, photoId = "", options = {}) {
      clearStaleInFlightLocks(Date.now());
      const { transitionToken = null } = options;
      const img = imgSlots[slotIndex];
      const photoRoute = sanitizeMonitorRoute(url);
      const targetPhotoId = photoId ? String(photoId) : "";
      const targetPhotoName = targetPhotoId ? findPhotoNameById(targetPhotoId) : "";
      let objectUrl = "";
      const pendingFetchName = `photo_slot_${slotIndex}_${transitionToken != null ? transitionToken : "current"}`;
      const lifecycleStartedAtMs = Date.now();
      const lifecycleBase = {
        slotIndex,
        photoId: targetPhotoId,
        photoName: targetPhotoName,
        transitionToken,
        startedAtMs: lifecycleStartedAtMs,
      };

      recordImageLifecycleEvent("fetch_start", lifecycleBase);
      registerPendingFetch({
        name: pendingFetchName,
        category: "photo_fetch",
        route: photoRoute,
        startAt: lifecycleStartedAtMs,
        timeoutMs: PHOTO_FETCH_PIPELINE_TIMEOUT_MS,
        photoId: targetPhotoId,
        photoName: targetPhotoName,
      });

      try {
        if (!img) {
          throw new Error("missing_image_slot");
        }

        const response = await fetchWithTimeout(
          url,
          { cache: "no-store" },
          timeoutMs,
          {
            name: `${pendingFetchName}_http`,
            category: "photo_fetch",
            route: photoRoute,
            timeoutMs,
            photoId: targetPhotoId,
            photoName: targetPhotoName,
          }
        );
        if (!response.ok) {
          imageLifecycleDetections.fetchFailed = true;
          recordImageLifecycleEvent("fetch_failed", {
            ...lifecycleBase,
            error: `image_http_${response.status}`,
          });
          throw new Error(`image_http_${response.status}`);
        }

        recordImageLifecycleEvent("fetch_success", {
          ...lifecycleBase,
          durationMs: Date.now() - lifecycleStartedAtMs,
        });

        const blob = await response.blob();
        recordImageLifecycleEvent("blob_created", {
          ...lifecycleBase,
          durationMs: Date.now() - lifecycleStartedAtMs,
        });

        objectUrl = createTrackedObjectUrl(blob);
        recordImageLifecycleEvent("object_url_created", {
          ...lifecycleBase,
          durationMs: Date.now() - lifecycleStartedAtMs,
        });
        auditObjectUrlPressure("loadImageIntoSlot");

        return await new Promise((resolve, reject) => {
          let settled = false;
          let readinessProbe = 0;
          const readinessProbeName = `image_readiness_probe_${slotIndex}_${transitionToken != null ? transitionToken : lifecycleStartedAtMs}`;
          const imgPipelineStartedAtMs = Date.now();
          const timer = setTimeout(() => {
            if (!settled) {
              imageLifecycleDetections.onloadNeverFired = true;
              recordImageLifecycleEvent("transition_timeout", {
                ...lifecycleBase,
                error: "image_load_timeout",
                durationMs: Date.now() - imgPipelineStartedAtMs,
              });
              recordImageLifecycleEvent("onload_never_fired", {
                ...lifecycleBase,
                error: "image_load_timeout",
              });
            }
            cleanup();
            reject(new Error("image_load_timeout"));
          }, timeoutMs);

          let cleanup = () => {
            clearTimeout(timer);
            clearNamedInterval(readinessProbeName);
            readinessProbe = 0;
            img.onload = null;
            img.onerror = null;
          };

          function commit(source = "img_onload") {
            if (settled) return;
            settled = true;
            cleanup();
            clearSlotObjectUrl(slotIndex, { clearSrc: false, clearPhotoId: false });
            slotObjectUrls[slotIndex] = objectUrl;
            slotPhotoIds[slotIndex] = targetPhotoId;
            recordSuccessfulImageLoad();
            recordImageLifecycleEvent(source, {
              ...lifecycleBase,
              naturalWidth: img.naturalWidth || 0,
              naturalHeight: img.naturalHeight || 0,
              durationMs: Date.now() - imgPipelineStartedAtMs,
            });
            recordImageLifecycleEvent("slot_loaded", {
              ...lifecycleBase,
              naturalWidth: img.naturalWidth || 0,
              naturalHeight: img.naturalHeight || 0,
              durationMs: Date.now() - lifecycleStartedAtMs,
            });
            galleryDebug("photo asset loaded", {
              slotIndex,
              photoId: targetPhotoId,
              naturalWidth: img.naturalWidth || 0,
              naturalHeight: img.naturalHeight || 0,
            });
            auditObjectUrlPressure("slot_commit");

            if (typeof img.decode === "function") {
              recordImageLifecycleEvent("decode_start", lifecycleBase);
              img.decode()
                .then(() => {
                  recordImageLifecycleEvent("decode_success", {
                    ...lifecycleBase,
                    naturalWidth: img.naturalWidth || 0,
                    naturalHeight: img.naturalHeight || 0,
                  });
                })
                .catch((decodeErr) => {
                  imageLifecycleDetections.decodeFailed = true;
                  recordImageLifecycleEvent("decode_failed", {
                    ...lifecycleBase,
                    error: decodeErr && decodeErr.message ? decodeErr.message : String(decodeErr),
                  });
                });
            }

            resolve(objectUrl);
          }

          img.onload = () => commit("img_onload");
          img.onerror = () => {
            if (settled) return;
            settled = true;
            cleanup();
            recordImageLifecycleEvent("img_onerror", {
              ...lifecycleBase,
              error: "image_load_failed",
              durationMs: Date.now() - imgPipelineStartedAtMs,
            });
            reject(new Error("image_load_failed"));
          };

          recordImageLifecycleEvent("img_src_assigned", {
            ...lifecycleBase,
            durationMs: Date.now() - imgPipelineStartedAtMs,
          });
          img.src = objectUrl;

          if (img.complete && img.naturalWidth > 0) {
            commit("img_ready_immediate");
            return;
          }

          readinessProbe = registerInterval(readinessProbeName, setInterval(() => {
            if (img.complete && img.naturalWidth > 0) {
              commit("img_ready_probe");
            }
          }, 250));
        });
      } catch (err) {
        const errorMessage = err && err.message ? err.message : String(err);
        if (
          !imageLifecycleDetections.fetchFailed &&
          (errorMessage === "request_timeout" ||
            errorMessage === "request_aborted" ||
            /^image_http_/i.test(errorMessage))
        ) {
          imageLifecycleDetections.fetchFailed = true;
          recordImageLifecycleEvent("fetch_failed", {
            ...lifecycleBase,
            error: errorMessage,
          });
        }
        if (objectUrl) {
          revokeTrackedObjectUrl(objectUrl);
        }
        if (img) {
          try {
            img.removeAttribute("src");
          } catch (_) {}
          try {
            img.src = "";
          } catch (_) {}
        }
        if (shouldCountImageLoadFailure(err, transitionToken)) {
          recordImageFailure(errorMessage, {
            type: "photo_fetch_failure",
            route: photoRoute || "/gallery/photo",
            currentPhotoId: targetPhotoId,
            currentPhotoName: targetPhotoName,
          });
        }
        throw err;
      } finally {
        unregisterPendingFetch(pendingFetchName);
      }
    }

    function logKeptCurrentPhotoAfterFailure(meta = {}) {
      try {
        keptCurrentPhotoLogCount += 1;
        const payload = {
          currentPhotoId: currentPhotoId || "",
          currentPhotoName: currentPhotoName || "",
          targetPhotoId: meta.targetPhotoId || "",
          visibleImageAgeMs: getVisibleImageAgeMs(),
          recentFailureCount: getRecentFetchFailureCount(),
          error: meta.error || "",
        };
        galleryDebug("keeping current visible photo after failed transition", payload);
        if (keptCurrentPhotoLogCount === 1 || keptCurrentPhotoLogCount % 3 === 0) {
          void sendDeviceLog("warn", "kept_current_photo", "Gallery kept the last visible photo after a failed transition", payload);
        }
        attemptSoftGalleryRecovery("kept_current_photo_after_load_failure");
      } catch (_) {}
    }

    async function performDirectImageSwap(url, photoId = "") {
      const transitionToken = ++photoTransitionToken;
      const targetPhotoId = photoId ? String(photoId) : "";
      const swapStartedAtMs = Date.now();
      const activeImg = imgSlots[activeIndex];
      const nextIndex = hasImage ? (1 - activeIndex) : activeIndex;
      const previousIndex = hasImage ? activeIndex : -1;
      const nextImg = imgSlots[nextIndex];

      setSlideshowState(SLIDESHOW_STATES.transitioning, `direct_swap:${targetPhotoId || "unknown"}`);
      loadingSlotIndex = nextIndex;
      crossfadeInProgress = false;
      crossfadeStallDetected = false;
      currentCrossfadePhotoId = "";
      crossfadeStartedAtMs = 0;
      imageLifecycleDetections.crossfadeNeverCompleted = false;
      recordImageLifecycleEvent("direct_swap_start", {
        photoId: targetPhotoId,
        slotIndex: nextIndex,
        transitionToken,
        startedAtMs: swapStartedAtMs,
      });
      galleryDebug("direct image swap start", {
        transitionToken,
        targetPhotoId,
        currentVisiblePhotoId: currentPhotoId,
      });

      if (!nextImg) {
        setSlideshowState(hasImage ? SLIDESHOW_STATES.displaying : SLIDESHOW_STATES.ready, "direct_swap_missing_slot");
        return false;
      }

      if (hasImage && targetPhotoId && slotPhotoIds[activeIndex] === targetPhotoId && activeImg && activeImg.getAttribute("src")) {
        hideQrWaitingScreen();
        currentPhotoId = targetPhotoId;
        loadingSlotIndex = activeIndex;
        setSlideshowState(SLIDESHOW_STATES.displaying, "reuse_active_slot_direct");
        return true;
      }

      try {
        nextImg.classList.remove("visible");

        const alreadyLoaded = targetPhotoId &&
          slotPhotoIds[nextIndex] === targetPhotoId &&
          nextImg.getAttribute("src");

        if (!alreadyLoaded) {
          await loadImageIntoSlot(nextIndex, url, IMAGE_LOAD_TIMEOUT_MS, photoId, { transitionToken });
        }

        if (transitionToken !== photoTransitionToken) {
          imageLifecycleDetections.loadedNeverVisible = true;
          recordImageLifecycleEvent("image_loaded_never_visible", {
            photoId: targetPhotoId,
            slotIndex: nextIndex,
            transitionToken,
            error: "transition_superseded_before_direct_swap_commit",
          });
          if (nextIndex !== activeIndex) {
            clearSlotObjectUrl(nextIndex, { clearSrc: true, clearPhotoId: true });
          }
          setSlideshowState(hasImage ? SLIDESHOW_STATES.displaying : SLIDESHOW_STATES.ready, "direct_swap_superseded");
          return false;
        }

        nextImg.classList.add("visible");
        hideQrWaitingScreen();
        hasImage = true;
        activeIndex = nextIndex;
        currentPhotoId = targetPhotoId;
        loadingSlotIndex = nextIndex;
        commitVisibleSlotLifecycle(targetPhotoId, nextIndex, transitionToken);
        recordImageLifecycleEvent("direct_swap_committed", {
          photoId: targetPhotoId,
          slotIndex: nextIndex,
          transitionToken,
          startedAtMs: swapStartedAtMs,
          durationMs: Date.now() - swapStartedAtMs,
        });
        recordVisualSwap("direct_swap", swapStartedAtMs);

        if (previousIndex >= 0 && previousIndex !== nextIndex) {
          const previousImg = imgSlots[previousIndex];
          if (previousImg) {
            previousImg.classList.remove("visible");
          }
          clearSlotObjectUrl(previousIndex, { clearSrc: true, clearPhotoId: true });
        }

        setSlideshowState(
          SLIDESHOW_STATES.displaying,
          previousIndex >= 0 ? "direct_swap_committed" : "first_photo_visible_direct_swap"
        );
        galleryDebug("direct image swap committed", {
          transitionToken,
          targetPhotoId,
          activeIndex,
        });
        return true;
      } catch (err) {
        loadingSlotIndex = -1;
        setSlideshowState(hasImage ? SLIDESHOW_STATES.displaying : SLIDESHOW_STATES.ready, "direct_swap_failed_keep_current");
        setRecoveryAction("kept_current_photo_after_load_failure");
        if (shouldCountImageLoadFailure(err, transitionToken)) {
          logKeptCurrentPhotoAfterFailure({
            targetPhotoId,
            error: err && err.message ? err.message : String(err),
          });
        } else if (isMonitorTimeoutOrAbortError(err)) {
          galleryDebug("direct image swap aborted or timed out; keeping current visible photo", {
            transitionToken,
            targetPhotoId,
            currentVisiblePhotoId: currentPhotoId,
            error: err && err.message ? err.message : String(err),
          });
        } else {
          console.error("Error loading photo", err);
          galleryDebug("direct image swap failed; keeping current visible photo", {
            transitionToken,
            targetPhotoId,
            currentVisiblePhotoId: currentPhotoId,
            error: err && err.message ? err.message : String(err),
          });
        }
        return false;
      } finally {
        loadingSlotIndex = -1;
      }
    }

    function installTransitionCompletionFallback(currentImg, nextImg, meta = {}) {
      if (!isGalleryCrossfadeEnabled() || !nextImg) return;
      const transitionToken = Number.isFinite(meta.transitionToken) ? meta.transitionToken : 0;
      const targetPhotoId = meta.photoId ? String(meta.photoId) : "";
      const slotIndex = Number.isFinite(meta.slotIndex) ? meta.slotIndex : -1;
      const startedAtMs = Number.isFinite(meta.startedAtMs) ? meta.startedAtMs : 0;
      let settled = false;
      let timeoutId = null;

      const cleanup = () => {
        if (timeoutId) {
          clearTimeout(timeoutId);
          timeoutId = null;
        }
        try {
          nextImg.removeEventListener("transitionend", handleTransitionEnd);
        } catch (_) {}
      };

      const handleTransitionEnd = (event) => {
        if (event && event.target !== nextImg) return;
        if (settled) return;
        settled = true;
        cleanup();
      };

      try {
        nextImg.addEventListener("transitionend", handleTransitionEnd);
      } catch (_) {}

      timeoutId = setTimeout(() => {
        if (settled) return;
        settled = true;
        cleanup();
        if (transitionToken !== photoTransitionToken) return;
        try {
          nextImg.classList.add("visible");
          if (currentImg && currentImg !== nextImg) {
            currentImg.classList.remove("visible");
          }
          recordImageLifecycleEvent("transition_timeout_fallback", {
            photoId: targetPhotoId,
            slotIndex,
            transitionToken,
            startedAtMs,
            durationMs: startedAtMs > 0 ? Date.now() - startedAtMs : PHOTO_TRANSITION_FALLBACK_MS,
            error: "transitionend_not_fired",
          });
        } catch (_) {}
      }, PHOTO_TRANSITION_FALLBACK_MS);
    }

    async function crossfadeTo(url, photoId = "") {
      if (isDirectSwapModeEnabled()) {
        return performDirectImageSwap(url, photoId);
      }

      const transitionToken = ++photoTransitionToken;
      const targetPhotoId = photoId ? String(photoId) : "";
      const transitionStartedAtMs = Date.now();
      beginCrossfadeLifecycle(targetPhotoId);
      setSlideshowState(SLIDESHOW_STATES.transitioning, `crossfade:${targetPhotoId || "unknown"}`);
      loadingSlotIndex = hasImage ? (1 - activeIndex) : activeIndex;
      galleryDebug("photo transition start", {
        transitionToken,
        targetPhotoId,
        currentVisiblePhotoId: currentPhotoId,
      });

      if (!hasImage) {
        const img = imgSlots[activeIndex];
        try {
          img.classList.remove("visible");
          await loadImageIntoSlot(activeIndex, url, IMAGE_LOAD_TIMEOUT_MS, photoId, { transitionToken });
          if (transitionToken !== photoTransitionToken) {
            imageLifecycleDetections.loadedNeverVisible = true;
            recordImageLifecycleEvent("image_loaded_never_visible", {
              photoId: targetPhotoId,
              slotIndex: activeIndex,
              transitionToken,
              error: "transition_superseded_before_visible",
            });
            abortCrossfadeLifecycle(targetPhotoId, "crossfade_aborted", "transition_superseded");
            return false;
          }

          return await new Promise((resolve) => {
            requestAnimationFrame(() => {
              if (transitionToken !== photoTransitionToken) {
                imageLifecycleDetections.loadedNeverVisible = true;
                recordImageLifecycleEvent("image_loaded_never_visible", {
                  photoId: targetPhotoId,
                  slotIndex: activeIndex,
                  transitionToken,
                  error: "transition_superseded_before_visible_commit",
                });
                abortCrossfadeLifecycle(targetPhotoId, "crossfade_aborted", "transition_superseded");
                resolve(false);
                return;
              }
              hideQrWaitingScreen();
              img.classList.add("visible");
              hasImage = true;
              currentPhotoId = targetPhotoId;
              loadingSlotIndex = activeIndex;
              commitVisibleSlotLifecycle(targetPhotoId, activeIndex, transitionToken);
              completeCrossfadeLifecycle(targetPhotoId, "crossfade_complete", { slotIndex: activeIndex, transitionToken });
              recordVisualSwap("crossfade", transitionStartedAtMs);
              installTransitionCompletionFallback(null, img, {
                transitionToken,
                photoId: targetPhotoId,
                slotIndex: activeIndex,
                startedAtMs: transitionStartedAtMs,
              });
              setSlideshowState(SLIDESHOW_STATES.displaying, "first_photo_visible");
              galleryDebug("photo transition committed (first photo)", {
                transitionToken,
                currentVisiblePhotoId: currentPhotoId,
              });
              resolve(true);
            });
          });
        } catch (err) {
          loadingSlotIndex = -1;
          abortCrossfadeLifecycle(targetPhotoId, "crossfade_failed", err && err.message ? err.message : String(err));
          setSlideshowState(hasImage ? SLIDESHOW_STATES.displaying : SLIDESHOW_STATES.ready, "first_photo_load_failed");
          setRecoveryAction("first_photo_load_failed");
          if (isMonitorTimeoutOrAbortError(err)) {
            galleryDebug("first photo load timed out or was aborted", {
              transitionToken,
              targetPhotoId: photoId ? String(photoId) : "",
              error: err && err.message ? err.message : String(err),
            });
          } else {
            console.error("Error loading first photo", err);
          }
          galleryDebug("photo transition failed before any photo was visible", {
            transitionToken,
            targetPhotoId: photoId ? String(photoId) : "",
            error: err && err.message ? err.message : String(err),
          });
          abortCrossfadeLifecycle(targetPhotoId, "crossfade_failed", err && err.message ? err.message : String(err));
          return false;
        }
      }

      const currentImg = imgSlots[activeIndex];
      const targetId = targetPhotoId;
      if (targetId && slotPhotoIds[activeIndex] === targetId) {
        hideQrWaitingScreen();
        currentPhotoId = targetId;
        hasImage = true;
        loadingSlotIndex = activeIndex;
        commitVisibleSlotLifecycle(targetId, activeIndex, transitionToken);
        completeCrossfadeLifecycle(targetId, "crossfade_complete_reuse_active", { slotIndex: activeIndex, transitionToken });
        setSlideshowState(SLIDESHOW_STATES.displaying, "reuse_active_slot");
        return true;
      }

      const nextIndex = 1 - activeIndex;
      const nextImg = imgSlots[nextIndex];

      if (targetId && slotPhotoIds[nextIndex] === targetId && nextImg.getAttribute("src")) {
        if (transitionToken !== photoTransitionToken) {
          abortCrossfadeLifecycle(targetId, "crossfade_aborted", "transition_superseded");
          return false;
        }
        return await new Promise((resolve) => {
          requestAnimationFrame(() => {
            if (transitionToken !== photoTransitionToken) {
              abortCrossfadeLifecycle(targetId, "crossfade_aborted", "transition_superseded");
              resolve(false);
              return;
            }
            void nextImg.offsetWidth;
            nextImg.classList.add("visible");
            currentImg.classList.remove("visible");
            activeIndex = nextIndex;
            loadingSlotIndex = nextIndex;
            hideQrWaitingScreen();
            hasImage = true;
            currentPhotoId = targetId;
            commitVisibleSlotLifecycle(targetId, nextIndex, transitionToken);
            completeCrossfadeLifecycle(targetId, "crossfade_complete_reuse_preloaded", { slotIndex: nextIndex, transitionToken });
            recordVisualSwap("crossfade", transitionStartedAtMs);
            installTransitionCompletionFallback(currentImg, nextImg, {
              transitionToken,
              photoId: targetId,
              slotIndex: nextIndex,
              startedAtMs: transitionStartedAtMs,
            });
            setSlideshowState(SLIDESHOW_STATES.displaying, "reuse_preloaded_slot");
            galleryDebug("photo transition reused preloaded slot", {
              transitionToken,
              currentVisiblePhotoId: currentPhotoId,
            });
            resolve(true);
          });
        });
      }

      try {
        nextImg.classList.remove("visible");
        await loadImageIntoSlot(nextIndex, url, IMAGE_LOAD_TIMEOUT_MS, photoId, { transitionToken });
        if (transitionToken !== photoTransitionToken) {
          imageLifecycleDetections.loadedNeverVisible = true;
          recordImageLifecycleEvent("image_loaded_never_visible", {
            photoId: targetId,
            slotIndex: nextIndex,
            transitionToken,
            error: "transition_superseded_after_slot_load",
          });
          abortCrossfadeLifecycle(targetId, "crossfade_aborted", "transition_superseded");
          return false;
        }

        return await new Promise((resolve) => {
          requestAnimationFrame(() => {
            if (transitionToken !== photoTransitionToken) {
              imageLifecycleDetections.loadedNeverVisible = true;
              recordImageLifecycleEvent("image_loaded_never_visible", {
                photoId: targetId,
                slotIndex: nextIndex,
                transitionToken,
                error: "transition_superseded_before_visible_commit",
              });
              abortCrossfadeLifecycle(targetId, "crossfade_aborted", "transition_superseded");
              resolve(false);
              return;
            }
            void nextImg.offsetWidth;
            nextImg.classList.add("visible");
            currentImg.classList.remove("visible");
            activeIndex = nextIndex;
            loadingSlotIndex = nextIndex;
            hideQrWaitingScreen();
            hasImage = true;
            currentPhotoId = targetId;
            commitVisibleSlotLifecycle(targetId, nextIndex, transitionToken);
            completeCrossfadeLifecycle(targetId, "crossfade_complete", { slotIndex: nextIndex, transitionToken });
            recordVisualSwap("crossfade", transitionStartedAtMs);
            installTransitionCompletionFallback(currentImg, nextImg, {
              transitionToken,
              photoId: targetId,
              slotIndex: nextIndex,
              startedAtMs: transitionStartedAtMs,
            });
            setSlideshowState(SLIDESHOW_STATES.displaying, "transition_committed");
            galleryDebug("photo transition committed", {
              transitionToken,
              currentVisiblePhotoId: currentPhotoId,
            });
            resolve(true);
          });
        });
      } catch (err) {
        loadingSlotIndex = -1;
        abortCrossfadeLifecycle(targetId, "crossfade_failed", err && err.message ? err.message : String(err));
        setSlideshowState(SLIDESHOW_STATES.displaying, "transition_failed_keep_current");
        setRecoveryAction("kept_current_photo_after_load_failure");
        if (shouldCountImageLoadFailure(err, transitionToken)) {
          logKeptCurrentPhotoAfterFailure({
            targetPhotoId: photoId ? String(photoId) : "",
            error: err && err.message ? err.message : String(err),
          });
        } else if (isMonitorTimeoutOrAbortError(err)) {
          galleryDebug("photo transition aborted or timed out after superseded; keeping current visible photo", {
            transitionToken,
            targetPhotoId: photoId ? String(photoId) : "",
            currentVisiblePhotoId: currentPhotoId,
            error: err && err.message ? err.message : String(err),
          });
        } else {
          console.error("Error loading photo", err);
          galleryDebug("photo transition failed; keeping current visible photo", {
            transitionToken,
            targetPhotoId: photoId ? String(photoId) : "",
            currentVisiblePhotoId: currentPhotoId,
            error: err && err.message ? err.message : String(err),
          });
        }
        return false;
      }
    }

    async function showCurrentPhoto(options = {}) {
      const { targetIndex = null, advanceReason = "show_current_photo" } = options;
      if (!photos.length) {
        setSlideshowState(SLIDESHOW_STATES.empty, "show_current_photo_without_confirmed_empty");
        setEmptyState({ force: false, reason: "show_current_photo_without_confirmed_empty" });
        return false;
      }

      let nextPhotoIndex = Number.isFinite(targetIndex) ? targetIndex : currentIndex;
      const approvedPhotoCount = getApprovedPhotoCount();
      if (!Number.isFinite(nextPhotoIndex) || nextPhotoIndex < 0) {
        nextPhotoIndex = 0;
      } else if (approvedPhotoCount > 0 && nextPhotoIndex >= approvedPhotoCount) {
        nextPhotoIndex = nextPhotoIndex % approvedPhotoCount;
      }

      if (!isDirectSwapModeEnabled()) {
        currentIndex = nextPhotoIndex;
        normalizeCurrentPhotoIndex();
        nextPhotoIndex = currentIndex;
      }
      setSlideshowState(SLIDESHOW_STATES.loading, `${advanceReason}:index_${nextPhotoIndex}`);

      const file = photos[nextPhotoIndex];
      if (!file || !file.id) {
        setSlideshowState(SLIDESHOW_STATES.ready, "show_current_photo_missing_file");
        return false;
      }

      const url = buildPhotoUrl(file.id);
      const didShow = await crossfadeTo(url, file.id);
      if (didShow) {
        currentIndex = nextPhotoIndex;
        normalizeCurrentPhotoIndex();
        markVisiblePhoto(file);
        recordSlideshowAdvance(advanceReason, file);
        updateTicketBadge(file.name);
        setSlideshowState(
          SLIDESHOW_STATES.displaying,
          isSinglePhotoMode() ? "single_photo_mode" : `${advanceReason}:visible`
        );
      } else {
        setSlideshowState(SLIDESHOW_STATES.displaying, `${advanceReason}:failed`);
      }
      return didShow;
    }

    async function advanceSlideshowPhoto(loopToken) {
      if (loopToken !== rotationLoopToken) return;

      if (!photos.length) {
        setSlideshowState(SLIDESHOW_STATES.empty, "rotation_tick_without_photos");
        setEmptyState({ force: false, reason: "rotation_tick_without_confirmed_empty" });
        return;
      }

      normalizeCurrentPhotoIndex();

      if (isSinglePhotoMode()) {
        setSlideshowState(SLIDESHOW_STATES.displaying, "single_photo_mode");
        scheduleNextRotation(loopToken, DISPLAY_MS);
        return;
      }

      const nextIndex = getNextPhotoIndex(currentIndex);
      const didShow = await showCurrentPhoto({
        targetIndex: nextIndex,
        advanceReason: "rotation_tick",
      });

      if (loopToken !== rotationLoopToken) return;

      if (didShow) {
        scheduleNextRotation(loopToken, DISPLAY_MS);
        return;
      }

      setSlideshowState(SLIDESHOW_STATES.displaying, "rotation_tick_failed_keep_current");
      scheduleNextRotation(loopToken, 1500);
    }

    function scheduleNextRotation(loopToken, delayMs = DISPLAY_MS) {
      clearNamedTimer("rotation");
      rotateTimer = registerTimer("rotation", setTimeout(() => {
        clearNamedTimer("rotation");
        rotateTimer = null;
        void advanceSlideshowPhoto(loopToken);
      }, Math.max(0, Math.round(delayMs))));
    }

    async function startRotation(options = {}) {
      const { preserveCurrentVisible = false, loopToken: externalLoopToken = null } = options;
      if (!Number.isFinite(externalLoopToken)) {
        rotationLoopToken += 1;
      }
      const loopToken = Number.isFinite(externalLoopToken) ? externalLoopToken : rotationLoopToken;
      clearNamedTimer("rotation");
      rotateTimer = null;
      if (!photos.length) {
        setSlideshowState(SLIDESHOW_STATES.empty, "start_rotation_without_confirmed_empty");
        setEmptyState({ force: false, reason: "start_rotation_without_confirmed_empty" });
        return;
      }

      normalizeCurrentPhotoIndex();
      setSlideshowState(SLIDESHOW_STATES.ready, preserveCurrentVisible ? "rotation_resume" : "rotation_start");

      if (!preserveCurrentVisible || !hasImage) {
        const didShow = await showCurrentPhoto({ advanceReason: "rotation_start" });
        if (loopToken !== rotationLoopToken) return;
        if (!didShow) {
          scheduleNextRotation(loopToken, 1500);
          return;
        }
      } else {
        setSlideshowState(SLIDESHOW_STATES.displaying, "rotation_resume_visible");
      }

      if (isSinglePhotoMode()) {
        setSlideshowState(SLIDESHOW_STATES.displaying, "single_photo_mode");
        return;
      }

      scheduleNextRotation(loopToken, DISPLAY_MS);
    }

    async function fetchApproved() {
      clearStaleInFlightLocks(Date.now());
      if (approvedFetchInFlight) {
        galleryDebug("approved poll skipped because previous request is still running", {
          approvedPollCount,
          currentVisiblePhotoId: currentPhotoId,
        });
        return false;
      }
      approvedFetchInFlight = true;
      approvedFetchStartedAtMs = Date.now();
      approvedPollCount += 1;
      const pollStartedAt = Date.now();
      galleryDebug("approved poll start", {
        approvedPollCount,
        currentVisiblePhotoId: currentPhotoId,
        consecutiveEmptyApprovedResponses,
      });
      try {
        const res = await fetchWithTimeout(
          `${BASE_URL}/gallery/approved`,
          { cache: "no-store" },
          REQUEST_TIMEOUT_MS,
          {
            name: "approved_manifest",
            category: "approved_manifest",
            route: "/gallery/approved",
            timeoutMs: REQUEST_TIMEOUT_MS,
          }
        );
        if (!res.ok) {
          lastPollDurationMs = Date.now() - pollStartedAt;
          recordPollFailure(`approved_poll_http_${res.status}`, {
            route: "/gallery/approved",
            type: "approved_fetch_failure",
          });
          console.error("Error fetching approved list", res.status);
          galleryDebug("approved poll failed", {
            approvedPollCount,
            status: res.status,
          });
          return false;
        }
        const data = await res.json();
        if (!data.ok) {
          lastPollDurationMs = Date.now() - pollStartedAt;
          recordPollFailure("approved_poll_payload_not_ok", {
            route: "/gallery/approved",
            type: "approved_fetch_failure",
          });
          console.error("API returned not ok", data);
          galleryDebug("approved poll returned non-ok payload", {
            approvedPollCount,
            data,
          });
          return false;
        }

        const newPhotos = Array.isArray(data.files) ? [...data.files] : [];
        approvedManifestVersion = clampMonitorString(String(data.manifestVersion || ""), 40);
        recordSuccessfulPoll(Date.now() - pollStartedAt);
        sortPhotosList(newPhotos);
        const oldIds = photos.map((p) => p.id).join(",");
        const newIds = newPhotos.map((p) => p.id).join(",");
        galleryDebug("approved poll success", {
          approvedPollCount,
          resultCount: newPhotos.length,
          oldIds,
          newIds,
        });

        if (!newPhotos.length) {
          consecutiveEmptyApprovedResponses += 1;
          galleryDebug("approved poll empty response", {
            approvedPollCount,
            consecutiveEmptyApprovedResponses,
            threshold: EMPTY_APPROVED_CLEAR_THRESHOLD,
            currentVisiblePhotoId: currentPhotoId,
          });
          if (!hasImage) {
            photos = [];
            currentIndex = 0;
            setEmptyState({ force: true, reason: "no_approved_photos_available" });
            return true;
          }
          if (consecutiveEmptyApprovedResponses >= EMPTY_APPROVED_CLEAR_THRESHOLD) {
            photos = [];
            currentIndex = 0;
            setEmptyState({ force: true, reason: "confirmed_empty_approved_responses" });
          }
          return true;
        }

        consecutiveEmptyApprovedResponses = 0;
        const wasEmptyState = slideshowState === SLIDESHOW_STATES.empty || !hasImage;
        photos = newPhotos;
        normalizeCurrentPhotoIndex();

        if (!hasImage || wasEmptyState) {
          if (!hasImage) {
            showQrWaitingScreen("boot_waiting_for_first_photo");
          }
          const currentPhotoIndex = currentPhotoId
            ? photos.findIndex((photo) => String(photo.id) === String(currentPhotoId))
            : -1;
          if (currentPhotoIndex >= 0) {
            currentIndex = currentPhotoIndex;
          } else {
            currentIndex = 0;
          }
          setSlideshowState(SLIDESHOW_STATES.ready, "photos_available_after_empty");
          void startRotation({ preserveCurrentVisible: false });
        } else if (oldIds !== newIds) {
          const currentPhotoIndex = currentPhotoId
            ? photos.findIndex((photo) => String(photo.id) === String(currentPhotoId))
            : -1;
          if (currentPhotoIndex >= 0) {
            currentIndex = currentPhotoIndex;
          } else {
            currentIndex = 0;
          }
          normalizeCurrentPhotoIndex();
          if (currentPhotoIndex < 0) {
            setSlideshowState(SLIDESHOW_STATES.ready, "manifest_changed_restart");
            void startRotation({ preserveCurrentVisible: false });
          } else if (!rotateTimer && !isSinglePhotoMode()) {
            setSlideshowState(SLIDESHOW_STATES.ready, "manifest_changed_resume");
            void startRotation({ preserveCurrentVisible: true });
          }
        }
        return true;
      } catch (err) {
        lastPollDurationMs = Date.now() - pollStartedAt;
        recordPollFailure(err && err.message ? err.message : String(err), {
          route: "/gallery/approved",
          type: "approved_fetch_failure",
        });
        if (!hasImage && !photos.length) {
          showQrWaitingScreen("manifest_failed_no_cached_photos");
        }
        if (isMonitorTimeoutOrAbortError(err)) {
          galleryDebug("approved poll timeout or abort", {
            approvedPollCount,
            error: err && err.message ? err.message : String(err),
          });
        } else {
          console.error("Failed to fetch approved photos", err);
        }
        galleryDebug("approved poll exception", {
          approvedPollCount,
          error: err && err.message ? err.message : String(err),
        });
        return false;
      } finally {
        approvedFetchInFlight = false;
        approvedFetchStartedAtMs = 0;
      }
    }

    function startRefreshLoop() {
      scheduleApprovedPoll(0);
    }

    function startTemplateRefreshLoop() {
      if (!isDynamicTemplateRuntimeEnabled()) {
        galleryDebug("template refresh loop not started because template runtime is disabled");
        return;
      }

      clearNamedInterval("template_poll");
      fetchActiveTemplate();
      templateRefreshTimer = registerInterval("template_poll", setInterval(fetchActiveTemplate, TEMPLATE_REFRESH_MS));
    }

    async function fetchActiveOverlay() {
      clearStaleInFlightLocks(Date.now());
      if (!isFlattenedOverlayRuntimeEnabled()) {
        if (currentOverlayFileId || activeOverlayKey || lastGoodOverlayMeta) {
          clearOverlayLayer("flattened_overlay_disabled");
        }
        recordOverlayBypassedIfNeeded("Flattened overlay runtime disabled by config");
        return false;
      }
      overlayBypassedLogged = false;
      if (overlayFetchInFlight) {
        galleryDebug("overlay fetch skipped because previous request is still running", {
          currentOverlayFileId,
          currentOverlayVersion,
        });
        return false;
      }
      overlayFetchInFlight = true;
      overlayFetchStartedAtMs = Date.now();
      const requestId = ++activeOverlayRequestId;
      galleryDebug("overlay fetch start", {
        requestId,
        activeOverlayKey,
        currentOverlayFileId,
        currentOverlayVersion,
      });

      try {
        const res = await fetchWithTimeout(
          `${BASE_URL}/gallery/active-overlay?ts=${Date.now()}`,
          { cache: "no-store" },
          REQUEST_TIMEOUT_MS,
          {
            name: "overlay_fetch",
            category: "overlay_fetch",
            route: "/gallery/active-overlay",
            timeoutMs: REQUEST_TIMEOUT_MS,
          }
        );
        if (!res.ok) {
          recordOverlayFailure(`overlay_http_${res.status}`, {
            type: "overlay_fetch_failure",
            route: "/gallery/active-overlay",
          });
          console.error("Error fetching active overlay", res.status);
          galleryDebug("overlay fetch failed", { requestId, status: res.status });
          return false;
        }

        const data = await res.json();
        if (requestId !== activeOverlayRequestId) {
          galleryDebug("overlay fetch ignored because a newer request exists", { requestId });
          return false;
        }
        if (!data.ok) {
          recordOverlayFailure("overlay_payload_not_ok", {
            type: "overlay_fetch_failure",
            route: "/gallery/active-overlay",
          });
          console.error("Active overlay API returned not ok", data);
          galleryDebug("overlay fetch returned non-ok payload", { requestId, data });
          return false;
        }

        const overlayKey = buildOverlayKey(data);
        galleryDebug("overlay fetch success", {
          requestId,
          enabled: Boolean(data.enabled),
          templateId: String(data.templateId || ""),
          overlayFileId: String(data.overlayFileId || ""),
          templateVersion: String(data.templateVersion || ""),
          overlayKey,
          photoBox: normalizePhotoBox(data.photoBox),
          lastGoodOverlay: lastGoodOverlayMeta,
        });

        if (!data.enabled || !data.overlayFileId || !data.overlayUrl) {
          if (lastGoodOverlayMeta) {
            galleryDebug("overlay disabled by active-overlay response; clearing current overlay", {
              requestId,
              reason: data?.meta?.reason || "overlay_disabled",
            });
            clearOverlayLayer(data?.meta?.reason || "overlay_disabled");
          } else {
            applyPhotoBox(DEFAULT_PHOTO_BOX);
          }
          recordSuccessfulOverlayFetch();
          return true;
        }

        if (overlayKey === activeOverlayKey) {
          applyPhotoBox(data.photoBox || DEFAULT_PHOTO_BOX);
          recordSuccessfulOverlayFetch();
          galleryDebug("overlay fetch skipped because overlay already active", {
            requestId,
            overlayKey,
          });
          return true;
        }

        try {
          await commitOverlay(data, overlayKey, requestId);
          recordSuccessfulOverlayFetch();
        } catch (err) {
          recordOverlayFailure(err && err.message ? err.message : String(err), {
            type: "overlay_asset_failure",
            route: data && data.overlayUrl ? data.overlayUrl : "/gallery/active-overlay",
          });
          setRecoveryAction("kept_last_overlay_after_load_failure");
          galleryDebug("overlay load failed; keeping last-known-good overlay", {
            requestId,
            templateId: String(data.templateId || ""),
            overlayFileId: String(data.overlayFileId || ""),
            templateVersion: String(data.templateVersion || ""),
            error: err && err.message ? err.message : String(err),
            lastGoodOverlay: lastGoodOverlayMeta,
          });
        }
        return true;
      } catch (err) {
        recordOverlayFailure(err && err.message ? err.message : String(err), {
          type: "overlay_fetch_failure",
          route: "/gallery/active-overlay",
        });
        if (isMonitorTimeoutOrAbortError(err)) {
          galleryDebug("overlay fetch timeout or abort", {
            requestId,
            error: err && err.message ? err.message : String(err),
          });
        } else {
          console.error("Failed to fetch active overlay", err);
        }
        galleryDebug("overlay fetch exception", {
          requestId,
          error: err && err.message ? err.message : String(err),
          lastGoodOverlay: lastGoodOverlayMeta,
        });
        return false;
      } finally {
        overlayFetchInFlight = false;
        overlayFetchStartedAtMs = 0;
      }
    }

    function startOverlayRefreshLoop() {
      if (!isFlattenedOverlayRuntimeEnabled()) {
        stopOverlayRefreshLoop();
        abortPendingFetchesByCategory("overlay_fetch", "overlay_runtime_disabled");
        if (currentOverlayFileId || activeOverlayKey || lastGoodOverlayMeta) {
          clearOverlayLayer("flattened_overlay_disabled");
        }
        recordOverlayBypassedIfNeeded("Flattened overlay runtime disabled by config");
        return;
      }
      overlayBypassedLogged = false;
      scheduleOverlayPoll(0);
    }

    function getPhotoPlaybackTime(photo) {
      if (!photo || typeof photo !== "object") return 0;
      const rawTime = String(photo.approvedTime || photo.modifiedTime || photo.createdTime || "").trim();
      if (!rawTime) return 0;

      const ms = Date.parse(rawTime);
      return Number.isFinite(ms) ? ms : 0;
    }

    function sortPhotosList(list) {
      if (!Array.isArray(list) || !list.length) return list;

      if (sortOrder === 'newest') {
        list.sort((a, b) => {
          const timeA = getPhotoPlaybackTime(a);
          const timeB = getPhotoPlaybackTime(b);
          if (timeB !== timeA) return timeB - timeA;
          return String(b.id || "").localeCompare(String(a.id || ""));
        });
      } else {
        list.sort((a, b) => {
          const timeA = getPhotoPlaybackTime(a);
          const timeB = getPhotoPlaybackTime(b);
          if (timeA !== timeB) return timeA - timeB;
          return String(a.id || "").localeCompare(String(b.id || ""));
        });
      }

      return list;
    }

    if (TEMPLATE_RENDERING_ENABLED) {
      clearTemplateLayers({ force: true, reason: "initial_boot" });
    } else {
      disableTemplateLayerForLiveMode();
    }
    applyGalleryRuntimeSettings(DEFAULT_GALLERY_RUNTIME_SETTINGS, {
      runtimeSettingsVersion: "default",
    });
    stopRuntimeWatchdogLoop();
    void installGallerySentryDiagnostics();
    installTelemetryErrorCapture();
    startGalleryDebugOverlayLoop();
    installRuntimeLifecycleHandlers();
    setSlideshowState(SLIDESHOW_STATES.booting, "initial_boot");
    clearOverlayLayer("initial_boot");
    showQrWaitingScreen("boot_waiting_for_manifest");
    startRefreshLoop();
    startTelemetryHeartbeatLoop();
    if (isRuntimeWatchdogEnabled()) {
      startRuntimeWatchdog();
    }
    scheduleRuntimeSettingsRefresh(0);
    runDebugTelemetryTestIfNeeded();
  </script>
</body>
</html>
