<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Selfie Wall – Plaza Colón</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.25rem;
      --radius-pill: 999px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Arial, sans-serif;
      color: #f9fafb;
      background: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000000;
      overflow: hidden;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fullscreen black canvas */
    .wall {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      overflow: hidden;
    }

    /* 16:9 stage, scales but keeps AR, max 1920x1080 */
    .stage {
      position: relative;
      width: 100vw;
      max-width: 1920px;
      aspect-ratio: 16 / 9;
      max-height: 1080px;
      background: #000000;
      overflow: hidden;
    }

    /* Photo window = 1500x1000 centered within 1920x1080 stage */
    .photo-window {
      position: absolute;
      /* Center 1500x1000 in 1920x1080: (1920-1500)/2 = 210px left, (1080-1000)/2 = 40px top */
      top: 3.7037%;  /* 40/1080 */
      left: 10.9375%; /* 210/1920 */
      width: 78.125%;  /* 1500/1920 */
      height: 92.5926%; /* 1000/1080 */
      overflow: hidden;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .template-background-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
      display: none;
    }

    /* Photos inside window - display at native 1500x1000 size, centered */
    .photo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .photo.visible {
      opacity: 1;
    }

    .template-logos-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .template-overlay-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 11;
      pointer-events: none;
      display: none;
    }

    .template-logo-layer {
      position: absolute;
      overflow: hidden;
    }

    .template-logo-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Gallery status text */
    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-lg);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d1d5db;
      z-index: 12;
      pointer-events: none;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    .empty.hidden {
      display: none;
    }

/* Ticket badge INSIDE the photo window (top-left, not on the frame) */
.ticket-badge {
  position: absolute;
  top: 20px;        /* inside the photo area */
  left: 27px;
  right: auto;      /* make sure nothing pins it to the right */
  z-index: 20;      /* above photo but clipped by .photo-window */
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  background: rgba(0, 0, 0, 0.85);
  color: #f9fafb;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: none;    /* JS will set to block when we have a photo */
}

    @media (max-width: 768px) {
      .empty {
        font-size: 20px;
        padding: var(--space-md);
      }
    }

    .gallery-debug-overlay {
      position: fixed;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: min(24vw, 320px);
      min-width: 220px;
      height: min(82vh, 820px);
      background: rgba(0, 0, 0, 0.94);
      color: #f9fafb;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5);
      z-index: 9999;
      display: none;
      overflow: hidden;
      pointer-events: auto;
      cursor: copy;
      touch-action: manipulation;
    }

    .gallery-debug-overlay.visible {
      display: block;
    }

    .gallery-debug-overlay-inner {
      position: absolute;
      left: 0;
      top: 100%;
      transform-origin: top left;
      transform: rotate(-90deg);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      overflow: hidden;
    }

    .gallery-debug-diagnosis {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fca5a5;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      padding-bottom: 8px;
    }

    .gallery-debug-diagnosis[data-severity="warn"] {
      color: #fde68a;
    }

    .gallery-debug-diagnosis[data-severity="info"] {
      color: #bfdbfe;
    }

    .gallery-debug-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 10px;
      white-space: pre-wrap;
      line-height: 1.35;
      color: #f9fafb;
      overflow: hidden;
    }

    .gallery-debug-feedback {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d1fae5;
      min-height: 14px;
    }

    .gallery-debug-feedback[data-state="error"] {
      color: #fecaca;
    }

    .gallery-debug-snapshot {
      font-size: 10px;
      max-height: 180px;
    }

    .gallery-debug-events {
      font-size: 10px;
      flex: 1 1 auto;
    }

    .gallery-debug-expanded {
      font-size: 10px;
      flex: 1 1 auto;
      max-height: 340px;
      overflow: auto;
      display: none;
    }

    .gallery-debug-expanded.visible {
      display: block;
    }

  </style>
</head>

      transitioning: ["displaying", "loading", "degraded", "recovering", "ready"],

    const GALLERY_DEVICE_ID_KEY = "galleryDeviceId";

    const DEBUG_TEST_ENABLED = (() => {
      try {
        return new URLSearchParams(window.location.search).get("debugTest") === "1";
      } catch (_) {
        return false;
      }
    })();
    const ENABLE_SENTRY_DIAGNOSTICS = false;
    const GALLERY_SENTRY_DSN = "";
    const GALLERY_SENTRY_DSN_PLACEHOLDER = "__GALLERY_SENTRY_DSN__";
    const GALLERY_SENTRY_ENVIRONMENT = "gallery";
    const GALLERY_SENTRY_RELEASE = "mayaguez-gallery-html";
    const GALLERY_SENTRY_CDN_URL = "https://browser.sentry-cdn.com/8.55.0/bundle.min.js";
    const galleryDeviceId = (() => {
      try {
        const existingId = window.localStorage.getItem(GALLERY_DEVICE_ID_KEY);
        if (existingId) return existingId;
        const generatedId = typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
          ? crypto.randomUUID()
          : `gallery-${Date.now()}-${Math.random().toString(16).slice(2, 10)}`;
        window.localStorage.setItem(GALLERY_DEVICE_ID_KEY, generatedId);
        return generatedId;
      } catch (_) {
        return `gallery-${Date.now()}-${Math.random().toString(16).slice(2, 10)}`;
      }
    })();
    const galleryDeviceName = (() => {
      function detectBrowserName() {
        const ua = navigator.userAgent || "";
        if (/Edg\//i.test(ua)) return "Edge";
        if (/Chrome\//i.test(ua) && !/Edg\//i.test(ua)) return "Chrome";
        if (/Safari\//i.test(ua) && !/Chrome\//i.test(ua)) return "Safari";
        if (/Firefox\//i.test(ua)) return "Firefox";
        return "Browser";
      }

      try {
        const existingName = window.localStorage.getItem(GALLERY_DEVICE_NAME_KEY);
        if (existingName) return existingName;
        const platformName = navigator.userAgentData?.platform || navigator.platform || "Unknown Platform";
        const defaultName = `${detectBrowserName()} on ${platformName}`;
        window.localStorage.setItem(GALLERY_DEVICE_NAME_KEY, defaultName);
        return defaultName;
      } catch (_) {
        const platformName = navigator.userAgentData?.platform || navigator.platform || "Unknown Platform";
        return `${detectBrowserName()} on ${platformName}`;
      }
    })();

    function galleryDebug(...args) {
      console.log("[gallery]", ...args);
    }

    let gallerySentryReady = false;
    let gallerySentryInitPromise = null;

    function resolveGallerySentryDsn() {
      const configuredDsn = String(GALLERY_SENTRY_DSN || "").trim();
      if (!configuredDsn || configuredDsn === GALLERY_SENTRY_DSN_PLACEHOLDER) {
        return "";
      }
      return configuredDsn;
    }

    function isGallerySentryDiagnosticsEnabled() {
      return ENABLE_SENTRY_DIAGNOSTICS === true && Boolean(resolveGallerySentryDsn());
    }

    function isGallerySentryActive() {
      return gallerySentryReady && typeof window !== "undefined" && window.Sentry;
    }

    function normalizeGallerySentryError(error) {
      if (error instanceof Error) return error;
      return new Error(clampMonitorString(formatMonitorValue(error), 500) || "gallery_error");
    }

    function buildGallerySentryContext(extra = {}) {
      return {
        gallery: {
          deviceId: galleryDeviceId || "",
          deviceName: galleryDeviceName || "",
          slideshowState: slideshowState || "",
          currentPhotoId: currentPhotoId || "",
          currentPhotoName: currentPhotoName || "",
          currentPhotoIndex: Number.isFinite(currentIndex) ? currentIndex : -1,
          transitionMode: typeof getGalleryTransitionMode === "function" ? getGalleryTransitionMode() : "",
          approvedPhotoCount: typeof getApprovedPhotoCount === "function" ? getApprovedPhotoCount() : 0,
          hasImage: Boolean(hasImage),
          runtimeDegraded: Boolean(runtimeDegraded),
          watchdogReason: watchdogReason || "",
        },
        fetchStatus: {
          lastApprovedFetchStatus: lastApprovedFetchStatus || "",
          lastApprovedFetchError: lastApprovedFetchError || "",
          lastPhotoFetchStatus: lastPhotoFetchStatus || "",

          lastOverlayFetchError: lastOverlayFetchError || "",
          lastHeartbeatError: lastHeartbeatError || "",
          heartbeatFailureCount: Math.max(0, Number(heartbeatFailureCount) || 0),

          consecutiveOverlayFailures: Math.max(0, Number(consecutiveOverlayFailures) || 0),

          runtimeSettingsVersion: runtimeSettingsVersion || "default",

        browser: {

          platform: navigator.userAgentData?.platform || navigator.platform || "",

          screenHeight: window.screen ? Number(window.screen.height) || 0 : 0,

        extra: extra && typeof extra === "object" ? extra : {},
      };

    function sanitizeGallerySentryEvent(event) {
      try {
        if (!event || typeof event !== "object") return event;
        if (event.request && event.request.headers) {
          delete event.request.headers.authorization;
          delete event.request.headers.cookie;
          delete event.request.headers.Authorization;
          delete event.request.headers.Cookie;
        }
        if (event.extra && typeof event.extra === "object") {
          delete event.extra.dsn;
          delete event.extra.token;
          delete event.extra.apiKey;

      return event;

    function refreshGallerySentryScope(extra = {}) {
      if (!isGallerySentryActive()) return;

        const context = buildGallerySentryContext(extra);
        window.Sentry.setUser({
          id: context.gallery.deviceId || undefined,
          username: context.gallery.deviceName || undefined,
        });
        window.Sentry.setContext("gallery", context.gallery);
        window.Sentry.setContext("fetchStatus", context.fetchStatus);
        window.Sentry.setContext("runtimeSettings", context.runtimeSettings);
        window.Sentry.setContext("browser", context.browser);

    }

    function captureGallerySentryException(error, extra = {}) {
      if (!isGallerySentryActive()) return;
      try {
        window.Sentry.withScope((scope) => {
          refreshGallerySentryScope(extra);
          if (extra.category) scope.setTag("gallery.category", clampMonitorString(extra.category, 40));
          if (extra.route) scope.setTag("gallery.route", sanitizeMonitorRoute(extra.route));
          if (extra.kind) scope.setTag("gallery.kind", clampMonitorString(extra.kind, 40));
          window.Sentry.captureException(normalizeGallerySentryError(error));
        });

    function captureGallerySentryMessage(message, level = "warning", extra = {}) {
      if (!isGallerySentryActive()) return;
      try {
        window.Sentry.withScope((scope) => {
          refreshGallerySentryScope(extra);
          scope.setLevel(level);
          if (extra.category) scope.setTag("gallery.category", clampMonitorString(extra.category, 40));
          if (extra.route) scope.setTag("gallery.route", sanitizeMonitorRoute(extra.route));
          if (extra.kind) scope.setTag("gallery.kind", clampMonitorString(extra.kind, 40));
          window.Sentry.captureMessage(

    function captureGallerySentryFetchFailure(route, error, meta = {}) {
      if (!isGallerySentryActive()) return;
      const category = clampMonitorString(
        meta.category || meta.name || meta.type || "fetch",
        40
      ) || "fetch";
      const normalizedRoute = sanitizeMonitorRoute(route || meta.route || "");
      const message = clampMonitorString(formatMonitorValue(error), 500) || "fetch_failed";
      captureGallerySentryMessage(`fetch_failure:${category}:${message}`, "warning", {
        category,
        route: normalizedRoute,
        kind: "fetch_failure",
        error: message,
      });
      captureGallerySentryException(error, {
        category,
        route: normalizedRoute,
        kind: "fetch_failure",
      });

    function loadGallerySentryBundle() {
      if (typeof window === "undefined") {
        return Promise.resolve(false);
      }
      if (window.Sentry) {
        return Promise.resolve(true);
      }
      return new Promise((resolve) => {
        try {
          const script = document.createElement("script");
          script.src = GALLERY_SENTRY_CDN_URL;
          script.crossOrigin = "anonymous";
          script.referrerPolicy = "no-referrer";
          script.onload = () => resolve(Boolean(window.Sentry));
          script.onerror = () => resolve(false);
          document.head.appendChild(script);
        } catch (_) {
          resolve(false);
        }
      });
    }

    function installGallerySentryDiagnostics() {
      if (!isGallerySentryDiagnosticsEnabled()) {
        return Promise.resolve(false);
      }
      if (gallerySentryInitPromise) {
        return gallerySentryInitPromise;
      }

      gallerySentryInitPromise = (async () => {
        try {
          const dsn = resolveGallerySentryDsn();
          if (!dsn) return false;
          const loaded = await loadGallerySentryBundle();
          if (!loaded || !window.Sentry || typeof window.Sentry.init !== "function") {
            return false;
          }

          window.Sentry.init({
            dsn,
            environment: GALLERY_SENTRY_ENVIRONMENT,
            release: GALLERY_SENTRY_RELEASE,
            defaultIntegrations: false,
            tracesSampleRate: 0,
            replaysSessionSampleRate: 0,
            replaysOnErrorSampleRate: 0,
            beforeSend(event) {
              return sanitizeGallerySentryEvent(event);
            },
          });

          gallerySentryReady = true;
          refreshGallerySentryScope({ source: "sentry_init" });
          captureGallerySentryMessage("gallery_sentry_diagnostics_started", "info", {
            category: "sentry",
            kind: "startup",
          });
          return true;
        } catch (_) {
          gallerySentryReady = false;
          return false;
        }
      })();

      return gallerySentryInitPromise;
    }

    function formatMonitorValue(value) {
      if (value instanceof Error) {
        return value.stack || value.message || String(value);
      }
      if (typeof value === "string") return value;
      if (value == null) return "";
      try {
        return JSON.stringify(value);
      } catch (_) {
        return String(value);
      }
    }

    function clampMonitorString(value, maxLength = 500) {
      const normalized = String(value || "").trim();
      return normalized.length > maxLength ? normalized.slice(0, maxLength) : normalized;
    }

    function createMonitorError(message, extra = {}) {
      const err = new Error(clampMonitorString(message || "monitor_error", 200) || "monitor_error");
      err.name = extra.name || "MonitorError";
      if (extra.code) err.code = extra.code;
      if (extra.route) err.route = sanitizeMonitorRoute(extra.route);
      if (extra.cause) err.cause = extra.cause;
      return err;
    }

    function getMonitorErrorMessage(error) {
      if (error && typeof error === "object" && error.message) {
        return clampMonitorString(error.message, 500);
      }
      return clampMonitorString(formatMonitorValue(error), 500);
    }

    function isMonitorTimeoutOrAbortError(error) {
      const message = getMonitorErrorMessage(error);
      return message === "request_timeout" || message === "request_aborted";
    }

    function shouldCountImageLoadFailure(error, transitionToken = null) {
      if (transitionToken != null && transitionToken !== photoTransitionToken) {
        return false;
      }
      return true;
    }

    let keptCurrentPhotoLogCount = 0;

    try {
      reloadCount = Math.max(0, Number(window.sessionStorage.getItem(GALLERY_KIOSK_RELOAD_COUNT_KEY)) || 0);
      lastReloadAt = String(window.sessionStorage.getItem(GALLERY_KIOSK_LAST_RELOAD_AT_KEY) || "");
    } catch (_) {}
    try {
      lastHandledRuntimeCommandId = String(window.localStorage.getItem(GALLERY_LAST_HANDLED_RUNTIME_COMMAND_KEY) || "");
    } catch (_) {}

    function getMsSinceIsoTimestamp(isoValue) {
      if (!isoValue) return Infinity;
      const parsed = Date.parse(String(isoValue));
      if (!Number.isFinite(parsed)) return Infinity;
      const ageMs = Date.now() - parsed;
      return ageMs > 0 ? ageMs : 0;
    }

    function normalizeGalleryRuntimeSettings(rawSettings = {}) {
      const candidate = rawSettings && typeof rawSettings === "object" ? rawSettings : {};
      return {
        enableGalleryCrossfade: candidate.enableGalleryCrossfade !== false,
        enableFlattenedOverlay: Boolean(candidate.enableFlattenedOverlay),
        enableOverlayPolling: Boolean(candidate.enableOverlayPolling),
        enableDynamicTemplateRuntime: Boolean(candidate.enableDynamicTemplateRuntime),
        enableTemplatePolling: Boolean(candidate.enableTemplatePolling),
        enableGalleryDebugOverlay: candidate.enableGalleryDebugOverlay !== false,
        enableRuntimeWatchdog: candidate.enableRuntimeWatchdog !== false,
        enableDirectSwapMode: Boolean(candidate.enableDirectSwapMode),
      };
    }

    function normalizeGalleryRuntimeCommand(rawCommand = null) {
      const candidate = rawCommand && typeof rawCommand === "object" ? rawCommand : {};
      const command = clampMonitorString(candidate.command || "", 80);
      const commandId = clampMonitorString(candidate.commandId || "", 120);
      const issuedAt = clampMonitorString(candidate.issuedAt || "", 80);
      const reason = clampMonitorString(candidate.reason || "", 160);
      const clearCache = candidate.clearCache === true;
      if (!command || !commandId || !issuedAt) return null;
      return {
        command,
        commandId,
        issuedAt,
        reason,
        clearCache,
      };
    }

    function persistLastHandledRuntimeCommandId(commandId = "") {

    function buildDisabledSystemsList(settings = galleryRuntimeSettings) {

      const nextDisabledSystems = [];
      if (!runtime.enableGalleryCrossfade) nextDisabledSystems.push("gallery_crossfade");
      if (!runtime.enableFlattenedOverlay) nextDisabledSystems.push("flattened_overlay");
      if (!runtime.enableOverlayPolling) nextDisabledSystems.push("overlay_polling");
      if (!runtime.enableDynamicTemplateRuntime) nextDisabledSystems.push("dynamic_template_runtime");
      if (!runtime.enableTemplatePolling) nextDisabledSystems.push("template_polling");
      if (!runtime.enableGalleryDebugOverlay) nextDisabledSystems.push("gallery_debug_overlay");
      if (!runtime.enableRuntimeWatchdog) nextDisabledSystems.push("runtime_watchdog");

    function isGallerySafeModeActive(settings = galleryRuntimeSettings) {

        (visualSwapAgeSec * 1000) <= LOOP_DRIFT_STALE_MS &&

          category: "settings",
          code: "SETTINGS_LOOP_DRIFT",
          subsystem: "settings_loop",
          route: "/gallery/runtime-settings",
          message: "Settings loop stopped updating within expected time",

    function formatDebugOverlayJson(value) {

    async function copyTextWithClipboardFallback(text) {
      if (!text) return false;
      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (_) {}
      }

      let textarea = null;
      try {
        textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.setAttribute("aria-hidden", "true");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        textarea.style.pointerEvents = "none";
        textarea.style.left = "-9999px";
        textarea.style.top = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        if (document.execCommand && document.execCommand("copy")) {
          return true;
        }
      } catch (_) {
      } finally {
        if (textarea && textarea.parentNode) {
          textarea.parentNode.removeChild(textarea);
        }
      }
      return false;
    }

        setGalleryDebugOverlayFeedback("COPY FAILED — SEE CONSOLE", "error", 3500);

    function recordGalleryDebugEvent(input = {}) {
      if (!isGalleryDebugOverlayEnabled()) return;
      try {
        const now = Date.now();
        const severity = clampMonitorString(input.severity || "warn", 12) || "warn";
        const category = clampMonitorString(input.category || "unknown", 24) || "unknown";
        const code = clampMonitorString(input.code || "UNKNOWN_RUNTIME", 40) || "UNKNOWN_RUNTIME";
        const diagnosis = clampMonitorString(input.diagnosis || getGalleryDebugDefaultDiagnosis(code), 160) || getGalleryDebugDefaultDiagnosis(code);
        const message = clampMonitorString(formatMonitorValue(input.message || diagnosis), 220) || diagnosis;
        const subsystem = clampMonitorString(input.subsystem || category, 60) || category;
        const route = sanitizeMonitorRoute(input.route || "");
        const action = clampMonitorString(input.action || getGalleryDebugDefaultAction(code), 180) || getGalleryDebugDefaultAction(code);
        const signature = [severity, code, subsystem, route, message].join("|");
        const previousAtMs = Number(debugOverlayEventSeenAt[signature]) || 0;
        if (previousAtMs && (now - previousAtMs) < DEBUG_OVERLAY_EVENT_DEDUPE_MS) {
          renderGalleryDebugOverlay();
          return;
        }
        debugOverlayEventSeenAt[signature] = now;
        Object.keys(debugOverlayEventSeenAt).forEach((key) => {
          if ((now - (Number(debugOverlayEventSeenAt[key]) || 0)) > (DEBUG_OVERLAY_EVENT_DEDUPE_MS * 8)) {
            delete debugOverlayEventSeenAt[key];
          }
        });

        const snapshot = getDebugOverlaySnapshot(now);
        const entry = {
          at: new Date(now).toISOString(),
          severity,
          category,
          code,
          subsystem,
          route,
          diagnosis,
          message,
          action,
          currentPhotoIndex: snapshot.currentPhotoIndex,
          currentPhotoName: snapshot.currentPhotoName,
          approvedPhotoCount: snapshot.approvedPhotoCount,
          slideshowState: snapshot.slideshowState,
          transitionMode: snapshot.transitionMode,
          lastImageLifecycleStage: snapshot.lastImageLifecycleStage,
          lastImageLifecycleError: snapshot.lastImageLifecycleError,
          lastVisualSwapAt: snapshot.lastVisualSwapAt,
          lastVisualSwapAgeSec: snapshot.lastVisualSwapAgeSec,
          lastSuccessfulPollAt: snapshot.lastSuccessfulPollAt,
          lastSuccessfulImageLoadAt: snapshot.lastSuccessfulImageLoadAt,
          lastSuccessfulOverlayAt: snapshot.lastSuccessfulOverlayAt,
          lastSuccessfulHeartbeatAt: snapshot.lastSuccessfulHeartbeatAt,
          objectUrlCount: snapshot.objectUrlCount,
          watchdogReason: snapshot.watchdogReason,
          reloadCount: snapshot.reloadCount,
        };

        debugOverlayEvents.unshift(entry);
        if (debugOverlayEvents.length > DEBUG_OVERLAY_MAX_EVENTS) {
          debugOverlayEvents = debugOverlayEvents.slice(0, DEBUG_OVERLAY_MAX_EVENTS);
        }
        debugOverlayReportEvents.unshift(entry);
        if (debugOverlayReportEvents.length > DEBUG_OVERLAY_REPORT_EVENTS_MAX) {
          debugOverlayReportEvents = debugOverlayReportEvents.slice(0, DEBUG_OVERLAY_REPORT_EVENTS_MAX);
        }
        debugOverlayLatchedVisible = true;
        debugOverlayLastDiagnosis = diagnosis;
        debugOverlayLastSeverity = severity;
        debugOverlayLastEventAt = entry.at;
        renderGalleryDebugOverlay();
      } catch (_) {}
    }

    function getImageDebugDetails(errorMessage) {
      const normalizedMessage = String(errorMessage || "").toLowerCase();
      if (/decode/.test(normalizedMessage)) {
        return { code: "IMG_DECODE_FAIL", diagnosis: getGalleryDebugDefaultDiagnosis("IMG_DECODE_FAIL") };
      }
      if (/image_load_timeout|onload_never_fired/.test(normalizedMessage)) {
        return { code: "IMG_LOAD_TIMEOUT", diagnosis: getGalleryDebugDefaultDiagnosis("IMG_LOAD_TIMEOUT") };
      }
      if (/image_load_failed|img_onerror/.test(normalizedMessage)) {
        return { code: "IMG_ONERROR", diagnosis: getGalleryDebugDefaultDiagnosis("IMG_ONERROR") };
      }
      if (/request_timeout/.test(normalizedMessage)) {
        return { code: "PHOTO_TIMEOUT", diagnosis: getGalleryDebugDefaultDiagnosis("PHOTO_TIMEOUT") };
      }
      return { code: "PHOTO_FETCH_FAIL", diagnosis: getGalleryDebugDefaultDiagnosis("PHOTO_FETCH_FAIL") };
    }

      if (!isGalleryDebugOverlayEnabled()) return;
      const normalizedStage = String(stage || "").toLowerCase();
      if (normalizedStage === "decode_failed") {
        recordGalleryDebugEvent({
          severity: "warn",

          subsystem: "transition",
          route: "/gallery/photo",
          message: meta && meta.error ? meta.error : "crossfade_stall_detected",

          route: "/gallery/photo",

          code: "IMG_ONERROR",

          route: "/gallery/photo",

    function evaluateGalleryDebugOverlayHealth(now = Date.now()) {
      if (!isGalleryDebugOverlayEnabled() || isDocumentBackgrounded()) {
        renderGalleryDebugOverlay();
        return;
      }

      try {
        const approvedPhotoCount = getApprovedPhotoCount();
        const visualSwapAgeSec = getDebugOverlayLastVisualSwapAgeSec(now);
        auditObjectUrlPressure("debug_overlay_health");
        evaluateRuntimeLoopDrift(now);
        if (approvedPhotoCount > 1 && hasImage && visualSwapAgeSec >= 0 && (visualSwapAgeSec * 1000) > SLIDESHOW_STALL_THRESHOLD_MS) {
          recordGalleryDebugEvent({
            severity: "error",
            category: "runtime",
            code: "VISUAL_STALL",
            subsystem: getGalleryTransitionMode(),
            route: "/gallery/photo",
            message: `No visual swap for ${visualSwapAgeSec}s with ${approvedPhotoCount} approved photos`,
          });
        }

        if (
          approvedPhotoCount > 1 &&
          hasImage &&
          !rotateTimer &&
          !crossfadeInProgress &&
          visualSwapAgeSec >= 0 &&
          (visualSwapAgeSec * 1000) > (DISPLAY_MS + 2000)
        ) {
          recordGalleryDebugEvent({
            severity: "warn",
            category: "runtime",
            code: "TIMER_STALL",
            subsystem: "slideshow_timer",
            route: "/gallery/photo",
            message: "Rotation timer missing while multiple photos are available",
          });
        }

        if (
          approvedPhotoCount > 1 &&
          ["loading", "transitioning", "degraded", "recovering"].includes(String(slideshowState || ""))
        ) {
          const stateAgeSec = getDebugOverlayLastVisualSwapAgeSec(now);
          if (stateAgeSec >= 0 && (stateAgeSec * 1000) > SLIDESHOW_STALL_THRESHOLD_MS) {
            recordGalleryDebugEvent({
              severity: "warn",
              category: "runtime",
              code: "STATE_STUCK",
              subsystem: "slideshow_state",
              route: "/gallery/photo",
              message: `Slideshow state ${slideshowState} did not progress`,

          }
        }

        const pollAgeMs = getMsSinceIsoTimestamp(lastSuccessfulPollAt);
        if (
          approvedPhotoCount > 0 &&
          isGalleryWaitingVisible() &&
          qrWaitingReason !== "approved_empty" &&
          Number.isFinite(pollAgeMs) &&
          pollAgeMs !== Infinity &&
          pollAgeMs > DEBUG_OVERLAY_QR_STUCK_GRACE_MS

            subsystem: "waiting_screen",
            route: "/gallery/approved",
            message: `Waiting screen visible with ${approvedPhotoCount} approved photos`,
          });
          if (!hasImage && photos.length) {
            void startRotation({ preserveCurrentVisible: false });
          }
        }

        renderGalleryDebugOverlay();
      } catch (_) {
        renderGalleryDebugOverlay();
      }
    }

    function registerTimer(name, id) {
      if (!name || !id) return id;
      clearNamedTimer(name);
      namedTimers[name] = id;
      return id;
    }

    function clearNamedTimer(name) {
      const existingId = namedTimers[name];
      if (existingId) {
        try {
          clearTimeout(existingId);
        } catch (_) {}
        delete namedTimers[name];
      }
      return Boolean(existingId);
    }

    function registerInterval(name, id) {
      if (!name || !id) return id;
      clearNamedInterval(name);
      namedIntervals[name] = id;
      return id;
    }

    function clearNamedInterval(name) {
      const existingId = namedIntervals[name];
      if (existingId) {
        try {
          clearInterval(existingId);
        } catch (_) {}
        delete namedIntervals[name];
      }
      return Boolean(existingId);
    }

    function clearAllRegisteredTimersAndIntervals() {
      Object.keys(namedTimers).forEach((name) => clearNamedTimer(name));
      Object.keys(namedIntervals).forEach((name) => clearNamedInterval(name));
      refreshTimer = null;
      overlayRefreshTimer = null;

      runtimeSettingsRefreshTimer = null;
      rotateTimer = null;
      templateRefreshTimer = null;
      runtimeWatchdogTimer = null;
