    function normalizePendingFetchMeta(meta = {}) {
      const startAt = Number.isFinite(meta.startAt) ? meta.startAt : Date.now();
      const timeoutMs = Number.isFinite(meta.timeoutMs)
        ? Math.max(1000, Math.round(meta.timeoutMs))
        : REQUEST_TIMEOUT_MS;
      return {
        name: clampMonitorString(meta.name || "", 120),
        category: clampMonitorString(meta.category || "fetch", 40),
        route: sanitizeMonitorRoute(meta.route || ""),
        startAt,
        timeoutMs,
        controller: meta.controller || null,
        photoId: clampMonitorString(meta.photoId || "", 120),
        photoName: clampMonitorString(meta.photoName || "", 200),
      };
    }

    function registerPendingFetch(meta = {}) {
      const entry = normalizePendingFetchMeta(meta);
      if (!entry.name) return null;
      pendingFetchRegistry[entry.name] = entry;
      return entry;
    }

    function trackPendingFetch(name, startedAtMs = Date.now()) {
      return registerPendingFetch({ name, startAt: startedAtMs });
    }

    function unregisterPendingFetch(name) {
      if (!name) return;
      delete pendingFetchRegistry[name];
    }

    function untrackPendingFetch(name) {
      unregisterPendingFetch(name);
    }

    function getPendingFetchEntries() {
      return Object.values(pendingFetchRegistry);
    }

    function getPendingFetchNames() {
      return getPendingFetchEntries().map((entry) => entry.name);
    }

    function getPendingFetchCount() {
      return getPendingFetchEntries().length;
    }

    function getPendingFetchAgeMs(entry, now = Date.now()) {
      if (!entry || !Number.isFinite(entry.startAt)) return 0;
      return Math.max(0, now - entry.startAt);
    }

    function isPendingFetchStale(entry, now = Date.now()) {
      if (!entry || !entry.name) return false;
      return getPendingFetchAgeMs(entry, now) > (entry.timeoutMs + PENDING_FETCH_GRACE_MS);
    }

    function getCurrentStalePendingFetchCount(now = Date.now()) {
      return getPendingFetchEntries().filter((entry) => isPendingFetchStale(entry, now)).length;
    }

    function getPendingFetchTelemetryList(now = Date.now()) {
      return getPendingFetchEntries().map((entry) => ({
        name: entry.name,
        category: entry.category,
        route: entry.route,
        ageSec: Math.round(getPendingFetchAgeMs(entry, now) / 1000),
        timeoutSec: Math.round(entry.timeoutMs / 1000),
        stale: isPendingFetchStale(entry, now),
        photoId: entry.photoId || "",
      }));
    }

    function recordStaleFetchEvent(entry, code, extra = {}) {
      try {
        const now = Date.now();
        const ageMs = entry ? getPendingFetchAgeMs(entry, now) : 0;
        const event = {
          at: new Date(now).toISOString(),
          code: clampMonitorString(code || "STALE_FETCH_ABORTED", 40),
          name: entry && entry.name ? entry.name : "",
          category: entry && entry.category ? entry.category : "",
          route: entry && entry.route ? entry.route : "",
          ageMs,
          timeoutMs: entry && entry.timeoutMs ? entry.timeoutMs : 0,
          photoId: entry && entry.photoId ? entry.photoId : "",
          message: clampMonitorString(extra.message || "", 200),
        };
        staleFetchEvents.push(event);
        if (staleFetchEvents.length > STALE_FETCH_EVENTS_MAX) {
          staleFetchEvents = staleFetchEvents.slice(-STALE_FETCH_EVENTS_MAX);
        }
        totalStaleFetchAborts += 1;
        return event;
      } catch (_) {
        return null;
      }
    }

    function appendStaleFetchDebugOverlayLines(entry, code, action = "") {
      if (!entry || !isGalleryDebugOverlayEnabled()) return;
      const ageSec = Math.round(getPendingFetchAgeMs(entry) / 1000);
      const timeoutSec = Math.round((entry.timeoutMs || REQUEST_TIMEOUT_MS) / 1000);
      const compact = `STALE FETCH: ${entry.name} ${ageSec}s`;
      recordGalleryDebugEvent({
        severity: "warn",
        category: "runtime",
        code: "STALE_FETCH_ABORTED",
        subsystem: entry.category || entry.name,
        route: entry.route || "",
        diagnosis: compact,
        message: `${compact} (timeout ${timeoutSec}s)`,
        action: action || "Stale fetch aborted to unblock slideshow.",
      });
      recordGalleryDebugEvent({
        severity: "warn",
        category: "runtime",
        code: "ABORTED",
        subsystem: entry.category || entry.name,
        route: entry.route || "",
        diagnosis: `ABORTED: ${entry.name}`,
        message: `ABORTED: ${entry.name}`,
      });
      if (action) {
        recordGalleryDebugEvent({
          severity: "warn",
          category: "runtime",
          code: "RECOVERY",
          subsystem: entry.category || entry.name,
          route: entry.route || "",
          diagnosis: `RECOVERY: ${action}`,
          message: action,
        });
      }
    }

    function abortPendingFetchController(entry) {
      if (!entry || !entry.controller || typeof entry.controller.abort !== "function") {
        return false;
      }
      try {
        entry.controller.abort();
        return true;
      } catch (_) {
        return false;
      }
    }

    function clearInFlightLockForPendingFetch(entry) {
      const name = entry && entry.name ? entry.name : "";
      const category = entry && entry.category ? entry.category : "";
      if (name === "approved_manifest" || category === "approved_manifest") {
        approvedFetchInFlight = false;
        approvedFetchStartedAtMs = 0;
      }
      if (name === "overlay_manifest" || name === "overlay_fetch" || category === "overlay_fetch") {
        overlayFetchInFlight = false;
        overlayFetchStartedAtMs = 0;
      }
      if (name === "telemetry_heartbeat" || category === "telemetry_heartbeat") {
        telemetryHeartbeatInFlight = false;
        telemetryHeartbeatStartedAtMs = 0;
      }
      if (name === "runtime_settings" || category === "runtime_settings") {
        runtimeSettingsFetchInFlight = false;
        runtimeSettingsFetchStartedAtMs = 0;
      }
    }

    function inferPendingFetchCategory(entry) {
      const name = entry && entry.name ? entry.name : "";
      const category = entry && entry.category ? entry.category : "";
      if (category) return category;
      if (name === "approved_manifest") return "approved_manifest";
      if (name === "overlay_manifest" || name === "overlay_fetch") return "overlay_fetch";
      if (name === "telemetry_heartbeat") return "telemetry_heartbeat";
      if (name === "runtime_settings") return "runtime_settings";
      if (name.startsWith("photo_slot_")) return "photo_fetch";
      return "fetch";
    }

    function handleStaleApprovedManifestFetch(entry) {
      recordStaleFetchEvent(entry, "MANIFEST_FETCH_STALE", {
        message: "Manifest fetch stale; keeping last-known slideshow manifest.",
      });
      appendStaleFetchDebugOverlayLines(entry, "MANIFEST_FETCH_STALE", "kept last-known manifest");
      lastApprovedFetchStatus = "fail";
      lastApprovedFetchError = "stale_fetch_aborted";
    }

    function handleStalePhotoFetch(entry) {
      recordStaleFetchEvent(entry, "PHOTO_FETCH_STALE", {
        message: "Photo fetch stale; releasing slideshow wait.",
      });
      appendStaleFetchDebugOverlayLines(entry, "PHOTO_FETCH_STALE", "tried next photo");
      lastPhotoFetchStatus = "fail";
      lastPhotoFetchError = "stale_fetch_aborted";
      if (getApprovedPhotoCount() > 0) {
        if (hasImage && !isSinglePhotoMode()) {
          const nextIndex = getNextPhotoIndex(currentIndex);
          void showCurrentPhoto({ targetIndex: nextIndex, advanceReason: "stale_photo_fetch_recovery" });
        } else {
          restartSlideshowLoop("photo_fetch_stale");
        }
      }
    }

    function handleStaleTelemetryHeartbeatFetch(entry) {
      recordStaleFetchEvent(entry, "TELEMETRY_ONLY_STALE", {
        message: "Telemetry heartbeat stale; playback unaffected.",
      });
      appendStaleFetchDebugOverlayLines(entry, "TELEMETRY_ONLY_STALE", "heartbeat backoff");
      recordHeartbeatFailure("telemetry_only_stale");
      activateFetchFailureBackoff("telemetry_only_stale");
      rescheduleManagedPollingLoops("telemetry_only_stale");
    }

    function handleStaleOverlayFetch(entry) {
      recordStaleFetchEvent(entry, "OVERLAY_FETCH_STALE", {
        message: "Overlay fetch stale; slideshow continues.",
      });
      appendStaleFetchDebugOverlayLines(entry, "OVERLAY_FETCH_STALE", "kept slideshow running");
      lastOverlayFetchStatus = "fail";
      lastOverlayFetchError = "stale_fetch_aborted";
    }

    function handleStaleRuntimeSettingsFetch(entry) {
      recordStaleFetchEvent(entry, "SETTINGS_FETCH_STALE", {
        message: "Runtime settings fetch stale; keeping current mode.",
      });
      appendStaleFetchDebugOverlayLines(entry, "SETTINGS_FETCH_STALE", "kept current runtime mode");
      lastRuntimeSettingsError = "stale_fetch_aborted";
    }

    function recoverStalePendingFetches(now = Date.now()) {
      const staleEntries = getPendingFetchEntries().filter((entry) => isPendingFetchStale(entry, now));
      staleInFlightFetches = staleEntries.length;
      if (!staleEntries.length) {
        staleInFlightFetches = getCurrentStalePendingFetchCount(now);
        return 0;
      }

      staleEntries.forEach((entry) => {
        const ageMs = getPendingFetchAgeMs(entry, now);
        abortPendingFetchController(entry);
        recordStaleFetchEvent(entry, "STALE_FETCH_ABORTED", {
          message: `stale fetch aborted after ${ageMs}ms (timeout ${entry.timeoutMs}ms)`,
        });
        appendRuntimeLog("stale_fetch_aborted", entry.name, {
          name: entry.name,
          ageMs,
          timeoutMs: entry.timeoutMs,
          category: entry.category,
        });
        void sendDeviceLog("warn", "stale_fetch_aborted", `Stale fetch aborted (${entry.name})`, {
          name: entry.name,
          ageMs,
          timeoutMs: entry.timeoutMs,
          category: entry.category,
          route: entry.route,
        });

        const category = inferPendingFetchCategory(entry);
        if (category === "approved_manifest") {
          handleStaleApprovedManifestFetch(entry);
        } else if (category === "photo_fetch") {
          handleStalePhotoFetch(entry);
        } else if (category === "telemetry_heartbeat") {
          handleStaleTelemetryHeartbeatFetch(entry);
        } else if (category === "overlay_fetch") {
          handleStaleOverlayFetch(entry);
        } else if (category === "runtime_settings") {
          handleStaleRuntimeSettingsFetch(entry);
        }

        clearInFlightLockForPendingFetch(entry);
        unregisterPendingFetch(entry.name);
      });

      staleInFlightFetches = getCurrentStalePendingFetchCount(now);
      return staleEntries.length;
    }

    function getRuntimeSettingsLastAppliedAgeSec() {
      const ageMs = getMsSinceIsoTimestamp(lastRuntimeSettingsAppliedAt);
      if (!Number.isFinite(ageMs) || ageMs === Infinity || ageMs < 0) return -1;
      return Math.round(ageMs / 1000);
    }

    function getRuntimeSettingsLastFetchAgeSec() {
      const ageMs = getMsSinceIsoTimestamp(lastRuntimeSettingsFetchAt);
      if (!Number.isFinite(ageMs) || ageMs === Infinity || ageMs < 0) return -1;
      return Math.round(ageMs / 1000);
    }

    function getActiveImageSlotCount() {
      try {
        return imgSlots.reduce((count, img) => {
          if (!img) return count;
          const src = String(img.getAttribute("src") || "").trim();
          return src ? count + 1 : count;
        }, 0);
      } catch (_) {
        return 0;
      }
    }

    function getObjectUrlCount() {
      return trackedObjectUrls.size;
    }

    function getActiveBlobCount() {
      return trackedObjectUrls.size;
    }

    function revokeTrackedObjectUrl(url) {
      const normalizedUrl = String(url || "").trim();
      if (!normalizedUrl) return false;
      try {
        URL.revokeObjectURL(normalizedUrl);
      } catch (_) {}
      trackedObjectUrls.delete(normalizedUrl);
      return true;
    }

    function createTrackedObjectUrl(blob) {
      const objectUrl = URL.createObjectURL(blob);
      trackedObjectUrls.add(objectUrl);
      return objectUrl;
    }

    function auditObjectUrlPressure(reason = "") {
      try {
        const objectUrlCount = getObjectUrlCount();
        objectUrlPeak = Math.max(objectUrlPeak, objectUrlCount);
        const now = Date.now();
        const isNormalTransitionSpike = objectUrlCount <= (EXPECTED_MAX_OBJECT_URLS + 1);
        const shouldWarn = objectUrlCount > (EXPECTED_MAX_OBJECT_URLS + 1);
        const shouldEscalate = objectUrlCount > (EXPECTED_MAX_OBJECT_URLS + 2);

        if (!shouldWarn) {
          objectUrlWarningActive = false;
          objectUrlWarningSinceMs = 0;
          return;
        }

        if (!objectUrlWarningSinceMs) {
          objectUrlWarningSinceMs = now;
        }

        const warningAgeMs = now - objectUrlWarningSinceMs;
        objectUrlWarningActive = shouldEscalate || warningAgeMs >= 5000;
        if (!objectUrlWarningActive && isNormalTransitionSpike) {
          return;
        }
        if (!objectUrlWarningActive && !shouldEscalate) {
          return;
        }
        recordGalleryDebugEvent({
          severity: shouldEscalate ? "error" : "warn",
          category: "runtime",
          code: "OBJ_URL_GROWTH",
          subsystem: "object_url_pool",
          route: "/gallery/photo",
          message: `objectUrlCount=${objectUrlCount} reason=${reason || "unknown"}`,
          action: shouldEscalate
            ? "Object URL count is beyond normal transition behavior; inspect slot cleanup."
            : "Object URL count stayed above the normal transition peak; inspect slot cleanup.",
        });
      } catch (_) {}
    }

    function releaseTrackedObjectUrls(reason = "runtime_cleanup") {
      try {
        imgSlots.forEach((_, index) => {
          clearSlotObjectUrl(index, { clearSrc: true, clearPhotoId: true });
        });
        trackedObjectUrls.forEach((url) => {
          revokeTrackedObjectUrl(url);
        });
        appendRuntimeLog("cleanup", `released_object_urls:${reason}`, {
          reason,
          objectUrlCount: getObjectUrlCount(),
        });
      } catch (_) {}
    }

    function appendRuntimeLog(type, message, details = null) {
      try {
        const entry = {
          at: new Date().toISOString(),
          type: clampMonitorString(type || "runtime", 40),
          message: clampMonitorString(message || "", 200),
        };
        if (details && typeof details === "object") {
          entry.details = details;
        }
        recentRuntimeLogs.push(entry);
        if (recentRuntimeLogs.length > RUNTIME_LOG_MAX) {
          recentRuntimeLogs = recentRuntimeLogs.slice(-RUNTIME_LOG_MAX);
        }
        galleryDebug("[runtime]", entry.type, entry.message, entry.details || "");
      } catch (_) {}
    }

    function appendSettingsRuntimeLog(message, details = null, throttleMs = 30000) {
      try {
        const now = Date.now();
        if (lastSettingsRuntimeEvent === message && (now - lastSettingsRuntimeEventAtMs) < throttleMs) {
          return;
        }
        lastSettingsRuntimeEvent = message;
        lastSettingsRuntimeEventAtMs = now;
        appendRuntimeLog("settings", message, details);
      } catch (_) {}
    }

    function isDocumentBackgrounded() {
      try {
        return String(document.visibilityState || "").toLowerCase() === "hidden";
      } catch (_) {
        return false;
      }
    }

    function getGalleryTransitionMode() {
      return isGalleryCrossfadeEnabled() ? "crossfade" : "direct_swap";
    }

    function applyGalleryTransitionMode() {
      try {
        imgSlots.forEach((img) => {
          if (!img) return;
          img.style.transition = isGalleryCrossfadeEnabled() ? "" : "none";
        });
      } catch (_) {}
    }

    function recordVisualSwap(mode = getGalleryTransitionMode(), startedAtMs = 0) {
      try {
        const normalizedMode = mode === "direct_swap" ? "direct_swap" : "crossfade";
        if (normalizedMode === "direct_swap") {
          directSwapCount += 1;
        } else {
          crossfadeCount += 1;
        }
        lastVisualSwapAt = new Date().toISOString();
        lastVisualSwapMode = normalizedMode;
        lastVisualSwapMs = startedAtMs > 0 ? Math.max(0, Date.now() - startedAtMs) : 0;
      } catch (_) {}
    }

    function isPlaybackHealthyDuringHeartbeatFailure(now = Date.now()) {
      try {
        const pollAgeMs = getMsSinceIsoTimestamp(lastSuccessfulPollAt);
        const imageAgeMs = getMsSinceIsoTimestamp(lastSuccessfulImageLoadAt);
        const visualReference = lastVisualSwapAt || lastPhotoChangeAt;
        const visualAgeMs = getMsSinceIsoTimestamp(visualReference);
        const approvedPhotoCount = getApprovedPhotoCount();
        const visualHealthy = approvedPhotoCount <= 1
          ? hasImage
          : Number.isFinite(visualAgeMs) && visualAgeMs < Math.max(SLIDESHOW_STALL_THRESHOLD_MS, DISPLAY_MS * 2);
        return Boolean(
          !getSlideshowVisualStalled(now) &&
          Number.isFinite(pollAgeMs) &&
          pollAgeMs < RUNTIME_POLL_STALE_MS &&
          Number.isFinite(imageAgeMs) &&
          imageAgeMs < RUNTIME_PHOTO_CHANGE_STALE_MS &&
          visualHealthy
        );
      } catch (_) {
        return false;
      }
    }

    function getRuntimePhotoStaleReason() {
      return isGalleryCrossfadeEnabled() ? "photo_change_stale" : "slideshow_timer_or_runtime_freeze";
    }

    function getSlideshowStallRecoveryReason() {
      return isGalleryCrossfadeEnabled() ? "slideshow_stalled" : "slideshow_timer_or_runtime_freeze";
    }

    function getRuntimeHealthSnapshot(now = Date.now()) {
      const uptimeMs = now - telemetryStartedAtMs;
      const heartbeatAgeMs = getMsSinceIsoTimestamp(lastSuccessfulHeartbeatAt);
      const pollAgeMs = getMsSinceIsoTimestamp(lastSuccessfulPollAt);
      const photoChangeAgeMs = hasImage && lastPhotoChangeAt ? getMsSinceIsoTimestamp(lastPhotoChangeAt) : 0;
      const imageLoadAgeMs = getMsSinceIsoTimestamp(lastSuccessfulImageLoadAt);

      if (isDocumentBackgrounded()) {
        return {
          isDegraded: false,
          reason: "",
          heartbeatAgeMs,
          pollAgeMs,
          photoChangeAgeMs,
          imageLoadAgeMs,
          backgrounded: true,
        };
      }

      if (uptimeMs < RUNTIME_BOOT_GRACE_MS) {
        return {
          isDegraded: false,
          reason: "",
          heartbeatAgeMs,
          pollAgeMs,
          photoChangeAgeMs,
          imageLoadAgeMs,
        };
      }

      const reasons = [];
      const pendingStaleCount = getCurrentStalePendingFetchCount(now);
      const playbackHealthy = isPlaybackHealthyDuringHeartbeatFailure(now);
      if (pendingStaleCount > 0) reasons.push("pending_fetch_stale");
      if (heartbeatAgeMs > RUNTIME_HEARTBEAT_STALE_MS && !playbackHealthy) reasons.push("heartbeat_stale");
      if (pollAgeMs > RUNTIME_POLL_STALE_MS) reasons.push("poll_stale");
      if (photos.length && hasImage && photoChangeAgeMs > RUNTIME_PHOTO_CHANGE_STALE_MS) {
        reasons.push(getRuntimePhotoStaleReason());
      }

      return {
        isDegraded: reasons.length > 0,
        telemetryOnly: heartbeatAgeMs > RUNTIME_HEARTBEAT_STALE_MS && playbackHealthy,
        reason: reasons.join(","),
        heartbeatAgeMs,
        pollAgeMs,
        photoChangeAgeMs,
        imageLoadAgeMs,
      };
    }

    function clearStaleInFlightLocks(now = Date.now()) {
      return recoverStalePendingFetches(now);
    }

    function performRuntimeStage1Recovery(reason) {
      const now = Date.now();
      lastRecoveryStage = "stage1_soft";
      lastStage1RecoveryAtMs = now;
      setRecoveryAction(`runtime_stage1:${reason}`);
      recordGalleryDebugEvent({
        severity: "warn",
        category: "runtime",
        code: "WATCHDOG_RECOVERY",
        subsystem: "runtime_watchdog",
        route: "/gallery/runtime-watchdog",
        message: reason || "runtime_stage1_recovery",
        action: "Monitor if slideshow resumes; Pi/browser restart may be needed if this repeats.",
      });
      appendRuntimeLog("recovery", `stage1_soft:${reason}`, { reason });
      void sendDeviceLog("warn", "runtime_stage1_recovery", `Runtime stage-1 recovery (${reason})`, {
        reason,
        watchdogReason: watchdogReason || reason,
        reloadCount,
      });

      clearStaleInFlightLocks(now);
      rescheduleManagedPollingLoops(`runtime_watchdog_stage1:${reason}`);
      if (!approvedFetchInFlight) void fetchApproved();
      if (isFlattenedOverlayRuntimeEnabled() && !overlayFetchInFlight) void fetchActiveOverlay();
      void sendTelemetryHeartbeat();
      if (photos.length) {
        restartSlideshowLoop(`runtime_stage1:${reason}`);
      }
      return true;
    }

    function canPerformKioskReload(now = Date.now()) {
      if (hardReloadScheduled) return false;
      if (reloadCount >= MAX_KIOSK_RELOAD_COUNT) return false;
      const lastReloadMs = lastReloadAt ? Date.parse(lastReloadAt) : 0;
      if (Number.isFinite(lastReloadMs) && lastReloadMs > 0 && (now - lastReloadMs) < MIN_KIOSK_RELOAD_COOLDOWN_MS) {
        return false;
      }
      return true;
    }

    function performRuntimeStage2Reload(reason) {
      const now = Date.now();
      if (!canPerformKioskReload(now)) {
        appendRuntimeLog("reload_blocked", `stage2_reload_blocked:${reason}`, {
          reloadCount,
          lastReloadAt,
        });
        return false;
      }

      hardReloadScheduled = true;
      reloadCount += 1;
      lastReloadAt = new Date().toISOString();
      lastRecoveryStage = "stage2_reload";
      watchdogTriggered = true;
      watchdogReason = reason || watchdogReason || "runtime_reload";
      setRecoveryAction(`runtime_stage2_reload:${reason}`);
      recordGalleryDebugEvent({
        severity: "error",
        category: "runtime",
        code: "RUNTIME_RELOAD",
        subsystem: "runtime_watchdog",
        route: "/gallery/runtime-watchdog",
        message: reason || "runtime_stage2_reload",
        action: "Watch for gallery reload; add Pi-level watchdog if this repeats.",
      });
      appendRuntimeLog("reload", `stage2_reload:${reason}`, {
        reloadCount,
        lastReloadAt,
      });
      try {
        window.sessionStorage.setItem(GALLERY_KIOSK_RELOAD_COUNT_KEY, String(reloadCount));
        window.sessionStorage.setItem(GALLERY_KIOSK_LAST_RELOAD_AT_KEY, lastReloadAt);
      } catch (_) {}

      void sendDeviceLog("error", "kiosk_runtime_reload", `Runtime stage-2 reload (${reason})`, {
        reason,
        reloadCount,
        lastReloadAt,
        watchdogReason: watchdogReason || reason,
      });
      void sendTelemetryHeartbeat();
      setTimeout(() => {
        try {
          window.location.reload();
        } catch (_) {}
      }, HARD_RELOAD_DELAY_MS);
      return true;
    }

    function evaluateRuntimeWatchdog() {
      try {
        const now = Date.now();
        lastRuntimeWatchdogAtMs = now;

        if (isDocumentBackgrounded()) {
          runtimeDegraded = false;
          runtimeDegradedSinceMs = 0;
          watchdogTriggered = false;
          watchdogReason = "";
          return;
        }

        const staleRecoveredCount = clearStaleInFlightLocks(now);
        if (staleRecoveredCount > 0) {
          performRuntimeStage1Recovery("pending_fetch_stale");
          evaluateSlideshowStallRecovery(now);
          updateImageLifecycleDetections(now);
          return;
        }
        const health = getRuntimeHealthSnapshot(now);
        const wasDegraded = runtimeDegraded;

        if (health.telemetryOnly) {
          const wasTelemetryOnly = watchdogReason === "telemetry_only_stale";
          runtimeDegraded = false;
          runtimeDegradedSinceMs = 0;
          watchdogTriggered = false;
          watchdogReason = "telemetry_only_stale";
          recordGalleryDebugEvent({
            severity: "warn",
            category: "heartbeat",
            code: "TELEMETRY_WARNING",
            subsystem: "telemetry_heartbeat",
            route: "/api/device-heartbeat",
            diagnosis: "TELEMETRY WARNING — playback may still be OK",
            message: "Heartbeat loop is stale while playback still looks healthy.",
            action: "Inspect telemetry POST path and Chromium background loop behavior.",
          });
          if (!wasTelemetryOnly) {
            appendRuntimeLog("watchdog", "telemetry_only_stale", health);
          }
          return;
        }

        runtimeDegraded = Boolean(health.isDegraded);
        if (runtimeDegraded) {
          if (!runtimeDegradedSinceMs) runtimeDegradedSinceMs = now;
          watchdogTriggered = true;
          watchdogReason = health.reason || "runtime_degraded";
          if (!wasDegraded) {
            const debugCode = getRuntimeDebugCode(health.reason);
            recordGalleryDebugEvent({
              severity: "warn",
              category: "runtime",
              code: debugCode,
              subsystem: "runtime_watchdog",
              route: debugCode === "HB_TIMEOUT"
                ? "/api/device-heartbeat"
                : debugCode === "MANIFEST_FAIL"
                  ? "/gallery/approved"
                  : "/gallery/photo",
              message: health.reason || "runtime_degraded",
            });
            appendRuntimeLog("watchdog", `runtime_degraded:${watchdogReason}`, health);
          }
        } else {
          runtimeDegradedSinceMs = 0;
          watchdogTriggered = false;
          watchdogReason = "";
          if (wasDegraded) {
            appendRuntimeLog("watchdog", "runtime_recovered", health);
            lastRecoveryStage = "";
          }
          evaluateSlideshowStallRecovery(now);
          updateImageLifecycleDetections(now);
          return;
        }

        const sinceDegradedMs = runtimeDegradedSinceMs ? (now - runtimeDegradedSinceMs) : 0;
        const sinceStage1Ms = lastStage1RecoveryAtMs ? (now - lastStage1RecoveryAtMs) : Infinity;
        const canRunStage1 = !lastStage1RecoveryAtMs || sinceStage1Ms >= RUNTIME_STAGE1_COOLDOWN_MS;

        if (canRunStage1) {
          performRuntimeStage1Recovery(watchdogReason);
          return;
        }

        if (
          sinceDegradedMs >= RUNTIME_STAGE2_AFTER_DEGRADED_MS &&
          sinceStage1Ms >= RUNTIME_STAGE2_AFTER_STAGE1_MS
        ) {
          performRuntimeStage2Reload(watchdogReason);
        } else {
          appendRuntimeLog("watchdog_wait", `awaiting_stage2:${watchdogReason}`, {
            sinceDegradedMs,
            sinceStage1Ms,
            reloadCount,
          });
        }

        evaluateSlideshowStallRecovery(now);
        updateImageLifecycleDetections(now);
      } catch (err) {
        galleryDebug("runtime watchdog evaluation failed", {
          error: err && err.message ? err.message : String(err),
        });
      }
    }

    function startRuntimeWatchdog() {
      if (!isRuntimeWatchdogEnabled()) {
        stopRuntimeWatchdogLoop();
        return;
      }
      clearNamedInterval("runtime_watchdog");
      runtimeWatchdogTimer = registerInterval("runtime_watchdog", setInterval(evaluateRuntimeWatchdog, RUNTIME_WATCHDOG_INTERVAL_MS));
      appendRuntimeLog("watchdog", "runtime_watchdog_started");
      evaluateRuntimeWatchdog();
    }

    function recordRuntimeLifecycleEvent(eventName, details = {}) {
      const message = clampMonitorString(eventName || "lifecycle", 80);
      appendRuntimeLog("lifecycle", message, details);
      void sendDeviceLog("info", "runtime_lifecycle", message, details);
    }

    function installRuntimeLifecycleHandlers() {
      try {
        if (lifecycleHandlersInstalled) return;
        lifecycleHandlersInstalled = true;
        documentVisibilityState = document.visibilityState || "";
        navigatorOnline = navigator.onLine !== false;

        document.addEventListener("visibilitychange", () => {
          documentVisibilityState = document.visibilityState || "";
          recordRuntimeLifecycleEvent(`visibilitychange:${documentVisibilityState}`, {
            visibilityState: documentVisibilityState,
          });
          if (document.visibilityState === "visible") {
            rescheduleManagedPollingLoops("visibility_visible");
            void sendTelemetryHeartbeat();
          }
        });
        eventListenerInstallCount += 1;

        window.addEventListener("pageshow", (event) => {
          recordRuntimeLifecycleEvent("pageshow", {
            persisted: Boolean(event && event.persisted),
          });
          rescheduleManagedPollingLoops("pageshow");
        });
        eventListenerInstallCount += 1;

        window.addEventListener("pagehide", (event) => {
          recordRuntimeLifecycleEvent("pagehide", {
            persisted: Boolean(event && event.persisted),
          });
          clearAllPendingFetchesForReload("pagehide");
          clearAllRegisteredTimersAndIntervals();
          releaseTrackedObjectUrls("pagehide");
        });
        eventListenerInstallCount += 1;

        window.addEventListener("beforeunload", () => {
          recordRuntimeLifecycleEvent("beforeunload");
          clearAllPendingFetchesForReload("beforeunload");
          clearAllRegisteredTimersAndIntervals();
          releaseTrackedObjectUrls("beforeunload");
        });
        eventListenerInstallCount += 1;

        window.addEventListener("online", () => {
          navigatorOnline = true;
          recordRuntimeLifecycleEvent("online");
          rescheduleManagedPollingLoops("online");
          void sendTelemetryHeartbeat();
        });
        eventListenerInstallCount += 1;

        window.addEventListener("offline", () => {
          navigatorOnline = false;
          recordRuntimeLifecycleEvent("offline");
        });
        eventListenerInstallCount += 1;
      } catch (_) {}
    }

    function sanitizeMonitorRoute(routeOrUrl) {
      const rawValue = String(routeOrUrl || "").trim();
      if (!rawValue) return "";

      try {
        const normalizedUrl = rawValue.startsWith("http://") || rawValue.startsWith("https://")
          ? new URL(rawValue)
          : new URL(rawValue, window.location.origin);
        return clampMonitorString(normalizedUrl.pathname || "", 240);
      } catch (_) {
        const withoutQuery = rawValue.split("?")[0].trim();
        if (!withoutQuery) return "";
        return clampMonitorString(withoutQuery.startsWith("/") ? withoutQuery : `/${withoutQuery.replace(/^\/+/, "")}`, 240);
      }
    }

    function findPhotoNameById(photoId) {
      if (!photoId) return "";
      try {
        const match = Array.isArray(photos)
          ? photos.find((photo) => String(photo && photo.id ? photo.id : "") === String(photoId))
          : null;
        return match && match.name ? String(match.name) : "";
      } catch (_) {
        return "";
      }
    }

    function shouldSkipDuplicateRecentError(entry) {
      try {
        const signature = [
          entry && entry.category ? entry.category : "",
          entry && entry.route ? entry.route : "",
          entry && entry.message ? entry.message : "",
          entry && entry.currentPhotoId ? entry.currentPhotoId : "",
        ].join("|");
        const now = Date.now();
        if (
          signature &&
          signature === lastRecordedTelemetryErrorSignature &&
          (now - lastRecordedTelemetryErrorAtMs) <= TELEMETRY_ERROR_DEDUPE_WINDOW_MS
        ) {
          return true;
        }
        lastRecordedTelemetryErrorSignature = signature;
        lastRecordedTelemetryErrorAtMs = now;
      } catch (_) {}
      return false;
    }

    function recordRecentError(categoryOrEntry, value, meta = {}) {
      try {
        const entryInput = categoryOrEntry && typeof categoryOrEntry === "object" && !Array.isArray(categoryOrEntry)
          ? categoryOrEntry
          : {
              category: categoryOrEntry,
              message: value,
              ...(meta && typeof meta === "object" ? meta : {}),
            };
        const message = clampMonitorString(formatMonitorValue(entryInput.message), 500);
        if (!message) return;

        const category = clampMonitorString(entryInput.category || entryInput.type || "unknown", 20) || "unknown";
        const resolvedPhotoId = entryInput.currentPhotoId != null
          ? String(entryInput.currentPhotoId)
          : entryInput.includeCurrentPhoto === false
            ? ""
            : currentPhotoId || "";
        const resolvedPhotoName = entryInput.currentPhotoName != null
          ? String(entryInput.currentPhotoName)
          : entryInput.includeCurrentPhoto === false
            ? ""
            : resolvedPhotoId
              ? findPhotoNameById(resolvedPhotoId) || currentPhotoName || ""
              : currentPhotoName || "";
        const nextEntry = {
          at: new Date().toISOString(),
          type: clampMonitorString(entryInput.type || category || "error", 80),
          category,
          route: sanitizeMonitorRoute(entryInput.route || entryInput.url || entryInput.source || ""),
          message,
          currentPhotoId: clampMonitorString(resolvedPhotoId, 120),
          currentPhotoName: clampMonitorString(resolvedPhotoName, 200),
        };
        if (shouldSkipDuplicateRecentError(nextEntry)) return;

        recentErrors.push(nextEntry);
        if (recentErrors.length > RECENT_ERRORS_MAX) {
          recentErrors = recentErrors.slice(-RECENT_ERRORS_MAX);
        }
        telemetryLastErrorMessage = message;
      } catch (_) {}
    }

    function setRecoveryAction(action) {
      try {
        lastRecoveryAction = clampMonitorString(action || "", 200);
      } catch (_) {}
    }

    function getApprovedPhotoCount() {
      return Array.isArray(photos) ? photos.length : 0;
    }

    function isSinglePhotoMode() {
      return getApprovedPhotoCount() === 1;
    }

    function normalizeCurrentPhotoIndex() {
      const count = getApprovedPhotoCount();
      if (!count) {
        currentIndex = 0;
        return 0;
      }
      if (!Number.isFinite(currentIndex) || currentIndex < 0) {
        currentIndex = 0;
      } else if (currentIndex >= count) {
        currentIndex = currentIndex % count;
      }
      return currentIndex;
    }

    function getNextPhotoIndex(fromIndex = currentIndex) {
      const count = getApprovedPhotoCount();
      if (!count) return 0;
      if (count === 1) return 0;
      const baseIndex = Number.isFinite(fromIndex) ? fromIndex : 0;
      return (baseIndex + 1) % count;
    }

    function setSlideshowState(nextState, reason = "") {
      try {
        const normalizedState = SLIDESHOW_STATES[nextState] ? nextState : SLIDESHOW_STATES.ready;
        const fromState = slideshowState;
        const allowedTargets = ALLOWED_SLIDESHOW_TRANSITIONS[fromState];
        if (allowedTargets && !allowedTargets.includes(normalizedState) && fromState !== normalizedState) {
          galleryDebug("slideshow state transition allowed with override", {
            fromState,
            normalizedState,
            reason,
          });
        }
        slideshowState = normalizedState;
        lastSlideshowStateReason = clampMonitorString(reason || "", 200);
        appendRuntimeLog("slideshow_state", `${fromState}->${normalizedState}:${lastSlideshowStateReason}`, {
          approvedPhotoCount: getApprovedPhotoCount(),
          currentIndex: normalizeCurrentPhotoIndex(),
          currentPhotoId: currentPhotoId || "",
        });
        refreshGallerySentryScope({ reason: lastSlideshowStateReason || "" });
      } catch (_) {}
    }

    function recordSlideshowAdvance(reason, file = null) {
      try {
        slideshowLoopCount += 1;
        lastSlideshowAdvanceAt = new Date().toISOString();
        lastSlideshowAdvanceReason = clampMonitorString(reason || "", 120);
        const nextIndex = normalizeCurrentPhotoIndex();
        const nextPhotoId = file && file.id ? String(file.id) : currentPhotoId || "";
        if (nextIndex === lastSlideshowAdvanceIndex && nextPhotoId && nextPhotoId === lastSlideshowAdvancePhotoId) {
          stuckAtIndexCount += 1;
        } else {
          stuckAtIndexCount = 0;
        }
        lastSlideshowAdvanceIndex = nextIndex;
        lastSlideshowAdvancePhotoId = nextPhotoId;
      } catch (_) {}
    }

    function getSlideshowVisualStalled(now = Date.now()) {
      try {
        if (isSinglePhotoMode() || getApprovedPhotoCount() < 2 || !hasImage) return false;
        const advanceReference = lastSlideshowAdvanceAt || lastPhotoChangeAt;
        if (!advanceReference) return false;
        const ageMs = getMsSinceIsoTimestamp(advanceReference);
        if (!Number.isFinite(ageMs) || ageMs === Infinity) return false;
        return ageMs > SLIDESHOW_STALL_THRESHOLD_MS;
      } catch (_) {
        return false;
      }
    }

    function restartSlideshowLoop(reason = "slideshow_restart") {
      rotationLoopToken += 1;
      const loopToken = rotationLoopToken;
      clearNamedTimer("rotation");
      rotateTimer = null;
      clearInactiveImageSlots(`restart_slideshow_loop:${reason}`);
      slideshowStallRecoveryAtMs = Date.now();
      setRecoveryAction(`restart_slideshow:${reason}`);
      appendRuntimeLog("slideshow_recovery", reason, {
        approvedPhotoCount: getApprovedPhotoCount(),
        currentIndex: normalizeCurrentPhotoIndex(),
        stuckAtIndexCount,
      });
      if (!photos.length) {
        setSlideshowState(SLIDESHOW_STATES.empty, `${reason}:no_photos`);
        return false;
      }
      setSlideshowState(SLIDESHOW_STATES.ready, reason);
      void startRotation({ preserveCurrentVisible: false, loopToken });
      return true;
    }

    function recordImageLifecycleEvent(stage, meta = {}) {
      try {
        const now = Date.now();
        const photoId = meta.photoId != null ? String(meta.photoId) : "";
        const photoName = meta.photoName != null
          ? String(meta.photoName)
          : photoId
            ? findPhotoNameById(photoId)
            : "";
        const startedAtMs = Number.isFinite(meta.startedAtMs) ? meta.startedAtMs : 0;
        const durationMs = Number.isFinite(meta.durationMs)
          ? Math.max(0, Math.round(meta.durationMs))
          : startedAtMs > 0
            ? Math.max(0, now - startedAtMs)
            : 0;

        lastImageLifecycleStage = clampMonitorString(stage || "unknown", 80);
        lastImageLifecyclePhotoId = clampMonitorString(photoId, 120);
        lastImageLifecyclePhotoName = clampMonitorString(photoName, 200);
        lastImageLifecycleMs = durationMs;
        lastImageLifecycleError = clampMonitorString(meta.error || "", 500);

        const entry = {
          at: new Date().toISOString(),
          stage: lastImageLifecycleStage,
          photoId: lastImageLifecyclePhotoId,
          photoName: lastImageLifecyclePhotoName,
          slotIndex: Number.isFinite(meta.slotIndex) ? meta.slotIndex : -1,
          durationMs,
          error: lastImageLifecycleError,
          naturalWidth: Number(meta.naturalWidth) || 0,
          naturalHeight: Number(meta.naturalHeight) || 0,
          transitionToken: Number.isFinite(meta.transitionToken) ? meta.transitionToken : 0,
        };

        imageLifecycleRecentEvents.push(entry);
        if (imageLifecycleRecentEvents.length > IMAGE_LIFECYCLE_EVENTS_MAX) {
          imageLifecycleRecentEvents = imageLifecycleRecentEvents.slice(-IMAGE_LIFECYCLE_EVENTS_MAX);
        }

        galleryDebug("[image-lifecycle]", entry.stage, entry);
        recordGalleryDebugLifecycleIssue(entry.stage, entry);
      } catch (_) {}
    }

    function beginCrossfadeLifecycle(photoId = "") {
      try {
        crossfadeInProgress = true;
        crossfadeStartedAtMs = Date.now();
        currentCrossfadePhotoId = photoId ? String(photoId) : "";
        crossfadeStallDetected = false;
        imageLifecycleDetections.crossfadeNeverCompleted = false;
        recordImageLifecycleEvent("crossfade_start", {
          photoId: currentCrossfadePhotoId,
          startedAtMs: crossfadeStartedAtMs,
        });
      } catch (_) {}
    }

    function completeCrossfadeLifecycle(photoId = "", stage = "crossfade_complete", meta = {}) {
      try {
        const completedAtMs = Date.now();
        crossfadeInProgress = false;
        crossfadeLastCompletedAt = new Date(completedAtMs).toISOString();
        crossfadeStallDetected = false;
        imageLifecycleDetections.crossfadeNeverCompleted = false;
        recordImageLifecycleEvent(stage, {
          photoId: photoId || currentCrossfadePhotoId,
          startedAtMs: crossfadeStartedAtMs,
          durationMs: crossfadeStartedAtMs ? completedAtMs - crossfadeStartedAtMs : 0,
          ...meta,
        });
      } catch (_) {}
    }

    function abortCrossfadeLifecycle(photoId = "", stage = "crossfade_failed", error = "") {
      try {
        crossfadeInProgress = false;
        imageLifecycleDetections.crossfadeNeverCompleted = true;
        recordImageLifecycleEvent(stage, {
          photoId: photoId || currentCrossfadePhotoId,
          startedAtMs: crossfadeStartedAtMs,
          error: error || stage,
        });
      } catch (_) {}
    }

    function commitVisibleSlotLifecycle(photoId = "", slotIndex = -1, transitionToken = 0) {
      recordImageLifecycleEvent("visible_slot_committed", {
        photoId,
        slotIndex,
        transitionToken,
        startedAtMs: crossfadeStartedAtMs,
      });
    }

    function updateImageLifecycleDetections(now = Date.now()) {
      try {
        const wasCrossfadeStall = crossfadeStallDetected;
        crossfadeStallDetected = Boolean(
          crossfadeInProgress &&
          crossfadeStartedAtMs > 0 &&
          (now - crossfadeStartedAtMs) > CROSSFADE_STALL_DETECT_MS
        );
        if (crossfadeStallDetected && !wasCrossfadeStall) {
          imageLifecycleDetections.crossfadeNeverCompleted = true;
          recordImageLifecycleEvent("crossfade_stall_detected", {
            photoId: currentCrossfadePhotoId,
            startedAtMs: crossfadeStartedAtMs,
            error: "crossfade_stall_detected",
          });
        }
      } catch (_) {}
    }

    function evaluateSlideshowStallRecovery(now = Date.now()) {
      try {
        if (isDocumentBackgrounded()) return;

        if (!getApprovedPhotoCount()) {
          if (slideshowState !== SLIDESHOW_STATES.empty && slideshowState !== SLIDESHOW_STATES.booting) {
            setSlideshowState(SLIDESHOW_STATES.empty, "no_approved_photos");
          }
          return;
        }

        if (isSinglePhotoMode()) {
          if (hasImage && slideshowState !== SLIDESHOW_STATES.displaying) {
            setSlideshowState(SLIDESHOW_STATES.displaying, "single_photo_mode");
          }
          stuckAtIndexCount = 0;
          return;
        }

        if (!getSlideshowVisualStalled(now)) {
          if (slideshowState === SLIDESHOW_STATES.degraded || slideshowState === SLIDESHOW_STATES.recovering) {
            setSlideshowState(SLIDESHOW_STATES.displaying, "slideshow_unstalled");
          }
          return;
        }

        const stallReason = getSlideshowStallRecoveryReason();

        if (slideshowState !== SLIDESHOW_STATES.recovering) {
          setSlideshowState(SLIDESHOW_STATES.degraded, stallReason);
          restartSlideshowLoop(stallReason);
        }

        const sinceRecoveryMs = slideshowStallRecoveryAtMs ? (now - slideshowStallRecoveryAtMs) : Infinity;
        if (
          stuckAtIndexCount >= SLIDESHOW_STUCK_INDEX_THRESHOLD &&
          sinceRecoveryMs >= SLIDESHOW_RECOVERING_RETRY_MS
        ) {
          setSlideshowState(SLIDESHOW_STATES.recovering, `${stallReason}_still_stuck`);
          slideshowStallRecoveryAtMs = now;
          attemptSoftGalleryRecovery(stallReason);
        }
      } catch (_) {}
    }

    function getVisibleImageAgeMs() {
      try {
        if (!lastPhotoChangeAt) return 0;
        const ageMs = Date.now() - Date.parse(lastPhotoChangeAt);
        return ageMs > 0 ? ageMs : 0;
      } catch (_) {
        return 0;
      }
    }

    function pruneRecentFetchFailureEvents(now = Date.now()) {
      recentFetchFailureEvents = recentFetchFailureEvents.filter((entry) => (now - entry.atMs) <= FETCH_FAILURE_BURST_WINDOW_MS);
    }

    function getRecentFetchFailureCount(now = Date.now()) {
      pruneRecentFetchFailureEvents(now);
      return recentFetchFailureEvents.length;
    }

    function isFetchFailureBackoffActive(now = Date.now()) {
      return fetchFailureBackoffUntilMs > now;
    }

    function getApprovedPollDelayMs() {
      return isFetchFailureBackoffActive() ? BURST_BACKOFF_REFRESH_MS : REFRESH_MS;
    }

    function getHeartbeatDelayMs() {
      return isFetchFailureBackoffActive() ? BURST_BACKOFF_HEARTBEAT_MS : GALLERY_HEARTBEAT_MS;
    }

    function getOverlayPollDelayMs() {
      return isFetchFailureBackoffActive() ? BURST_BACKOFF_OVERLAY_REFRESH_MS : OVERLAY_REFRESH_MS;
    }

    function getRuntimeSettingsPollDelayMs() {
      return RUNTIME_SETTINGS_REFRESH_MS;
    }

    function maybeClearBackoffAfterStableWindow(now = Date.now()) {
      const wasActive = isFetchFailureBackoffActive(now);
      if (fetchFailureBackoffUntilMs && fetchFailureBackoffUntilMs <= now && getRecentFetchFailureCount(now) < FETCH_FAILURE_BURST_THRESHOLD) {
        fetchFailureBackoffUntilMs = 0;
        if (wasActive) {
          setRecoveryAction("fetch_failure_backoff_cleared_after_stable_success");
          rescheduleManagedPollingLoops("stable_success");
        }
      }
    }

    function scheduleApprovedPoll(delayMs = getApprovedPollDelayMs()) {
      clearNamedTimer("approved_poll");
      refreshTimer = registerTimer("approved_poll", setTimeout(async () => {
        clearNamedTimer("approved_poll");
        refreshTimer = null;
        try {
          await fetchApproved();
        } catch (err) {
          galleryDebug("approved scheduler recovered from unexpected error", {
            error: err && err.message ? err.message : String(err),
          });
        } finally {
          scheduleApprovedPoll(getApprovedPollDelayMs());
        }
      }, Math.max(0, Math.round(delayMs))));
    }

    function scheduleOverlayPoll(delayMs = getOverlayPollDelayMs()) {
      if (!isFlattenedOverlayRuntimeEnabled()) {
        clearNamedTimer("overlay_poll");
        overlayRefreshTimer = null;
        return;
      }
      clearNamedTimer("overlay_poll");
      overlayRefreshTimer = registerTimer("overlay_poll", setTimeout(async () => {
        clearNamedTimer("overlay_poll");
        overlayRefreshTimer = null;
        try {
          await fetchActiveOverlay();
        } catch (err) {
          galleryDebug("overlay scheduler recovered from unexpected error", {
            error: err && err.message ? err.message : String(err),
          });
        } finally {
          scheduleOverlayPoll(getOverlayPollDelayMs());
        }
      }, Math.max(0, Math.round(delayMs))));
    }

    function scheduleTelemetryHeartbeat(delayMs = getHeartbeatDelayMs()) {
      clearNamedTimer("telemetry_heartbeat");
      telemetryHeartbeatTimer = registerTimer("telemetry_heartbeat", setTimeout(async () => {
        clearNamedTimer("telemetry_heartbeat");
        telemetryHeartbeatTimer = null;
        try {
          await sendTelemetryHeartbeat();
        } catch (err) {
          galleryDebug("heartbeat scheduler recovered from unexpected error", {
            error: err && err.message ? err.message : String(err),
          });
        } finally {
          scheduleTelemetryHeartbeat(getHeartbeatDelayMs());
        }
      }, Math.max(0, Math.round(delayMs))));
    }

    function scheduleRuntimeSettingsRefresh(delayMs = getRuntimeSettingsPollDelayMs()) {
      clearNamedTimer("runtime_settings");
      runtimeSettingsRefreshTimer = registerTimer("runtime_settings", setTimeout(async () => {
        clearNamedTimer("runtime_settings");
        runtimeSettingsRefreshTimer = null;
        try {
          await fetchGalleryRuntimeSettings();
        } catch (err) {
          galleryDebug("runtime settings scheduler recovered from unexpected error", {
            error: err && err.message ? err.message : String(err),
          });
        } finally {
          scheduleRuntimeSettingsRefresh(getRuntimeSettingsPollDelayMs());
        }
      }, Math.max(0, Math.round(delayMs))));
    }

    function stopOverlayRefreshLoop() {
      clearNamedTimer("overlay_poll");
      overlayRefreshTimer = null;
    }

    function stopTemplateRefreshLoop() {
      clearNamedInterval("template_poll");
      templateRefreshTimer = null;
    }

    function stopRuntimeWatchdogLoop() {
      clearNamedInterval("runtime_watchdog");
      runtimeWatchdogTimer = null;
    }

    function rescheduleManagedPollingLoops(reason = "") {
      try {
        galleryDebug("rescheduling managed polling loops", {
          reason,
          approvedDelayMs: getApprovedPollDelayMs(),
          overlayDelayMs: getOverlayPollDelayMs(),
          heartbeatDelayMs: getHeartbeatDelayMs(),
          backoffUntil: fetchFailureBackoffUntilMs ? new Date(fetchFailureBackoffUntilMs).toISOString() : "",
        });
        scheduleApprovedPoll(getApprovedPollDelayMs());
        if (isFlattenedOverlayRuntimeEnabled()) {
          scheduleOverlayPoll(getOverlayPollDelayMs());
        } else {
          stopOverlayRefreshLoop();
        }
        scheduleTelemetryHeartbeat(getHeartbeatDelayMs());
        scheduleRuntimeSettingsRefresh(getRuntimeSettingsPollDelayMs());
      } catch (_) {}
    }

    function maybeTriggerHardReloadAfterRepeatedRecovery(reason) {
      if (hardReloadScheduled || softRecoveryAttemptCount < HARD_RELOAD_AFTER_SOFT_RECOVERY_ATTEMPTS) return false;
      hardReloadScheduled = true;
      setRecoveryAction(`hard_reload_after_repeated_soft_recovery:${reason}:attempt_${softRecoveryAttemptCount}`);
      void sendDeviceLog("error", "hard_gallery_reload", `Hard reload scheduled after repeated soft recovery (${reason})`, {
        reason,
        softRecoveryAttemptCount,
        visibleImageAgeMs: getVisibleImageAgeMs(),
      });
      void sendTelemetryHeartbeat();
      setTimeout(() => {
        try {
          window.location.reload();
        } catch (_) {}
      }, HARD_RELOAD_DELAY_MS);
      return true;
    }

    function attemptSoftGalleryRecovery(reason) {
      try {
        if (!hasImage || !lastPhotoChangeAt || hardReloadScheduled) return false;
        const now = Date.now();
        const visibleAgeMs = getVisibleImageAgeMs();
        const recentFailureCount = getRecentFetchFailureCount(now);
        if (visibleAgeMs < SOFT_RECOVERY_VISIBLE_AGE_MS) return false;
        if (recentFailureCount < FETCH_FAILURE_BURST_THRESHOLD) return false;
        if ((now - lastSoftRecoveryAttemptAtMs) < SOFT_RECOVERY_COOLDOWN_MS) return false;

        lastSoftRecoveryAttemptAtMs = now;
        softRecoveryAttemptCount += 1;
        setRecoveryAction(`soft_gallery_recovery:${reason}:attempt_${softRecoveryAttemptCount}`);
        galleryDebug("soft gallery recovery triggered", {
          reason,
          softRecoveryAttemptCount,
          visibleAgeMs,
          recentFailureCount,
        });
        void sendDeviceLog("warn", "soft_gallery_recovery", `Soft gallery recovery triggered (${reason})`, {
          reason,
          softRecoveryAttemptCount,
          visibleImageAgeMs: visibleAgeMs,
          recentFailureCount,
          currentPhotoId: currentPhotoId || "",
          currentPhotoName: currentPhotoName || "",
        });

        if (photos.length) {
          restartSlideshowLoop(`soft_recovery:${reason}`);
        }
        rescheduleManagedPollingLoops(`soft_recovery:${reason}`);
        if (!approvedFetchInFlight) void fetchApproved();
        if (isFlattenedOverlayRuntimeEnabled() && !overlayFetchInFlight) void fetchActiveOverlay();

        if (!hasImage) {
          return false;
        }

        return maybeTriggerHardReloadAfterRepeatedRecovery(reason) || true;
      } catch (_) {
        return false;
      }
    }

    function activateFetchFailureBackoff(reason = "fetch_failure_burst") {
      try {
        const now = Date.now();
        const previousUntil = fetchFailureBackoffUntilMs;
        fetchFailureBackoffUntilMs = Math.max(fetchFailureBackoffUntilMs, now + FETCH_FAILURE_BACKOFF_DURATION_MS);
        if (fetchFailureBackoffUntilMs !== previousUntil) {
          setRecoveryAction(`fetch_failure_backoff_active:${reason}`);
          void sendDeviceLog("warn", "fetch_failure_backoff", `Fetch failure backoff active (${reason})`, {
            reason,
            backoffUntil: new Date(fetchFailureBackoffUntilMs).toISOString(),
            approvedDelayMs: getApprovedPollDelayMs(),
            overlayDelayMs: getOverlayPollDelayMs(),
            heartbeatDelayMs: getHeartbeatDelayMs(),
            recentFailureCount: getRecentFetchFailureCount(now),
          });
          rescheduleManagedPollingLoops(`backoff:${reason}`);
        }
      } catch (_) {}
    }

    function recordFetchFailureEvent(category, reason = "") {
      try {
        const now = Date.now();
        recentFetchFailureEvents.push({
          atMs: now,
          category: clampMonitorString(category || "unknown", 20) || "unknown",
          reason: clampMonitorString(reason || "", 120),
        });
        pruneRecentFetchFailureEvents(now);
        if (recentFetchFailureEvents.length >= FETCH_FAILURE_BURST_THRESHOLD) {
          activateFetchFailureBackoff(reason || category || "fetch_failure_burst");
        }
      } catch (_) {}
    }

    function clearSlotObjectUrl(slotIndex, options = {}) {
      const { clearSrc = false, clearPhotoId = true } = options;
      const img = imgSlots[slotIndex];
      revokeTrackedObjectUrl(slotObjectUrls[slotIndex]);
      slotObjectUrls[slotIndex] = null;
      if (clearPhotoId) {
        slotPhotoIds[slotIndex] = null;
      }
      if (img) {
        img.onload = null;
        img.onerror = null;
        if (clearSrc) {
          try {
            img.removeAttribute("src");
          } catch (_) {}
          try {
            img.src = "";
          } catch (_) {}
        }
      }
      auditObjectUrlPressure("clear_slot_object_url");
    }

    function clearInactiveImageSlots(reason = "inactive_slot_cleanup") {
      try {
        imgSlots.forEach((img, index) => {
          if (!img) return;
          if (hasImage && index === activeIndex) return;
          if (Number.isFinite(loadingSlotIndex) && index === loadingSlotIndex) return;
          clearSlotObjectUrl(index, { clearSrc: true, clearPhotoId: true });
        });
        appendRuntimeLog("cleanup", reason, {
          activeIndex,
          hasImage,
          objectUrlCount: getObjectUrlCount(),
        });
      } catch (_) {}
    }

    function recordPollFailure(errorMessage, meta = {}) {
      try {
        const normalizedMessage = clampMonitorString(formatMonitorValue(errorMessage), 500) || "approved_fetch_failed";
        consecutivePollFailures += 1;
        totalPollFailures += 1;
        lastApprovedFetchStatus = "fail";
        lastApprovedFetchError = normalizedMessage;
        recordFetchFailureEvent("poll", normalizedMessage);
        recordRecentError("poll", normalizedMessage, {
          type: meta.type || "approved_fetch_failure",
          route: meta.route || "/gallery/approved",
          currentPhotoId: meta.currentPhotoId,
          currentPhotoName: meta.currentPhotoName,
        });
        recordGalleryDebugEvent({
          severity: "error",

    async function postMonitorJson(url, payload, timeoutMs = 4000, pendingMeta = null) {
      const route = sanitizeMonitorRoute(url);
      const pendingName = pendingMeta && pendingMeta.name ? String(pendingMeta.name) : "";
      const effectiveTimeoutMs = pendingMeta && Number.isFinite(pendingMeta.timeoutMs)
        ? Math.max(1000, Math.round(pendingMeta.timeoutMs))
        : timeoutMs;
      let registeredPendingName = "";
      let didTimeout = false;
      if (typeof AbortController === "function") {
        const controller = new AbortController();
        if (pendingName) {
          registerPendingFetch({
            ...pendingMeta,
            name: pendingName,
            route: pendingMeta.route || route,
            startAt: Date.now(),
            timeoutMs: effectiveTimeoutMs,
            controller,
          });
          registeredPendingName = pendingName;
        }
        const timer = setTimeout(() => {
          didTimeout = true;
          controller.abort();
        }, effectiveTimeoutMs);
        try {
          return await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true,
            signal: controller.signal,
          });
        } catch (err) {
          captureGallerySentryFetchFailure(route, err, pendingMeta || { category: "post_monitor" });
          if (didTimeout) {
            throw createMonitorError("request_timeout", { route, code: "request_timeout", cause: err });
          }
          if (err && err.name === "AbortError") {
            throw createMonitorError("request_aborted", { route, code: "request_aborted", cause: err });
          }
          throw err;
        } finally {
          clearTimeout(timer);
          if (registeredPendingName) unregisterPendingFetch(registeredPendingName);
        }
      }

      if (pendingName) {
        registerPendingFetch({
          ...pendingMeta,
          name: pendingName,
          route: pendingMeta.route || route,
          startAt: Date.now(),
          timeoutMs: effectiveTimeoutMs,
          controller: null,
        });
        registeredPendingName = pendingName;
      }
      try {
        return await Promise.race([
          fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true,
          }),
          new Promise((_, reject) => setTimeout(() => reject(createMonitorError("request_timeout", { route, code: "request_timeout" })), effectiveTimeoutMs)),
        ]);
      } catch (err) {
        captureGallerySentryFetchFailure(route, err, pendingMeta || { category: "post_monitor" });
        throw err;
      } finally {
        if (registeredPendingName) unregisterPendingFetch(registeredPendingName);
      }
    }

    async function sendTelemetryHeartbeat() {
      clearStaleInFlightLocks(Date.now());
      if (telemetryHeartbeatInFlight) return;
      telemetryHeartbeatInFlight = true;
      telemetryHeartbeatStartedAtMs = Date.now();
      try {
        const response = await postMonitorJson(
          `${BASE_URL}/api/device-heartbeat`,
          buildTelemetryPayload(),
          4000,
          {
            name: "telemetry_heartbeat",
            category: "telemetry_heartbeat",
            route: "/api/device-heartbeat",
            timeoutMs: 4000,
          }
        );
        if (!response || !response.ok) {
          throw new Error(`heartbeat_http_${response ? response.status : "unknown"}`);
        }
        recordSuccessfulHeartbeat();
      } catch (err) {
        recordHeartbeatFailure(err && err.message ? err.message : String(err));
        // Monitoring must stay silent.
      } finally {
        telemetryHeartbeatInFlight = false;
        telemetryHeartbeatStartedAtMs = 0;
      }
    }

    function abortPendingFetchesByCategory(category = "", reason = "runtime_toggle_disabled") {
      try {
        const normalizedCategory = clampMonitorString(category || "", 40);
        if (!normalizedCategory) return 0;
        let abortedCount = 0;
        getPendingFetchEntries().forEach((entry) => {
          const entryCategory = inferPendingFetchCategory(entry);
          if (entryCategory !== normalizedCategory) return;
          abortPendingFetchController(entry);
          clearInFlightLockForPendingFetch(entry);
          unregisterPendingFetch(entry.name);
          abortedCount += 1;
          appendRuntimeLog("cleanup", `pending_fetch_aborted:${reason}`, {
            category: normalizedCategory,
            name: entry.name,
          });
        });
        return abortedCount;
      } catch (_) {
        return 0;
      }

    function buildGalleryReloadUrl(commandId = "", clearCache = false) {
      try {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("reload", commandId || `${Date.now()}`);
        if (clearCache) {
          nextUrl.searchParams.set("cacheReset", commandId || `${Date.now()}`);
        } else {
          nextUrl.searchParams.delete("cacheReset");
        }
        return nextUrl.toString();
      } catch (_) {
        const separator = window.location.href.includes("?") ? "&" : "?";
        return `${window.location.href}${separator}reload=${encodeURIComponent(commandId || String(Date.now()))}`;
      }
    }

    function prepareGalleryRuntimeReload(reason = "admin_reload") {
      try {
        clearAllPendingFetchesForReload(reason);
        clearAllRegisteredTimersAndIntervals();
        clearOverlayLayer(reason);
        disableDynamicTemplateLayer();
        releaseTrackedObjectUrls(reason);
        imgSlots.forEach((img) => {
          if (!img) return;
          img.classList.remove("visible");
          try {
            img.removeAttribute("src");
          } catch (_) {}
          try {
            img.src = "";
          } catch (_) {}
        });
        hasImage = false;
        crossfadeInProgress = false;
        loadingSlotIndex = -1;
      } catch (_) {}
    }

    async function executeGalleryRuntimeCommand(rawCommand = null) {
      const command = normalizeGalleryRuntimeCommand(rawCommand);
      if (!command || !command.commandId || !command.command) return false;
      if (command.commandId === lastHandledRuntimeCommandId) {
        return false;
      }
      if (command.command !== "reload_gallery" && command.command !== "clear_cache_reload_gallery") {
        return false;
      }

      persistLastHandledRuntimeCommandId(command.commandId);
      galleryRuntimeCommand = command;
      recordGalleryDebugEvent({
        severity: "warn",
        category: "runtime",
        code: "ADMIN_RELOAD_RECEIVED",
        subsystem: "runtime_command",
        route: "/gallery/runtime-settings",
        diagnosis: "ADMIN RELOAD RECEIVED",
        message: `${command.command}${command.clearCache ? " (clear cache)" : ""}`,
        action: "Gallery runtime will reload now.",
      });
      appendRuntimeLog("runtime_command", command.command, {
        commandId: command.commandId,
        issuedAt: command.issuedAt,
        clearCache: Boolean(command.clearCache),
        reason: command.reason || "",
      });
      setRecoveryAction(`admin_reload_command:${command.commandId}`);
      void sendDeviceLog("warn", "admin_reload_received", `Admin reload command received (${command.commandId})`, {
        command: command.command,
        commandId: command.commandId,
        issuedAt: command.issuedAt,
        clearCache: Boolean(command.clearCache),
        reason: command.reason || "admin_reload_button",
      });

      try {
        await Promise.race([
          Promise.allSettled([
            sendTelemetryHeartbeat(),
            sendDeviceLog("warn", "admin_reload_execute", `Reloading gallery runtime (${command.commandId})`, {
              command: command.command,
              commandId: command.commandId,
              clearCache: Boolean(command.clearCache),
            }),
          ]),
          new Promise((resolve) => setTimeout(resolve, 500)),
        ]);
      } catch (_) {}

      if (command.clearCache) {
        clearGalleryRuntimeStorage(command);
      }
      prepareGalleryRuntimeReload(command.command);
      setTimeout(() => {
        try {
          window.location.replace(buildGalleryReloadUrl(command.commandId, Boolean(command.clearCache)));
        } catch (_) {
          window.location.reload();
        }
      }, 80);
      return true;
    }

    function installTelemetryErrorCapture() {
      try {
        if (telemetryErrorCaptureInstalled) return;
        telemetryErrorCaptureInstalled = true;
        const previousOnError = window.onerror;
        window.onerror = function onGalleryError(message, source, lineno, colno, error) {
          try {
            const formattedMessage = error && error.message
              ? `${error.message}${source ? ` @ ${source}:${lineno || 0}:${colno || 0}` : ""}`
              : `${message || "window_error"}${source ? ` @ ${source}:${lineno || 0}:${colno || 0}` : ""}`;
            recordRecentError("unknown", formattedMessage, {
              type: "window.onerror",
              route: sanitizeMonitorRoute(source || ""),
              includeCurrentPhoto: false,
            });
            void sendDeviceLog("error", "window_error", formattedMessage, {
              source: source || "",
              line: lineno || 0,
              column: colno || 0,
            });
            recordGalleryDebugEvent({
              severity: "error",
              category: "unknown",
              code: "UNKNOWN_RUNTIME",
              subsystem: "window.onerror",
              route: sanitizeMonitorRoute(source || ""),
              message: formattedMessage,
            });
            captureGallerySentryException(error || new Error(formattedMessage), {

              route: sanitizeMonitorRoute(source || ""),

            });
          } catch (_) {}
          if (typeof previousOnError === "function") {
            return previousOnError.apply(this, arguments);

          return false;

        eventListenerInstallCount += 1;

        window.onunhandledrejection = function onGalleryUnhandledRejection(event) {
          try {
            const reason = event && "reason" in event ? event.reason : event;

              type: "unhandledrejection",

          }
          return false;
        };
        eventListenerInstallCount += 1;

        if (console && typeof console.error === "function" && !console.__galleryHealthWrapped) {

          const wrappedConsoleError = function wrappedGalleryConsoleError(...args) {

              const isKnownFetchPathError = /Failed to fetch approved photos|Error fetching approved list|API returned not ok|Error loading first photo|Error loading photo|Failed to fetch active overlay|Error fetching active overlay|Active overlay API returned not ok|Failed to fetch active template|Error fetching active template|Active template API returned not ok/i.test(formattedMessage);

    function buildPhotoUrl(fileId) {
