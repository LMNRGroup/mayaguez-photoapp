<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Selfie Wall – Plaza Colón</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Arial, sans-serif;
      color: #f9fafb;
      background: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fullscreen black canvas */
    .wall {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      overflow: hidden;
    }

    /* 16:9 stage, scales but keeps AR, max 1920x1080 */
    .stage {
      position: relative;
      width: 100vw;
      max-width: 1920px;
      aspect-ratio: 16 / 9;
      max-height: 1080px;
      background: #000000;
      overflow: hidden;
    }

    /* Photo window = 1500x1000 centered within 1920x1080 stage */
    .photo-window {
      position: absolute;
      /* Center 1500x1000 in 1920x1080: (1920-1500)/2 = 210px left, (1080-1000)/2 = 40px top */
      top: 3.7037%;  /* 40/1080 */
      left: 10.9375%; /* 210/1920 */
      width: 78.125%;  /* 1500/1920 */
      height: 92.5926%; /* 1000/1080 */
      overflow: hidden;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .template-background-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
      display: none;
    }

    /* Photos inside window - display at native 1500x1000 size, centered */
    .photo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .photo.visible {
      opacity: 1;
    }

    .template-logos-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .template-logo-layer {
      position: absolute;
      overflow: hidden;
    }

    .template-logo-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Gallery status text */
    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d1d5db;
      z-index: 12;
      background: rgba(0, 0, 0, 0.72);
    }

    .empty.hidden {
      display: none;
    }

/* Ticket badge INSIDE the photo window (top-left, not on the frame) */
.ticket-badge {
  position: absolute;
  top: 20px;        /* inside the photo area */
  left: 27px;
  right: auto;      /* make sure nothing pins it to the right */
  z-index: 20;      /* above photo but clipped by .photo-window */
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.85);
  color: #f9fafb;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: none;    /* JS will set to block when we have a photo */
}

  </style>
</head>
<body>
  <div class="wall">
    <div class="stage">

      <img id="templateBackground" class="template-background-layer" alt="Template Background" />

      <!-- PHOTO WINDOW -->
<div class="photo-window">
  <img id="photoA" class="photo" alt="Selfie aprobado A" />
  <img id="photoB" class="photo" alt="Selfie aprobado B" />

  <!-- Ticket number overlay INSIDE the photo window -->
  <div id="ticketBadge" class="ticket-badge">#000</div>
</div>

<!-- Gallery status -->
<div id="galleryEmpty" class="empty">
  Loading...
</div>

      <div id="templateLogos" class="template-logos-layer"></div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://mayaguez-photoapp.vercel.app";

    const DISPLAY_MS = 8000;
    const REFRESH_MS = 10000;
    const REQUEST_TIMEOUT_MS = 8000;
    const IMAGE_LOAD_TIMEOUT_MS = 10000;
    const imgA = document.getElementById("photoA");
    const imgB = document.getElementById("photoB");
    const emptyEl = document.getElementById("galleryEmpty");
    const ticketBadgeEl = document.getElementById("ticketBadge");
    const templateBackgroundEl = document.getElementById("templateBackground");
    const templateLogosEl = document.getElementById("templateLogos");

    const imgSlots = [imgA, imgB];
    const slotObjectUrls = [null, null];
    let activeIndex = 0;
    let hasImage = false;

    let photos = [];
    let currentIndex = 0;
    let rotateTimer = null;
    let refreshTimer = null;
    let activeTemplateKey = "";
    const sortOrder = "oldest";
    let activeTemplateRequestId = 0;
    let currentPhotoId = "";
    let photoTransitionToken = 0;

    function buildPhotoUrl(fileId) {
      return `${BASE_URL}/gallery/photo/${encodeURIComponent(fileId)}`;
    }

    function normalizeAssetUrl(url) {
      if (!url) return "";
      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      if (url.startsWith("/")) return `${BASE_URL}${url}`;
      return url;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
      if (typeof AbortController === "function") {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          clearTimeout(timer);
        }
      }

      return await Promise.race([
        fetch(url, options),
        new Promise((_, reject) => setTimeout(() => reject(new Error("request_timeout")), timeoutMs)),
      ]);
    }

    function setGalleryStatus(message = "") {
      if (!emptyEl) return;
      emptyEl.textContent = message;
      emptyEl.classList.toggle("hidden", !message);
    }

    function clearTemplateLayers() {
      if (templateBackgroundEl) {
        templateBackgroundEl.removeAttribute("src");
        templateBackgroundEl.style.display = "none";
      }
      if (templateLogosEl) {
        templateLogosEl.innerHTML = "";
      }
      activeTemplateKey = "emergency-fallback";
    }

    function buildTemplateKey(template) {
      if (!template) return "";
      return JSON.stringify({
        id: template.id || "",
        background: template.background ? template.background.url || template.background.value || "" : "",
        logos: Array.isArray(template.logos)
          ? template.logos.map((logo) => [
              logo.url || logo.value || "",
              logo.x || 0,
              logo.y || 0,
              logo.width || 0,
              logo.height || 0,
            ])
          : [],
      });
    }

    function renderTemplate(template) {
      if (!template) {
        clearTemplateLayers();
        return;
      }

      const templateKey = buildTemplateKey(template);
      if (templateKey === activeTemplateKey) {
        return;
      }

      activeTemplateKey = templateKey;

      if (templateBackgroundEl) {
        if (template.background && template.background.url) {
          templateBackgroundEl.src = normalizeAssetUrl(template.background.url);
          templateBackgroundEl.style.display = "block";
        } else {
          templateBackgroundEl.removeAttribute("src");
          templateBackgroundEl.style.display = "none";
        }
      }

      if (templateLogosEl) {
        templateLogosEl.innerHTML = "";
        const baseWidth = Number(template.canvasWidth) || 1920;
        const baseHeight = Number(template.canvasHeight) || 1080;

        (template.logos || []).forEach((logo) => {
          const logoEl = document.createElement("div");
          logoEl.className = "template-logo-layer";
          logoEl.style.left = `${((Number(logo.x) || 0) / baseWidth) * 100}%`;
          logoEl.style.top = `${((Number(logo.y) || 0) / baseHeight) * 100}%`;
          logoEl.style.width = `${((Number(logo.width) || 0) / baseWidth) * 100}%`;
          logoEl.style.height = `${((Number(logo.height) || 0) / baseHeight) * 100}%`;

          const img = document.createElement("img");
          img.src = normalizeAssetUrl(logo.url || logo.value || "");
          img.alt = "";
          logoEl.appendChild(img);
          templateLogosEl.appendChild(logoEl);
        });
      }
    }

    async function fetchActiveTemplate() {
      const requestId = ++activeTemplateRequestId;
      try {
        const res = await fetchWithTimeout(`${BASE_URL}/gallery/active-template?ts=${Date.now()}`, {
          cache: "no-store",
        });
        if (!res.ok) {
          console.error("Error fetching active template", res.status);
          clearTemplateLayers();
          return;
        }

        const data = await res.json();
        if (requestId !== activeTemplateRequestId) {
          return;
        }
        if (!data.ok) {
          console.error("Active template API returned not ok", data);
          clearTemplateLayers();
          return;
        }

        renderTemplate(data.template || null);
      } catch (err) {
        console.error("Failed to fetch active template", err);
        clearTemplateLayers();
      }
    }

    // --- Ticket helpers (from filename) ---

    function getTicketFromName(name) {
      if (!name || typeof name !== "string") return null;

      // New pattern: T001-...
      let match = name.match(/^T(\d{1,})-/i);
      if (match) return parseInt(match[1], 10);

      // Legacy pattern: 01_...
      match = name.match(/^(\d{1,})_/);
      if (match) return parseInt(match[1], 10);

      return null;
    }

    function formatTicketLabel(num) {
      if (num == null || !Number.isFinite(Number(num))) return null;
      const n = Number(num);
      return "#" + String(n).padStart(3, "0");
    }

    function updateTicketBadge(fileName) {
      if (!ticketBadgeEl) return;

      const ticketNum = getTicketFromName(fileName);
      const label = formatTicketLabel(ticketNum);

      if (!label) {
        ticketBadgeEl.style.display = "none";
        ticketBadgeEl.textContent = "";
        return;
      }

      ticketBadgeEl.textContent = label;
      ticketBadgeEl.style.display = "block";
    }

    function hideTicketBadge() {
      if (!ticketBadgeEl) return;
      ticketBadgeEl.style.display = "none";
      ticketBadgeEl.textContent = "";
    }

    function setEmptyState() {
      imgSlots.forEach((img, index) => {
        img.classList.remove("visible");
        img.onload = null;
        img.onerror = null;
        img.removeAttribute("src");
        if (slotObjectUrls[index]) {
          URL.revokeObjectURL(slotObjectUrls[index]);
          slotObjectUrls[index] = null;
        }
      });
      setGalleryStatus("Esperando las primeras fotos aprobadas…");
      hideTicketBadge();
      hasImage = false;
      currentPhotoId = "";
    }

    async function loadImageIntoSlot(slotIndex, url, timeoutMs = IMAGE_LOAD_TIMEOUT_MS) {
      const img = imgSlots[slotIndex];
      if (!img) {
        throw new Error("missing_image_slot");
      }

      const response = await fetchWithTimeout(url, { cache: "no-store" }, timeoutMs);
      if (!response.ok) {
        throw new Error(`image_http_${response.status}`);
      }

      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);

      return await new Promise((resolve, reject) => {
        let settled = false;
        let readinessProbe = 0;
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("image_load_timeout"));
        }, timeoutMs);

        let cleanup = () => {
          clearTimeout(timer);
          if (readinessProbe) clearInterval(readinessProbe);
          img.onload = null;
          img.onerror = null;
        };

        function commit() {
          if (settled) return;
          settled = true;
          cleanup();
          if (slotObjectUrls[slotIndex]) {
            URL.revokeObjectURL(slotObjectUrls[slotIndex]);
          }
          slotObjectUrls[slotIndex] = objectUrl;
          resolve(objectUrl);
        }

        img.onload = commit;
        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup();
          URL.revokeObjectURL(objectUrl);
          reject(new Error("image_load_failed"));
        };
        img.src = objectUrl;

        if (img.complete && img.naturalWidth > 0) {
          commit();
          return;
        }

        readinessProbe = setInterval(() => {
          if (img.complete && img.naturalWidth > 0) {
            commit();
          }
        }, 250);
      });
    }

    async function crossfadeTo(url, photoId = "") {
      const normalizedTargetUrl = url ? new URL(url, window.location.href).href : "";
      const transitionToken = ++photoTransitionToken;

      if (!hasImage) {
        const img = imgSlots[activeIndex];
        try {
          img.classList.remove("visible");
          await loadImageIntoSlot(activeIndex, url);
          if (transitionToken !== photoTransitionToken) return;

          requestAnimationFrame(() => {
            if (transitionToken !== photoTransitionToken) return;
            setGalleryStatus("");
            img.classList.add("visible");
            hasImage = true;
            currentPhotoId = photoId ? String(photoId) : "";
          });
        } catch (err) {
          console.error("Error loading first photo", err);
          setGalleryStatus("Loading...");
        }
        return;
      }

      const currentImg = imgSlots[activeIndex];
      const currentVisibleUrl = currentImg.currentSrc || currentImg.src || "";
      if (normalizedTargetUrl && currentVisibleUrl === normalizedTargetUrl) {
        setGalleryStatus("");
        currentPhotoId = photoId ? String(photoId) : currentPhotoId;
        hasImage = true;
        return;
      }

      const nextIndex = 1 - activeIndex;
      const nextImg = imgSlots[nextIndex];

      try {
        nextImg.classList.remove("visible");
        await loadImageIntoSlot(nextIndex, url);
        if (transitionToken !== photoTransitionToken) return;

        requestAnimationFrame(() => {
          if (transitionToken !== photoTransitionToken) return;
          void nextImg.offsetWidth;
          nextImg.classList.add("visible");
          currentImg.classList.remove("visible");
          activeIndex = nextIndex;
          setGalleryStatus("");
          hasImage = true;
          currentPhotoId = photoId ? String(photoId) : "";
        });
      } catch (err) {
        console.error("Error loading photo", err);
        nextImg.removeAttribute("src");
      }
    }

    function showCurrentPhoto() {
      if (!photos.length) {
        setEmptyState();
        return;
      }

      const file = photos[currentIndex];
      const url = buildPhotoUrl(file.id);

      updateTicketBadge(file.name);
      crossfadeTo(url, file.id);
    }

    function startRotation() {
      if (rotateTimer) clearInterval(rotateTimer);
      if (!photos.length) {
        setEmptyState();
        return;
      }

      showCurrentPhoto();

      rotateTimer = setInterval(() => {
        if (!photos.length) {
          setEmptyState();
          return;
        }
        currentIndex = (currentIndex + 1) % photos.length;
        showCurrentPhoto();
      }, DISPLAY_MS);
    }

    async function fetchApproved() {
      try {
        fetchActiveTemplate().catch((err) => {
          console.error("Background template refresh failed", err);
        });

        const res = await fetchWithTimeout(`${BASE_URL}/gallery/approved`);
        if (!res.ok) {
          console.error("Error fetching approved list", res.status);
          return;
        }
        const data = await res.json();
        if (!data.ok) {
          console.error("API returned not ok", data);
          return;
        }

        const newPhotos = Array.isArray(data.files) ? [...data.files] : [];
        sortPhotosList(newPhotos);
        const oldIds = photos.map((p) => p.id).join(",");
        const newIds = newPhotos.map((p) => p.id).join(",");

        photos = newPhotos;

        if (!photos.length) {
          currentIndex = 0;
          setEmptyState();
          return;
        }

        if (oldIds !== newIds || !hasImage) {
          const currentPhotoIndex = currentPhotoId
            ? photos.findIndex((photo) => String(photo.id) === String(currentPhotoId))
            : -1;
          if (currentPhotoIndex >= 0) {
            currentIndex = currentPhotoIndex;
          } else if (currentIndex >= photos.length) {
            currentIndex = photos.length - 1;
          }
          startRotation();
        }
      } catch (err) {
        console.error("Failed to fetch approved photos", err);
      }
    }

    function startRefreshLoop() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(fetchApproved, REFRESH_MS);
    }

    function sortPhotosList(list) {
      if (!Array.isArray(list) || !list.length) return list;

      if (sortOrder === 'newest') {
        list.sort((a, b) => {
          const timeA = new Date(a.createdTime || 0).getTime();
          const timeB = new Date(b.createdTime || 0).getTime();
          return timeB - timeA;
        });
      } else {
        list.sort((a, b) => {
          const timeA = new Date(a.createdTime || 0).getTime();
          const timeB = new Date(b.createdTime || 0).getTime();
          return timeA - timeB;
        });
      }

      return list;
    }

    clearTemplateLayers();
    setGalleryStatus("Loading...");
    startRefreshLoop();
    fetchApproved();
  </script>
</body>
</html>
