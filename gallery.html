<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Selfie Wall – Plaza Colón</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.25rem;
      --radius-pill: 999px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Arial, sans-serif;
      color: #f9fafb;
      background: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000000;
      overflow: hidden;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fullscreen black canvas */
    .wall {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      overflow: hidden;
    }

    /* 16:9 stage, scales but keeps AR, max 1920x1080 */
    .stage {
      position: relative;
      width: 100vw;
      max-width: 1920px;
      aspect-ratio: 16 / 9;
      max-height: 1080px;
      background: #000000;
      overflow: hidden;
    }

    /* Photo window = 1500x1000 centered within 1920x1080 stage */
    .photo-window {
      position: absolute;
      /* Center 1500x1000 in 1920x1080: (1920-1500)/2 = 210px left, (1080-1000)/2 = 40px top */
      top: 3.7037%;  /* 40/1080 */
      left: 10.9375%; /* 210/1920 */
      width: 78.125%;  /* 1500/1920 */
      height: 92.5926%; /* 1000/1080 */
      overflow: hidden;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .template-background-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
      display: none;
    }

    /* Photos inside window - display at native 1500x1000 size, centered */
    .photo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .photo.visible {
      opacity: 1;
    }

    .template-logos-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .template-overlay-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 11;
      pointer-events: none;
      display: none;
    }

    .template-logo-layer {
      position: absolute;
      overflow: hidden;
    }

    .template-logo-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Gallery status text */
    .empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-lg);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d1d5db;
      z-index: 12;
      pointer-events: none;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    .empty.hidden {
      display: none;
    }

/* Ticket badge INSIDE the photo window (top-left, not on the frame) */
.ticket-badge {
  position: absolute;
  top: 20px;        /* inside the photo area */
  left: 27px;
  right: auto;      /* make sure nothing pins it to the right */
  z-index: 20;      /* above photo but clipped by .photo-window */
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  background: rgba(0, 0, 0, 0.85);
  color: #f9fafb;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: none;    /* JS will set to block when we have a photo */
}

    @media (max-width: 768px) {
      .empty {
        font-size: 20px;
        padding: var(--space-md);
      }
    }

  </style>
</head>
<body>
  <div class="wall">
    <div class="stage">

      <img id="templateBackground" class="template-background-layer" alt="Template Background" />

      <!-- PHOTO WINDOW -->
<div id="photoWindow" class="photo-window">
  <img id="photoA" class="photo" alt="Selfie aprobado A" />
  <img id="photoB" class="photo" alt="Selfie aprobado B" />

  <!-- Ticket number overlay INSIDE the photo window -->
  <div id="ticketBadge" class="ticket-badge">#000</div>
</div>

      <img id="templateOverlay" class="template-overlay-layer" alt="Template Overlay" />

<!-- Gallery status -->
<div id="galleryEmpty" class="empty">
  ESCANEA EL CODIGO QR
</div>

      <div id="templateLogos" class="template-logos-layer"></div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://mayaguez-photoapp.vercel.app";

    const DISPLAY_MS = 8000;
    const REFRESH_MS = 10000;
    const EMPTY_GALLERY_MESSAGE = "ESCANEA EL CODIGO QR";
    /** Template changes are rare; polling less often reduces load and timeout risk on low-memory clients. */
    const TEMPLATE_REFRESH_MS = 45000;
    const OVERLAY_REFRESH_MS = 45000;
    const REQUEST_TIMEOUT_MS = 12000;
    const IMAGE_LOAD_TIMEOUT_MS = 15000;
    const TEMPLATE_RENDERING_ENABLED = false;
    const DEFAULT_PHOTO_BOX = Object.freeze({
      x: 210,
      y: 40,
      width: 1500,
      height: 1000,
    });
    const imgA = document.getElementById("photoA");
    const imgB = document.getElementById("photoB");
    const emptyEl = document.getElementById("galleryEmpty");
    const ticketBadgeEl = document.getElementById("ticketBadge");
    const photoWindowEl = document.getElementById("photoWindow");
    const templateOverlayEl = document.getElementById("templateOverlay");
    const templateBackgroundEl = document.getElementById("templateBackground");
    const templateLogosEl = document.getElementById("templateLogos");

    const imgSlots = [imgA, imgB];
    const slotObjectUrls = [null, null];
    /** Which photo id is currently decoded in each slot (blob URLs cannot be compared to HTTP URLs). */
    const slotPhotoIds = [null, null];
    let activeIndex = 0;
    let hasImage = false;

    let photos = [];
    let currentIndex = 0;
    let rotateTimer = null;
    let rotationLoopToken = 0;
    let refreshTimer = null;
    let templateRefreshTimer = null;
    let overlayRefreshTimer = null;
    let activeTemplateKey = "";
    const sortOrder = "oldest";
    let activeTemplateRequestId = 0;
    let activeOverlayRequestId = 0;
    let currentPhotoId = "";
    let photoTransitionToken = 0;
    let templateLoadAttempt = 0;
    let overlayLoadAttempt = 0;
    let approvedPollCount = 0;
    let consecutiveEmptyApprovedResponses = 0;
    const EMPTY_APPROVED_CLEAR_THRESHOLD = 3;
    let lastTemplateMetadata = null;
    let activeOverlayKey = "";
    let currentOverlayFileId = "";
    let currentOverlayVersion = "";
    let lastGoodOverlayMeta = null;

    function galleryDebug(...args) {
      console.log("[gallery]", ...args);
    }

    function buildPhotoUrl(fileId) {
      return `${BASE_URL}/gallery/photo/${encodeURIComponent(fileId)}`;
    }

    function normalizeAssetUrl(url) {
      if (!url) return "";
      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      if (url.startsWith("/")) return `${BASE_URL}${url}`;
      return url;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
      if (typeof AbortController === "function") {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } finally {
          clearTimeout(timer);
        }
      }

      return await Promise.race([
        fetch(url, options),
        new Promise((_, reject) => setTimeout(() => reject(new Error("request_timeout")), timeoutMs)),
      ]);
    }

    function normalizePhotoBox(photoBox) {
      const fallback = { ...DEFAULT_PHOTO_BOX };
      if (!photoBox || typeof photoBox !== "object") {
        return fallback;
      }

      const x = Number(photoBox.x);
      const y = Number(photoBox.y);
      const width = Number(photoBox.width);
      const height = Number(photoBox.height);
      if (![x, y, width, height].every(Number.isFinite) || width <= 0 || height <= 0) {
        return fallback;
      }

      return {
        x: Math.max(0, Math.min(1920, Math.round(x))),
        y: Math.max(0, Math.min(1080, Math.round(y))),
        width: Math.max(1, Math.min(1920, Math.round(width))),
        height: Math.max(1, Math.min(1080, Math.round(height))),
      };
    }

    function applyPhotoBox(photoBox) {
      if (!photoWindowEl) return;
      const nextPhotoBox = normalizePhotoBox(photoBox);
      photoWindowEl.style.left = `${(nextPhotoBox.x / 1920) * 100}%`;
      photoWindowEl.style.top = `${(nextPhotoBox.y / 1080) * 100}%`;
      photoWindowEl.style.width = `${(nextPhotoBox.width / 1920) * 100}%`;
      photoWindowEl.style.height = `${(nextPhotoBox.height / 1080) * 100}%`;
      galleryDebug("photo box applied", nextPhotoBox);
    }

    function clearOverlayLayer(reason = "unspecified") {
      if (templateOverlayEl) {
        templateOverlayEl.removeAttribute("src");
        templateOverlayEl.style.display = "none";
      }
      activeOverlayKey = "";
      currentOverlayFileId = "";
      currentOverlayVersion = "";
      lastGoodOverlayMeta = null;
      applyPhotoBox(DEFAULT_PHOTO_BOX);
      galleryDebug("overlay cleared", { reason });
    }

    function disableDynamicTemplateLayer() {
      if (templateBackgroundEl) {
        templateBackgroundEl.removeAttribute("src");
        templateBackgroundEl.style.display = "none";
        templateBackgroundEl.style.pointerEvents = "none";
      }
      if (templateLogosEl) {
        templateLogosEl.innerHTML = "";
        templateLogosEl.style.pointerEvents = "none";
      }
      galleryDebug("dynamic template layer disabled");
    }

    function buildOverlayKey(data) {
      if (!data || !data.enabled || !data.overlayFileId) return "";
      const photoBox = normalizePhotoBox(data.photoBox);
      return JSON.stringify({
        templateId: String(data.templateId || ""),
        overlayFileId: String(data.overlayFileId || ""),
        templateVersion: String(data.templateVersion || ""),
        photoBox,
      });
    }

    function describeOverlay(data, overlayKey = "") {
      return {
        templateId: data && data.templateId ? String(data.templateId) : "",
        templateName: data && data.templateName ? String(data.templateName) : "",
        overlayFileId: data && data.overlayFileId ? String(data.overlayFileId) : "",
        templateVersion: data && data.templateVersion ? String(data.templateVersion) : "",
        overlayUrl: data && data.overlayUrl ? normalizeAssetUrl(data.overlayUrl) : "",
        overlayKey: overlayKey || buildOverlayKey(data),
        photoBox: normalizePhotoBox(data && data.photoBox),
      };
    }

    async function preloadOverlayImage(src, timeoutMs = IMAGE_LOAD_TIMEOUT_MS) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        let settled = false;
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("overlay_load_timeout"));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          img.onload = null;
          img.onerror = null;
        }

        async function settleSuccess() {
          if (settled) return;
          settled = true;
          cleanup();
          try {
            if (typeof img.decode === "function") {
              await img.decode();
            }
          } catch (decodeErr) {
            galleryDebug("overlay decode warning", {
              src,
              error: decodeErr && decodeErr.message ? decodeErr.message : String(decodeErr),
            });
          }
          resolve({
            src,
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
        }

        img.onload = settleSuccess;
        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error("overlay_load_failed"));
        };
        img.src = src;

        if (img.complete && img.naturalWidth > 0) {
          void settleSuccess();
        }
      });
    }

    async function commitOverlay(data, overlayKey, requestId) {
      const overlaySummary = describeOverlay(data, overlayKey);
      overlayLoadAttempt += 1;
      galleryDebug("overlay load start", {
        requestId,
        attempt: overlayLoadAttempt,
        ...overlaySummary,
        currentOverlayFileId,
        lastGoodOverlay: lastGoodOverlayMeta,
      });

      const overlayAsset = await preloadOverlayImage(overlaySummary.overlayUrl);
      if (requestId !== activeOverlayRequestId) {
        galleryDebug("overlay commit skipped because a newer request is active", {
          requestId,
          activeOverlayRequestId,
          overlayKey,
        });
        return false;
      }

      if (templateOverlayEl) {
        templateOverlayEl.src = overlayAsset.src;
        templateOverlayEl.style.display = "block";
      }

      applyPhotoBox(overlaySummary.photoBox);
      activeOverlayKey = overlayKey;
      currentOverlayFileId = overlaySummary.overlayFileId;
      currentOverlayVersion = overlaySummary.templateVersion;
      lastGoodOverlayMeta = overlaySummary;
      galleryDebug("overlay load success", {
        requestId,
        ...overlaySummary,
        naturalWidth: overlayAsset.naturalWidth,
        naturalHeight: overlayAsset.naturalHeight,
      });
      return true;
    }

    function setGalleryStatus(message = "") {
      if (!emptyEl) return;
      emptyEl.textContent = message;
      emptyEl.classList.toggle("hidden", !message);
    }

    function hasCommittedTemplate() {
      return Boolean(
        activeTemplateKey ||
        (templateBackgroundEl && templateBackgroundEl.getAttribute("src")) ||
        (templateLogosEl && templateLogosEl.childElementCount > 0)
      );
    }

    function disableTemplateLayerForLiveMode() {
      disableDynamicTemplateLayer();
      activeTemplateKey = "";
      lastTemplateMetadata = null;
      galleryDebug("template rendering disabled for live mode; dynamic template layer cleared once");
    }

    function clearTemplateLayers(options = {}) {
      if (!TEMPLATE_RENDERING_ENABLED) {
        galleryDebug("clearTemplateLayers skipped because template rendering is disabled");
        return false;
      }

      const { force = false, reason = "unspecified" } = options;
      const committedTemplate = hasCommittedTemplate();

      galleryDebug("clearTemplateLayers requested", {
        force,
        reason,
        activeTemplateKey,
        committedTemplate,
      });

      if (!force && committedTemplate) {
        galleryDebug("clearTemplateLayers skipped to preserve last-known-good template", {
          reason,
          activeTemplateKey,
        });
        return false;
      }

      if (templateBackgroundEl) {
        templateBackgroundEl.removeAttribute("src");
        templateBackgroundEl.style.display = "none";
      }
      if (templateLogosEl) {
        templateLogosEl.innerHTML = "";
      }
      activeTemplateKey = "";
      lastTemplateMetadata = null;
      galleryDebug("clearTemplateLayers applied", { reason });
      return true;
    }

    function buildTemplateKey(template) {
      if (!template) return "";
      return JSON.stringify({
        id: template.id || "",
        background: template.background ? template.background.url || template.background.value || "" : "",
        logos: Array.isArray(template.logos)
          ? template.logos.map((logo) => [
              logo.url || logo.value || "",
              logo.x || 0,
              logo.y || 0,
              logo.width || 0,
              logo.height || 0,
            ])
          : [],
      });
    }

    function describeTemplate(template, templateKey = "") {
      return {
        id: template && template.id ? String(template.id) : "",
        key: templateKey || buildTemplateKey(template),
        background: template && template.background ? template.background.url || template.background.value || "" : "",
        logos: Array.isArray(template && template.logos)
          ? template.logos.map((logo) => logo.url || logo.value || "")
          : [],
      };
    }

    async function preloadImageAsset(src, label, timeoutMs = IMAGE_LOAD_TIMEOUT_MS) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        let settled = false;
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error(`${label}_timeout`));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          img.onload = null;
          img.onerror = null;
        }

        function settleSuccess() {
          if (settled) return;
          settled = true;
          cleanup();
          galleryDebug("template asset loaded", {
            label,
            src,
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
          resolve({
            src,
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
        }

        img.onload = async () => {
          try {
            if (typeof img.decode === "function") {
              await img.decode();
            }
          } catch (decodeErr) {
            galleryDebug("template asset decode warning", {
              label,
              src,
              error: decodeErr && decodeErr.message ? decodeErr.message : String(decodeErr),
            });
          }
          settleSuccess();
        };

        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error(`${label}_load_failed`));
        };

        img.src = src;

        if (img.complete && img.naturalWidth > 0) {
          settleSuccess();
        }
      });
    }

    async function preloadTemplateAssets(template, templateKey) {
      const normalizedBackgroundUrl = template && template.background && template.background.url
        ? normalizeAssetUrl(template.background.url)
        : "";
      const baseWidth = Number(template && template.canvasWidth) || 1920;
      const baseHeight = Number(template && template.canvasHeight) || 1080;
      const logoEntries = Array.isArray(template && template.logos) ? template.logos : [];

      galleryDebug("template preload start", {
        attempt: templateLoadAttempt,
        templateId: template && template.id ? String(template.id) : "",
        templateKey,
        backgroundUrl: normalizedBackgroundUrl,
        logoCount: logoEntries.length,
      });

      const backgroundAsset = normalizedBackgroundUrl
        ? await preloadImageAsset(normalizedBackgroundUrl, "background")
        : null;

      const logos = await Promise.all(logoEntries.map(async (logo, index) => {
        const normalizedLogoUrl = normalizeAssetUrl(logo.url || logo.value || "");
        if (!normalizedLogoUrl) {
          throw new Error(`logo_${index}_missing_url`);
        }
        const asset = await preloadImageAsset(normalizedLogoUrl, `logo_${index}`);
        return {
          src: normalizedLogoUrl,
          x: Number(logo.x) || 0,
          y: Number(logo.y) || 0,
          width: Number(logo.width) || 0,
          height: Number(logo.height) || 0,
          baseWidth,
          baseHeight,
          naturalWidth: asset.naturalWidth,
          naturalHeight: asset.naturalHeight,
        };
      }));

      return {
        baseWidth,
        baseHeight,
        backgroundAsset,
        logos,
      };
    }

    function commitTemplateRender(template, templateKey, assets) {
      galleryDebug("template commit", {
        templateId: template && template.id ? String(template.id) : "",
        templateKey,
        backgroundUrl: assets.backgroundAsset ? assets.backgroundAsset.src : "",
        logoCount: assets.logos.length,
      });

      if (templateBackgroundEl) {
        if (assets.backgroundAsset && assets.backgroundAsset.src) {
          templateBackgroundEl.src = assets.backgroundAsset.src;
          templateBackgroundEl.style.display = "block";
        } else {
          templateBackgroundEl.removeAttribute("src");
          templateBackgroundEl.style.display = "none";
        }
      }

      if (templateLogosEl) {
        const nextFragment = document.createDocumentFragment();
        assets.logos.forEach((logo, index) => {
          const logoEl = document.createElement("div");
          logoEl.className = "template-logo-layer";
          logoEl.style.left = `${(logo.x / assets.baseWidth) * 100}%`;
          logoEl.style.top = `${(logo.y / assets.baseHeight) * 100}%`;
          logoEl.style.width = `${(logo.width / assets.baseWidth) * 100}%`;
          logoEl.style.height = `${(logo.height / assets.baseHeight) * 100}%`;

          const img = document.createElement("img");
          img.src = logo.src;
          img.alt = "";
          img.dataset.logoIndex = String(index);
          logoEl.appendChild(img);
          nextFragment.appendChild(logoEl);
        });

        templateLogosEl.innerHTML = "";
        templateLogosEl.appendChild(nextFragment);
      }

      activeTemplateKey = templateKey;
      lastTemplateMetadata = describeTemplate(template, templateKey);
      galleryDebug("template commit complete", {
        activeTemplateKey,
        templateId: lastTemplateMetadata.id,
      });
    }

    async function renderTemplate(template, options = {}) {
      if (!TEMPLATE_RENDERING_ENABLED) {
        galleryDebug("renderTemplate skipped because template rendering is disabled");
        return false;
      }

      const responseMeta = options && options.responseMeta ? options.responseMeta : {};
      const expectedRequestId = options && Number.isFinite(Number(options.requestId))
        ? Number(options.requestId)
        : 0;

      if (!template) {
        galleryDebug("template render skipped because payload is null", {
          responseMeta,
          lastTemplateMetadata,
        });
        if (responseMeta && responseMeta.disabled) {
          clearTemplateLayers({ force: true, reason: "server_disabled_template" });
        }
        return false;
      }

      const templateKey = buildTemplateKey(template);
      if (templateKey === activeTemplateKey) {
        galleryDebug("template render skipped because template already active", {
          templateId: template.id || "",
          templateKey,
        });
        return true;
      }

      const templateSummary = describeTemplate(template, templateKey);
      templateLoadAttempt += 1;
      galleryDebug("template render requested", {
        attempt: templateLoadAttempt,
        ...templateSummary,
        responseMeta,
        expectedRequestId,
      });

      try {
        const assets = await preloadTemplateAssets(template, templateKey);
        if (expectedRequestId && expectedRequestId !== activeTemplateRequestId) {
          galleryDebug("template render commit skipped because a newer request became active", {
            expectedRequestId,
            activeTemplateRequestId,
            templateKey,
          });
          return false;
        }
        commitTemplateRender(template, templateKey, assets);
        return true;
      } catch (err) {
        galleryDebug("template render failed; keeping last-known-good template", {
          attempt: templateLoadAttempt,
          ...templateSummary,
          error: err && err.message ? err.message : String(err),
          currentVisibleTemplateKey: activeTemplateKey,
        });
        return false;
      }
    }

    async function fetchActiveTemplate() {
      if (!TEMPLATE_RENDERING_ENABLED) {
        galleryDebug("fetchActiveTemplate skipped because template rendering is disabled");
        return;
      }

      const requestId = ++activeTemplateRequestId;
      galleryDebug("template fetch start", {
        requestId,
        currentVisibleTemplateKey: activeTemplateKey,
      });
      try {
        const res = await fetchWithTimeout(`${BASE_URL}/gallery/active-template?ts=${Date.now()}`, {
          cache: "no-store",
        });
        if (!res.ok) {
          console.error("Error fetching active template", res.status);
          galleryDebug("template fetch failed", { requestId, status: res.status });
          return;
        }

        const data = await res.json();
        if (requestId !== activeTemplateRequestId) {
          galleryDebug("template fetch ignored because a newer request exists", { requestId });
          return;
        }
        if (!data.ok) {
          console.error("Active template API returned not ok", data);
          galleryDebug("template fetch returned non-ok payload", { requestId, data });
          return;
        }

        galleryDebug("template fetch success", {
          requestId,
          meta: data.meta || null,
          template: data.template ? describeTemplate(data.template) : null,
        });

        await renderTemplate(data.template || null, {
          responseMeta: data.meta || null,
          requestId,
        });
      } catch (err) {
        console.error("Failed to fetch active template", err);
        galleryDebug("template fetch exception", {
          requestId,
          error: err && err.message ? err.message : String(err),
        });
      }
    }

    // --- Ticket helpers (from filename) ---

    function getTicketFromName(name) {
      if (!name || typeof name !== "string") return null;

      // New pattern: T001-...
      let match = name.match(/^T(\d{1,})-/i);
      if (match) return parseInt(match[1], 10);

      // Legacy pattern: 01_...
      match = name.match(/^(\d{1,})_/);
      if (match) return parseInt(match[1], 10);

      return null;
    }

    function formatTicketLabel(num) {
      if (num == null || !Number.isFinite(Number(num))) return null;
      const n = Number(num);
      return "#" + String(n).padStart(3, "0");
    }

    function updateTicketBadge(fileName) {
      if (!ticketBadgeEl) return;

      const ticketNum = getTicketFromName(fileName);
      const label = formatTicketLabel(ticketNum);

      if (!label) {
        ticketBadgeEl.style.display = "none";
        ticketBadgeEl.textContent = "";
        return;
      }

      ticketBadgeEl.textContent = label;
      ticketBadgeEl.style.display = "block";
    }

    function hideTicketBadge() {
      if (!ticketBadgeEl) return;
      ticketBadgeEl.style.display = "none";
      ticketBadgeEl.textContent = "";
    }

    function setEmptyState(options = {}) {
      const { force = false, reason = "unspecified" } = options;
      galleryDebug("setEmptyState requested", {
        force,
        reason,
        consecutiveEmptyApprovedResponses,
        hasImage,
        currentPhotoId,
      });

      if (!force) {
        galleryDebug("setEmptyState blocked to preserve last-known-good photo", {
          reason,
          currentPhotoId,
        });
        return false;
      }

      rotationLoopToken += 1;
      photoTransitionToken += 1;
      if (rotateTimer) {
        clearTimeout(rotateTimer);
        rotateTimer = null;
      }

      imgSlots.forEach((img, index) => {
        img.classList.remove("visible");
        img.onload = null;
        img.onerror = null;
        img.removeAttribute("src");
        slotPhotoIds[index] = null;
        if (slotObjectUrls[index]) {
          URL.revokeObjectURL(slotObjectUrls[index]);
          slotObjectUrls[index] = null;
        }
      });
      setGalleryStatus(EMPTY_GALLERY_MESSAGE);
      hideTicketBadge();
      hasImage = false;
      currentPhotoId = "";
      galleryDebug("setEmptyState applied", { reason });
      return true;
    }

    async function loadImageIntoSlot(slotIndex, url, timeoutMs = IMAGE_LOAD_TIMEOUT_MS, photoId = "") {
      const img = imgSlots[slotIndex];
      if (!img) {
        throw new Error("missing_image_slot");
      }

      const response = await fetchWithTimeout(url, { cache: "no-store" }, timeoutMs);
      if (!response.ok) {
        throw new Error(`image_http_${response.status}`);
      }

      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);

      return await new Promise((resolve, reject) => {
        let settled = false;
        let readinessProbe = 0;
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("image_load_timeout"));
        }, timeoutMs);

        let cleanup = () => {
          clearTimeout(timer);
          if (readinessProbe) clearInterval(readinessProbe);
          img.onload = null;
          img.onerror = null;
        };

        function commit() {
          if (settled) return;
          settled = true;
          cleanup();
          if (slotObjectUrls[slotIndex]) {
            URL.revokeObjectURL(slotObjectUrls[slotIndex]);
          }
          slotObjectUrls[slotIndex] = objectUrl;
          slotPhotoIds[slotIndex] = photoId ? String(photoId) : "";
          galleryDebug("photo asset loaded", {
            slotIndex,
            photoId: photoId ? String(photoId) : "",
            naturalWidth: img.naturalWidth || 0,
            naturalHeight: img.naturalHeight || 0,
          });
          resolve(objectUrl);
        }

        img.onload = commit;
        img.onerror = () => {
          if (settled) return;
          settled = true;
          cleanup();
          URL.revokeObjectURL(objectUrl);
          reject(new Error("image_load_failed"));
        };
        img.src = objectUrl;

        if (img.complete && img.naturalWidth > 0) {
          commit();
          return;
        }

        readinessProbe = setInterval(() => {
          if (img.complete && img.naturalWidth > 0) {
            commit();
          }
        }, 250);
      });
    }

    async function crossfadeTo(url, photoId = "") {
      const transitionToken = ++photoTransitionToken;
      galleryDebug("photo transition start", {
        transitionToken,
        targetPhotoId: photoId ? String(photoId) : "",
        currentVisiblePhotoId: currentPhotoId,
      });

      if (!hasImage) {
        const img = imgSlots[activeIndex];
        try {
          img.classList.remove("visible");
          await loadImageIntoSlot(activeIndex, url, IMAGE_LOAD_TIMEOUT_MS, photoId);
          if (transitionToken !== photoTransitionToken) return false;

          return await new Promise((resolve) => {
            requestAnimationFrame(() => {
              if (transitionToken !== photoTransitionToken) {
                resolve(false);
                return;
              }
              setGalleryStatus("");
              img.classList.add("visible");
              hasImage = true;
              currentPhotoId = photoId ? String(photoId) : "";
              galleryDebug("photo transition committed (first photo)", {
                transitionToken,
                currentVisiblePhotoId: currentPhotoId,
              });
              resolve(true);
            });
          });
        } catch (err) {
          console.error("Error loading first photo", err);
          galleryDebug("photo transition failed before any photo was visible", {
            transitionToken,
            targetPhotoId: photoId ? String(photoId) : "",
            error: err && err.message ? err.message : String(err),
          });
          return false;
        }
      }

      const currentImg = imgSlots[activeIndex];
      const targetId = photoId ? String(photoId) : "";
      if (targetId && slotPhotoIds[activeIndex] === targetId) {
        setGalleryStatus("");
        currentPhotoId = targetId;
        hasImage = true;
        return true;
      }

      const nextIndex = 1 - activeIndex;
      const nextImg = imgSlots[nextIndex];

      if (targetId && slotPhotoIds[nextIndex] === targetId && nextImg.getAttribute("src")) {
        if (transitionToken !== photoTransitionToken) return false;
        return await new Promise((resolve) => {
          requestAnimationFrame(() => {
            if (transitionToken !== photoTransitionToken) {
              resolve(false);
              return;
            }
            void nextImg.offsetWidth;
            nextImg.classList.add("visible");
            currentImg.classList.remove("visible");
            activeIndex = nextIndex;
            setGalleryStatus("");
            hasImage = true;
            currentPhotoId = targetId;
            galleryDebug("photo transition reused preloaded slot", {
              transitionToken,
              currentVisiblePhotoId: currentPhotoId,
            });
            resolve(true);
          });
        });
      }

      try {
        nextImg.classList.remove("visible");
        await loadImageIntoSlot(nextIndex, url, IMAGE_LOAD_TIMEOUT_MS, photoId);
        if (transitionToken !== photoTransitionToken) return false;

        return await new Promise((resolve) => {
          requestAnimationFrame(() => {
            if (transitionToken !== photoTransitionToken) {
              resolve(false);
              return;
            }
            void nextImg.offsetWidth;
            nextImg.classList.add("visible");
            currentImg.classList.remove("visible");
            activeIndex = nextIndex;
            setGalleryStatus("");
            hasImage = true;
            currentPhotoId = photoId ? String(photoId) : "";
            galleryDebug("photo transition committed", {
              transitionToken,
              currentVisiblePhotoId: currentPhotoId,
            });
            resolve(true);
          });
        });
      } catch (err) {
        console.error("Error loading photo", err);
        galleryDebug("photo transition failed; keeping current visible photo", {
          transitionToken,
          targetPhotoId: photoId ? String(photoId) : "",
          currentVisiblePhotoId: currentPhotoId,
          error: err && err.message ? err.message : String(err),
        });
        return false;
      }
    }

    async function showCurrentPhoto() {
      if (!photos.length) {
        setEmptyState({ force: false, reason: "show_current_photo_without_confirmed_empty" });
        return false;
      }

      const file = photos[currentIndex];
      const url = buildPhotoUrl(file.id);
      const didShow = await crossfadeTo(url, file.id);
      if (didShow) {
        updateTicketBadge(file.name);
      }
      return didShow;
    }

    function scheduleNextRotation(loopToken, delayMs = DISPLAY_MS) {
      if (rotateTimer) {
        clearTimeout(rotateTimer);
      }
      rotateTimer = setTimeout(async () => {
        rotateTimer = null;
        if (loopToken !== rotationLoopToken) return;
        if (!photos.length) {
          setEmptyState({ force: false, reason: "rotation_tick_without_confirmed_empty" });
          return;
        }
        currentIndex = (currentIndex + 1) % photos.length;
        const didShow = await showCurrentPhoto();
        if (loopToken !== rotationLoopToken) return;
        scheduleNextRotation(loopToken, didShow ? DISPLAY_MS : 1500);
      }, delayMs);
    }

    async function startRotation(options = {}) {
      const { preserveCurrentVisible = false } = options;
      rotationLoopToken += 1;
      const loopToken = rotationLoopToken;
      if (rotateTimer) clearTimeout(rotateTimer);
      rotateTimer = null;
      if (!photos.length) {
        setEmptyState({ force: false, reason: "start_rotation_without_confirmed_empty" });
        return;
      }

      if (!preserveCurrentVisible || !hasImage) {
        const didShow = await showCurrentPhoto();
        if (loopToken !== rotationLoopToken) return;
        if (!didShow) {
          scheduleNextRotation(loopToken, 1500);
          return;
        }
      }

      scheduleNextRotation(loopToken, DISPLAY_MS);
    }

    async function fetchApproved() {
      approvedPollCount += 1;
      galleryDebug("approved poll start", {
        approvedPollCount,
        currentVisiblePhotoId: currentPhotoId,
        consecutiveEmptyApprovedResponses,
      });
      try {
        const res = await fetchWithTimeout(`${BASE_URL}/gallery/approved`);
        if (!res.ok) {
          console.error("Error fetching approved list", res.status);
          galleryDebug("approved poll failed", {
            approvedPollCount,
            status: res.status,
          });
          return;
        }
        const data = await res.json();
        if (!data.ok) {
          console.error("API returned not ok", data);
          galleryDebug("approved poll returned non-ok payload", {
            approvedPollCount,
            data,
          });
          return;
        }

        const newPhotos = Array.isArray(data.files) ? [...data.files] : [];
        sortPhotosList(newPhotos);
        const oldIds = photos.map((p) => p.id).join(",");
        const newIds = newPhotos.map((p) => p.id).join(",");
        galleryDebug("approved poll success", {
          approvedPollCount,
          resultCount: newPhotos.length,
          oldIds,
          newIds,
        });

        if (!newPhotos.length) {
          consecutiveEmptyApprovedResponses += 1;
          galleryDebug("approved poll empty response", {
            approvedPollCount,
            consecutiveEmptyApprovedResponses,
            threshold: EMPTY_APPROVED_CLEAR_THRESHOLD,
            currentVisiblePhotoId: currentPhotoId,
          });
          if (!hasImage) {
            photos = [];
            currentIndex = 0;
            setEmptyState({ force: true, reason: "no_approved_photos_available" });
            return;
          }
          if (consecutiveEmptyApprovedResponses >= EMPTY_APPROVED_CLEAR_THRESHOLD) {
            photos = [];
            currentIndex = 0;
            setEmptyState({ force: true, reason: "confirmed_empty_approved_responses" });
          }
          return;
        }

        consecutiveEmptyApprovedResponses = 0;
        photos = newPhotos;

        if (!hasImage) {
          const currentPhotoIndex = currentPhotoId
            ? photos.findIndex((photo) => String(photo.id) === String(currentPhotoId))
            : -1;
          if (currentPhotoIndex >= 0) {
            currentIndex = currentPhotoIndex;
          } else if (currentIndex >= photos.length) {
            currentIndex = photos.length - 1;
          }
          void startRotation();
        } else if (oldIds !== newIds) {
          const currentPhotoIndex = currentPhotoId
            ? photos.findIndex((photo) => String(photo.id) === String(currentPhotoId))
            : -1;
          if (currentPhotoIndex >= 0) {
            currentIndex = currentPhotoIndex;
          } else if (currentIndex >= photos.length) {
            currentIndex = photos.length - 1;
          }
          if (currentPhotoIndex < 0) {
            void startRotation();
          } else if (!rotateTimer) {
            void startRotation({ preserveCurrentVisible: true });
          }
        }
      } catch (err) {
        console.error("Failed to fetch approved photos", err);
        galleryDebug("approved poll exception", {
          approvedPollCount,
          error: err && err.message ? err.message : String(err),
        });
      }
    }

    function startRefreshLoop() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(fetchApproved, REFRESH_MS);
    }

    function startTemplateRefreshLoop() {
      if (!TEMPLATE_RENDERING_ENABLED) {
        galleryDebug("template refresh loop not started because template rendering is disabled");
        return;
      }

      if (templateRefreshTimer) clearInterval(templateRefreshTimer);
      fetchActiveTemplate();
      templateRefreshTimer = setInterval(fetchActiveTemplate, TEMPLATE_REFRESH_MS);
    }

    async function fetchActiveOverlay() {
      const requestId = ++activeOverlayRequestId;
      galleryDebug("overlay fetch start", {
        requestId,
        activeOverlayKey,
        currentOverlayFileId,
        currentOverlayVersion,
      });

      try {
        const res = await fetchWithTimeout(`${BASE_URL}/gallery/active-overlay?ts=${Date.now()}`, {
          cache: "no-store",
        });
        if (!res.ok) {
          console.error("Error fetching active overlay", res.status);
          galleryDebug("overlay fetch failed", { requestId, status: res.status });
          return;
        }

        const data = await res.json();
        if (requestId !== activeOverlayRequestId) {
          galleryDebug("overlay fetch ignored because a newer request exists", { requestId });
          return;
        }
        if (!data.ok) {
          console.error("Active overlay API returned not ok", data);
          galleryDebug("overlay fetch returned non-ok payload", { requestId, data });
          return;
        }

        const overlayKey = buildOverlayKey(data);
        galleryDebug("overlay fetch success", {
          requestId,
          enabled: Boolean(data.enabled),
          templateId: String(data.templateId || ""),
          overlayFileId: String(data.overlayFileId || ""),
          templateVersion: String(data.templateVersion || ""),
          overlayKey,
          photoBox: normalizePhotoBox(data.photoBox),
          lastGoodOverlay: lastGoodOverlayMeta,
        });

        if (!data.enabled || !data.overlayFileId || !data.overlayUrl) {
          if (lastGoodOverlayMeta) {
            galleryDebug("overlay disabled by active-overlay response; clearing current overlay", {
              requestId,
              reason: data?.meta?.reason || "overlay_disabled",
            });
            clearOverlayLayer(data?.meta?.reason || "overlay_disabled");
          } else {
            applyPhotoBox(DEFAULT_PHOTO_BOX);
          }
          return;
        }

        if (overlayKey === activeOverlayKey) {
          applyPhotoBox(data.photoBox || DEFAULT_PHOTO_BOX);
          galleryDebug("overlay fetch skipped because overlay already active", {
            requestId,
            overlayKey,
          });
          return;
        }

        try {
          await commitOverlay(data, overlayKey, requestId);
        } catch (err) {
          galleryDebug("overlay load failed; keeping last-known-good overlay", {
            requestId,
            templateId: String(data.templateId || ""),
            overlayFileId: String(data.overlayFileId || ""),
            templateVersion: String(data.templateVersion || ""),
            error: err && err.message ? err.message : String(err),
            lastGoodOverlay: lastGoodOverlayMeta,
          });
        }
      } catch (err) {
        console.error("Failed to fetch active overlay", err);
        galleryDebug("overlay fetch exception", {
          requestId,
          error: err && err.message ? err.message : String(err),
          lastGoodOverlay: lastGoodOverlayMeta,
        });
      }
    }

    function startOverlayRefreshLoop() {
      if (overlayRefreshTimer) clearInterval(overlayRefreshTimer);
      fetchActiveOverlay();
      overlayRefreshTimer = setInterval(fetchActiveOverlay, OVERLAY_REFRESH_MS);
    }

    function getPhotoPlaybackTime(photo) {
      if (!photo || typeof photo !== "object") return 0;
      const rawTime = String(photo.approvedTime || photo.modifiedTime || photo.createdTime || "").trim();
      if (!rawTime) return 0;

      const ms = Date.parse(rawTime);
      return Number.isFinite(ms) ? ms : 0;
    }

    function sortPhotosList(list) {
      if (!Array.isArray(list) || !list.length) return list;

      if (sortOrder === 'newest') {
        list.sort((a, b) => {
          const timeA = getPhotoPlaybackTime(a);
          const timeB = getPhotoPlaybackTime(b);
          if (timeB !== timeA) return timeB - timeA;
          return String(b.id || "").localeCompare(String(a.id || ""));
        });
      } else {
        list.sort((a, b) => {
          const timeA = getPhotoPlaybackTime(a);
          const timeB = getPhotoPlaybackTime(b);
          if (timeA !== timeB) return timeA - timeB;
          return String(a.id || "").localeCompare(String(b.id || ""));
        });
      }

      return list;
    }

    if (TEMPLATE_RENDERING_ENABLED) {
      clearTemplateLayers({ force: true, reason: "initial_boot" });
    } else {
      disableTemplateLayerForLiveMode();
    }
    clearOverlayLayer("initial_boot");
    setGalleryStatus(EMPTY_GALLERY_MESSAGE);
    if (TEMPLATE_RENDERING_ENABLED) {
      startTemplateRefreshLoop();
    }
    startOverlayRefreshLoop();
    startRefreshLoop();
    fetchApproved();
  </script>
</body>
</html>
